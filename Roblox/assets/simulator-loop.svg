<svg viewBox="0 0 720 360" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="720" height="360" fill="#fdecea" rx="12"/>
  <text x="360" y="34" text-anchor="middle" font-size="19" font-weight="700" fill="#7f1d1d">Петля симулятора: собирай → копи → улучшай</text>

  <!-- four nodes in a cycle -->
  <g>
    <circle cx="200" cy="135" r="62" fill="#fff" stroke="#e2231a" stroke-width="2.5"/>
    <text x="200" y="125" text-anchor="middle" font-size="26">🪙</text>
    <text x="200" y="150" text-anchor="middle" font-size="12.5" font-weight="700" fill="#374151">собираешь</text>
    <text x="200" y="167" text-anchor="middle" font-size="10.5" fill="#6b7280">ресурсы (Touched)</text>
  </g>
  <g>
    <circle cx="520" cy="135" r="62" fill="#fff" stroke="#e2231a" stroke-width="2.5"/>
    <text x="520" y="125" text-anchor="middle" font-size="26">💰</text>
    <text x="520" y="150" text-anchor="middle" font-size="12.5" font-weight="700" fill="#374151">копишь валюту</text>
    <text x="520" y="167" text-anchor="middle" font-size="10.5" fill="#6b7280">leaderstats (сервер)</text>
  </g>
  <g>
    <circle cx="520" cy="270" r="55" fill="#fff" stroke="#e2231a" stroke-width="2.5"/>
    <text x="520" y="262" text-anchor="middle" font-size="24">⬆️</text>
    <text x="520" y="285" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">покупаешь апгрейд</text>
    <text x="520" y="301" text-anchor="middle" font-size="10" fill="#6b7280">через сервер (RemoteEvent)</text>
  </g>
  <g>
    <circle cx="200" cy="270" r="55" fill="#fff" stroke="#e2231a" stroke-width="2.5"/>
    <text x="200" y="262" text-anchor="middle" font-size="24">⚡</text>
    <text x="200" y="285" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">собираешь быстрее</text>
    <text x="200" y="301" text-anchor="middle" font-size="10" fill="#6b7280">WalkSpeed / ×множитель</text>
  </g>

  <!-- arrows clockwise -->
  <g stroke="#b91c1c" stroke-width="3" fill="none">
    <path d="M 262 135 L 456 135"/><polygon points="460,135 450,129 450,141" fill="#b91c1c"/>
    <path d="M 535 196 L 528 212"/><polygon points="526,216 524,205 534,209" fill="#b91c1c"/>
    <path d="M 462 280 L 258 280"/><polygon points="254,280 264,274 264,286" fill="#b91c1c"/>
    <path d="M 192 214 L 198 198"/><polygon points="200,194 202,205 192,201" fill="#b91c1c"/>
  </g>

  <rect x="250" y="195" width="220" height="50" rx="8" fill="#fee2e2" stroke="#f3b4a8"/>
  <text x="360" y="216" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7f1d1d">прогрессия + сохранение</text>
  <text x="360" y="234" text-anchor="middle" font-size="11" fill="#7f1d1d">DataStore хранит прогресс</text>
</svg>

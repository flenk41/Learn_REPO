<svg viewBox="0 0 720 320" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="720" height="320" fill="#fdecea" rx="12"/>
  <text x="360" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#7f1d1d">DataStore: загрузка на входе, сохранение на выходе</text>

  <!-- player joins -->
  <rect x="30" y="80" width="150" height="50" rx="8" fill="#fff" stroke="#e2231a" stroke-width="2"/>
  <text x="105" y="102" text-anchor="middle" font-size="12" font-weight="700" fill="#e2231a">PlayerAdded</text>
  <text x="105" y="120" text-anchor="middle" font-size="10" fill="#6b7280">игрок зашёл</text>

  <!-- player leaves -->
  <rect x="30" y="200" width="150" height="50" rx="8" fill="#fff" stroke="#e2231a" stroke-width="2"/>
  <text x="105" y="222" text-anchor="middle" font-size="11.5" font-weight="700" fill="#e2231a">PlayerRemoving</text>
  <text x="105" y="240" text-anchor="middle" font-size="10" fill="#6b7280">игрок вышел</text>

  <!-- server -->
  <rect x="250" y="120" width="200" height="90" rx="10" fill="#fff" stroke="#7f1d1d" stroke-width="2.5"/>
  <text x="350" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#7f1d1d">СЕРВЕР (Script)</text>
  <text x="350" y="170" text-anchor="middle" font-size="10.5" fill="#374151">pcall(...) — лови сбой!</text>
  <text x="350" y="190" text-anchor="middle" font-size="10.5" fill="#374151">ключ = "Player_"..UserId</text>

  <!-- datastore cloud -->
  <ellipse cx="600" cy="160" rx="90" ry="58" fill="#fde2dd" stroke="#e2231a" stroke-width="2"/>
  <text x="600" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#7f1d1d">DataStore</text>
  <text x="600" y="170" text-anchor="middle" font-size="10" fill="#6b7280">облако Roblox</text>
  <text x="600" y="186" text-anchor="middle" font-size="9.5" fill="#6b7280">ключ → значение</text>

  <!-- arrows -->
  <path d="M 180 105 C 220 105, 230 140, 248 145" stroke="#15803d" stroke-width="2" fill="none"/><polygon points="250,146 241,142 242,150" fill="#15803d"/>
  <path d="M 450 150 L 506 152" stroke="#15803d" stroke-width="2.2" fill="none"/><polygon points="508,152 499,148 499,156" fill="#15803d"/>
  <text x="478" y="142" text-anchor="middle" font-size="10" fill="#15803d">GetAsync (загрузить)</text>
  <path d="M 180 225 C 220 225, 230 185, 248 180" stroke="#b45309" stroke-width="2" fill="none"/><polygon points="250,179 241,180 244,188" fill="#b45309"/>
  <path d="M 450 185 C 490 200, 520 195, 530 188" stroke="#b45309" stroke-width="2.2" fill="none"/><polygon points="531,187 522,189 525,196" fill="#b45309"/>
  <text x="495" y="210" text-anchor="middle" font-size="10" fill="#b45309">SetAsync (сохранить)</text>

  <rect x="30" y="270" width="660" height="42" rx="8" fill="#fff" stroke="#f3b4a8"/>
  <text x="360" y="291" text-anchor="middle" font-size="11.5" fill="#7f1d1d">⚠️ только СЕРВЕР · оборачивай в pcall · при ошибке загрузки НЕ перезаписывай нулём.</text>
  <text x="360" y="307" text-anchor="middle" font-size="10.5" fill="#6b7280">+ BindToClose (сохранить всех при остановке) · работает в опубликованной игре.</text>
</svg>

<svg viewBox="0 0 720 400" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="720" height="400" fill="#fdecea" rx="12"/>
  <text x="360" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#7f1d1d">Всё — Instance в дереве game (DataModel)</text>

  <!-- root -->
  <rect x="300" y="50" width="120" height="34" rx="6" fill="#e2231a"/>
  <text x="360" y="72" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">game</text>

  <!-- children -->
  <g font-size="11.5" fill="#fff" font-weight="700">
    <rect x="40" y="130" width="150" height="30" rx="5" fill="#b91c1c"/><text x="115" y="150" text-anchor="middle">Workspace</text>
    <rect x="205" y="130" width="95" height="30" rx="5" fill="#9ca3af"/><text x="252" y="150" text-anchor="middle">Players</text>
    <rect x="315" y="130" width="95" height="30" rx="5" fill="#9ca3af"/><text x="362" y="150" text-anchor="middle">Lighting</text>
    <rect x="425" y="130" width="135" height="30" rx="5" fill="#6b7280"/><text x="492" y="150" text-anchor="middle">ReplicatedStorage</text>
    <rect x="575" y="130" width="120" height="30" rx="5" fill="#374151"/><text x="635" y="146" text-anchor="middle" font-size="9.5">ServerScript</text><text x="635" y="156" text-anchor="middle" font-size="9.5">Service</text>
  </g>
  <g stroke="#e2231a" stroke-width="1.5">
    <line x1="360" y1="84" x2="115" y2="130"/>
    <line x1="360" y1="84" x2="252" y2="130"/>
    <line x1="360" y1="84" x2="362" y2="130"/>
    <line x1="360" y1="84" x2="492" y2="130"/>
    <line x1="360" y1="84" x2="635" y2="130"/>
  </g>

  <!-- workspace children -->
  <g font-size="10.5" fill="#1f2937">
    <rect x="40" y="205" width="150" height="26" rx="4" fill="#fde2dd" stroke="#e2231a"/><text x="115" y="222" text-anchor="middle">Baseplate (Part)</text>
    <rect x="40" y="238" width="150" height="26" rx="4" fill="#fde2dd" stroke="#e2231a"/><text x="115" y="255" text-anchor="middle">Platform (Part)</text>
    <rect x="40" y="271" width="150" height="26" rx="4" fill="#fde2dd" stroke="#e2231a"/><text x="115" y="288" text-anchor="middle">Coin (Model)</text>
    <rect x="60" y="304" width="130" height="24" rx="4" fill="#fff3f1" stroke="#f3b4a8"/><text x="125" y="320" text-anchor="middle" font-size="10">Handle (Part)</text>
  </g>
  <g stroke="#f3b4a8" stroke-width="1.2">
    <line x1="115" y1="160" x2="115" y2="205"/>
    <line x1="115" y1="231" x2="115" y2="238"/>
    <line x1="115" y1="264" x2="115" y2="271"/>
    <line x1="115" y1="297" x2="125" y2="304"/>
  </g>

  <rect x="250" y="210" width="445" height="120" rx="8" fill="#fff" stroke="#f3b4a8"/>
  <text x="268" y="234" font-size="13" font-weight="700" fill="#7f1d1d">Путь к объекту — как в дереве:</text>
  <text x="268" y="258" font-size="12.5" font-family="monospace" fill="#b91c1c">game.Workspace.Coin.Handle</text>
  <text x="268" y="282" font-size="12" fill="#374151">• у каждого Instance: ClassName, Name, Parent, дети</text>
  <text x="268" y="302" font-size="12" fill="#374151">• Parent = nil → объекта «нет» в игре</text>
  <text x="268" y="322" font-size="12" fill="#374151">• из кода: workspace.Coin, :WaitForChild("Coin")</text>
</svg>

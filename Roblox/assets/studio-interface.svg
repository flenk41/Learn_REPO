<svg viewBox="0 0 720 380" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="720" height="380" fill="#fdecea" rx="12"/>
  <text x="360" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#7f1d1d">Roblox Studio: главные панели</text>

  <!-- viewport -->
  <rect x="30" y="55" width="420" height="220" rx="8" fill="#dbe4ea" stroke="#e2231a" stroke-width="2"/>
  <text x="240" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">3D-сцена (вьюпорт)</text>
  <rect x="150" y="170" width="180" height="22" rx="3" fill="#9ca3af"/>
  <text x="240" y="186" text-anchor="middle" font-size="11" fill="#1f2937">Baseplate</text>
  <rect x="210" y="120" width="60" height="50" rx="3" fill="#e2231a"/>
  <text x="240" y="150" text-anchor="middle" font-size="10" fill="#fff">Part</text>
  <text x="240" y="262" text-anchor="middle" font-size="10.5" fill="#6b7280">▶ Play — тестируешь · Stop — правишь</text>

  <!-- Explorer -->
  <rect x="465" y="55" width="225" height="120" rx="8" fill="#fff" stroke="#e2231a" stroke-width="2"/>
  <text x="478" y="76" font-size="12.5" font-weight="700" fill="#e2231a">📦 EXPLORER (дерево)</text>
  <g font-size="11" fill="#374151">
    <text x="482" y="98">▸ Workspace</text>
    <text x="498" y="116">• Baseplate</text>
    <text x="498" y="134">• Platform</text>
    <text x="482" y="152">▸ Players</text>
    <text x="482" y="170">▸ ServerScriptService</text>
  </g>

  <!-- Properties -->
  <rect x="465" y="185" width="225" height="90" rx="8" fill="#fff" stroke="#e2231a" stroke-width="2"/>
  <text x="478" y="206" font-size="12.5" font-weight="700" fill="#e2231a">⚙️ PROPERTIES (свойства)</text>
  <g font-size="11" fill="#374151">
    <text x="482" y="228">Size · Position · Color</text>
    <text x="482" y="246">Material · Transparency</text>
    <text x="482" y="264">Anchored ✓ · CanCollide ✓</text>
  </g>

  <!-- Output -->
  <rect x="30" y="288" width="660" height="72" rx="8" fill="#1e1b1b" stroke="#e2231a" stroke-width="1.5"/>
  <text x="44" y="308" font-size="12" font-weight="700" fill="#fca5a5">📜 OUTPUT (твой «терминал»)</text>
  <text x="44" y="328" font-size="11.5" font-family="monospace" fill="#86efac">print("Привет, Roblox!")  →  Привет, Roblox!</text>
  <text x="44" y="346" font-size="11.5" font-family="monospace" fill="#fca5a5">здесь видно ошибки скриптов и вывод print()</text>
</svg>

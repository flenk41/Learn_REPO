<svg viewBox="0 0 720 320" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="720" height="320" fill="#fdecea" rx="12"/>
  <text x="360" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#7f1d1d">Анти-чит: сервер не верит клиенту</text>

  <!-- vulnerable -->
  <rect x="30" y="60" width="320" height="115" rx="10" fill="#fff" stroke="#b91c1c" stroke-width="2"/>
  <text x="190" y="84" text-anchor="middle" font-size="13" font-weight="700" fill="#b91c1c">❌ УЯЗВИМО</text>
  <text x="48" y="108" font-size="11" font-family="monospace" fill="#374151">OnServerEvent(player, cost)</text>
  <text x="48" y="128" font-size="11" font-family="monospace" fill="#b91c1c">  coins -= cost  -- cost ОТ КЛИЕНТА</text>
  <text x="48" y="152" font-size="10.5" fill="#6b7280">читер пришлёт cost = −9999 → бесконечная валюта</text>

  <!-- safe -->
  <rect x="370" y="60" width="320" height="115" rx="10" fill="#fff" stroke="#15803d" stroke-width="2"/>
  <text x="530" y="84" text-anchor="middle" font-size="13" font-weight="700" fill="#15803d">✅ БЕЗОПАСНО</text>
  <text x="388" y="108" font-size="11" font-family="monospace" fill="#374151">cost = PRICES[kind]  -- сервер знает</text>
  <text x="388" y="128" font-size="11" font-family="monospace" fill="#15803d">if coins >= cost then ...</text>
  <text x="388" y="152" font-size="10.5" fill="#6b7280">клиент шлёт лишь ТИП; цену/проверку решает сервер</text>

  <!-- diagram -->
  <rect x="60" y="205" width="240" height="70" rx="8" fill="#fee2e2" stroke="#b91c1c"/>
  <text x="180" y="230" text-anchor="middle" font-size="12.5" font-weight="700" fill="#991b1b">КЛИЕНТ — недоверенный</text>
  <text x="180" y="250" text-anchor="middle" font-size="10.5" fill="#b91c1c">можно взломать: шлёт любые RemoteEvent</text>
  <text x="180" y="266" text-anchor="middle" font-size="10.5" fill="#6b7280">только ПРОСИТ</text>

  <rect x="420" y="205" width="240" height="70" rx="8" fill="#dcfce7" stroke="#15803d"/>
  <text x="540" y="230" text-anchor="middle" font-size="12.5" font-weight="700" fill="#166534">СЕРВЕР — источник правды</text>
  <text x="540" y="250" text-anchor="middle" font-size="10.5" fill="#15803d">валидирует тип/средства/частоту</text>
  <text x="540" y="266" text-anchor="middle" font-size="10.5" fill="#6b7280">РЕШАЕТ</text>

  <path d="M 300 240 L 418 240" stroke="#7f1d1d" stroke-width="2.5" fill="none"/><polygon points="420,240 411,236 411,244" fill="#7f1d1d"/>
  <text x="360" y="232" text-anchor="middle" font-size="9.5" fill="#7f1d1d">«хочу X»</text>
</svg>

<svg viewBox="0 0 720 280" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="720" height="280" fill="#eef2ff" rx="12"/>
  <text x="360" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#3730a3">Связный список: узлы + указатели на следующий</text>

  <!-- head -->
  <text x="60" y="95" font-size="12" font-weight="700" fill="#4f46e5">head</text>
  <path d="M 60 100 L 60 125 L 95 125" stroke="#4f46e5" stroke-width="2" fill="none"/><polygon points="97,125 88,121 88,129" fill="#4f46e5"/>

  <!-- nodes -->
  <g font-size="13">
    <g>
      <rect x="100" y="105" width="110" height="50" rx="8" fill="#fff" stroke="#4f46e5" stroke-width="2"/>
      <line x1="170" y1="105" x2="170" y2="155" stroke="#c7d2fe"/>
      <text x="135" y="136" text-anchor="middle" font-weight="700" fill="#1e1b4b">10</text>
      <text x="190" y="136" text-anchor="middle" fill="#4f46e5">●</text>
    </g>
    <g>
      <rect x="280" y="105" width="110" height="50" rx="8" fill="#fff" stroke="#4f46e5" stroke-width="2"/>
      <line x1="350" y1="105" x2="350" y2="155" stroke="#c7d2fe"/>
      <text x="315" y="136" text-anchor="middle" font-weight="700" fill="#1e1b4b">20</text>
      <text x="370" y="136" text-anchor="middle" fill="#4f46e5">●</text>
    </g>
    <g>
      <rect x="460" y="105" width="110" height="50" rx="8" fill="#fff" stroke="#4f46e5" stroke-width="2"/>
      <line x1="530" y1="105" x2="530" y2="155" stroke="#c7d2fe"/>
      <text x="495" y="136" text-anchor="middle" font-weight="700" fill="#1e1b4b">30</text>
      <text x="550" y="136" text-anchor="middle" fill="#9ca3af">⏚</text>
    </g>
  </g>
  <text x="552" y="178" text-anchor="middle" font-size="10" fill="#9ca3af">NULL (конец)</text>

  <!-- pointer arrows -->
  <path d="M 190 130 L 278 130" stroke="#4f46e5" stroke-width="2" fill="none"/><polygon points="280,130 271,126 271,134" fill="#4f46e5"/>
  <path d="M 370 130 L 458 130" stroke="#4f46e5" stroke-width="2" fill="none"/><polygon points="460,130 451,126 451,134" fill="#4f46e5"/>

  <rect x="60" y="200" width="600" height="62" rx="8" fill="#fff" stroke="#a5b4fc"/>
  <text x="78" y="223" font-size="12.5" fill="#1e1b4b"><tspan font-weight="700">Вставка/удаление в начало — O(1)</tspan> (перецепил указатель), доступ по индексу — O(n) (идёшь по цепочке).</text>
  <text x="78" y="245" font-size="12" fill="#475569">↔ массив: доступ O(1), но вставка в середину O(n). Узлы разбросаны в памяти (хуже кэш).</text>
</svg>

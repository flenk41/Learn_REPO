<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="Segoe UI, Arial, sans-serif">
  <rect width="720" height="380" rx="16" fill="#eef2ff"/>
  <text x="360" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#312e81">Граф: обход в ширину (BFS) и в глубину (DFS)</text>

  <!-- BFS side -->
  <text x="180" y="70" text-anchor="middle" font-size="15" font-weight="700" fill="#4f46e5">BFS — очередь, по уровням</text>
  <!-- edges -->
  <line x1="180" y1="100" x2="110" y2="170" stroke="#94a3b8" stroke-width="2"/>
  <line x1="180" y1="100" x2="250" y2="170" stroke="#94a3b8" stroke-width="2"/>
  <line x1="110" y1="170" x2="110" y2="250" stroke="#94a3b8" stroke-width="2"/>
  <line x1="250" y1="170" x2="250" y2="250" stroke="#94a3b8" stroke-width="2"/>
  <!-- nodes with order -->
  <circle cx="180" cy="100" r="22" fill="#4f46e5"/><text x="180" y="106" text-anchor="middle" font-size="15" fill="#fff" font-weight="700">A</text>
  <text x="180" y="83" text-anchor="middle" font-size="11" fill="#16a34a">1</text>
  <circle cx="110" cy="170" r="22" fill="#818cf8"/><text x="110" y="176" text-anchor="middle" font-size="15" fill="#fff" font-weight="700">B</text>
  <text x="78" y="170" font-size="11" fill="#16a34a">2</text>
  <circle cx="250" cy="170" r="22" fill="#818cf8"/><text x="250" y="176" text-anchor="middle" font-size="15" fill="#fff" font-weight="700">C</text>
  <text x="282" y="170" font-size="11" fill="#16a34a">3</text>
  <circle cx="110" cy="250" r="22" fill="#c7d2fe"/><text x="110" y="256" text-anchor="middle" font-size="15" fill="#312e81" font-weight="700">D</text>
  <text x="78" y="250" font-size="11" fill="#16a34a">4</text>
  <circle cx="250" cy="250" r="22" fill="#c7d2fe"/><text x="250" y="256" text-anchor="middle" font-size="15" fill="#312e81" font-weight="700">E</text>
  <text x="282" y="250" font-size="11" fill="#16a34a">5</text>
  <text x="180" y="305" text-anchor="middle" font-size="12" fill="#475569">порядок: A → B,C → D,E (слоями)</text>
  <text x="180" y="325" text-anchor="middle" font-size="11.5" fill="#16a34a" font-weight="700">✅ кратчайший путь по рёбрам</text>

  <line x1="370" y1="80" x2="370" y2="330" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- DFS side -->
  <text x="540" y="70" text-anchor="middle" font-size="15" font-weight="700" fill="#dc2626">DFS — стек/рекурсия, вглубь</text>
  <line x1="540" y1="100" x2="470" y2="170" stroke="#94a3b8" stroke-width="2"/>
  <line x1="540" y1="100" x2="610" y2="170" stroke="#94a3b8" stroke-width="2"/>
  <line x1="470" y1="170" x2="470" y2="250" stroke="#94a3b8" stroke-width="2"/>
  <line x1="610" y1="170" x2="610" y2="250" stroke="#94a3b8" stroke-width="2"/>
  <circle cx="540" cy="100" r="22" fill="#dc2626"/><text x="540" y="106" text-anchor="middle" font-size="15" fill="#fff" font-weight="700">A</text>
  <text x="540" y="83" text-anchor="middle" font-size="11" fill="#16a34a">1</text>
  <circle cx="470" cy="170" r="22" fill="#f87171"/><text x="470" y="176" text-anchor="middle" font-size="15" fill="#fff" font-weight="700">B</text>
  <text x="438" y="170" font-size="11" fill="#16a34a">2</text>
  <circle cx="470" cy="250" r="22" fill="#fca5a5"/><text x="470" y="256" text-anchor="middle" font-size="15" fill="#7f1d1d" font-weight="700">D</text>
  <text x="438" y="250" font-size="11" fill="#16a34a">3</text>
  <circle cx="610" cy="170" r="22" fill="#f87171"/><text x="610" y="176" text-anchor="middle" font-size="15" fill="#fff" font-weight="700">C</text>
  <text x="640" y="170" font-size="11" fill="#16a34a">4</text>
  <circle cx="610" cy="250" r="22" fill="#fca5a5"/><text x="610" y="256" text-anchor="middle" font-size="15" fill="#7f1d1d" font-weight="700">E</text>
  <text x="640" y="250" font-size="11" fill="#16a34a">5</text>
  <text x="540" y="305" text-anchor="middle" font-size="12" fill="#475569">порядок: A → B → D, назад → C → E</text>
  <text x="540" y="325" text-anchor="middle" font-size="11.5" fill="#dc2626" font-weight="700">✅ связность, циклы, все пути</text>

  <text x="360" y="362" text-anchor="middle" font-size="11.5" font-style="italic" fill="#4338ca">оба O(V+E) · отмечай посещённые, иначе зациклишься!</text>
</svg>

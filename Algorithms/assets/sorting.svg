<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="Segoe UI, Arial, sans-serif">
  <rect width="720" height="360" rx="16" fill="#eef2ff"/>
  <text x="360" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#312e81">Сортировка слиянием — «разделяй и властвуй»</text>

  <!-- top -->
  <rect x="270" y="60" width="180" height="34" rx="5" fill="#4f46e5"/>
  <text x="360" y="83" text-anchor="middle" font-size="14" fill="#fff" font-family="Consolas, monospace">8 3 5 1</text>

  <!-- divide -->
  <line x1="320" y1="94" x2="200" y2="120" stroke="#818cf8" stroke-width="2" marker-end="url(#as)"/>
  <line x1="400" y1="94" x2="520" y2="120" stroke="#818cf8" stroke-width="2" marker-end="url(#as)"/>
  <rect x="150" y="124" width="100" height="32" rx="5" fill="#fff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="200" y="146" text-anchor="middle" font-size="13" fill="#312e81" font-family="Consolas, monospace">8 3</text>
  <rect x="470" y="124" width="100" height="32" rx="5" fill="#fff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="520" y="146" text-anchor="middle" font-size="13" fill="#312e81" font-family="Consolas, monospace">5 1</text>
  <text x="360" y="146" text-anchor="middle" font-size="13" font-weight="700" fill="#d97706">РАЗДЕЛИ ↓</text>

  <!-- singles -->
  <g font-family="Consolas, monospace" font-size="13" text-anchor="middle">
    <rect x="150" y="180" width="40" height="30" rx="4" fill="#e0e7ff"/><text x="170" y="201">8</text>
    <rect x="200" y="180" width="40" height="30" rx="4" fill="#e0e7ff"/><text x="220" y="201">3</text>
    <rect x="470" y="180" width="40" height="30" rx="4" fill="#e0e7ff"/><text x="490" y="201">5</text>
    <rect x="520" y="180" width="40" height="30" rx="4" fill="#e0e7ff"/><text x="540" y="201">1</text>
  </g>

  <!-- merge up -->
  <text x="360" y="240" text-anchor="middle" font-size="13" font-weight="700" fill="#16a34a">СЛИВАЙ отсортированные ↑</text>
  <rect x="150" y="252" width="100" height="32" rx="5" fill="#dcfce7" stroke="#16a34a"/>
  <text x="200" y="274" text-anchor="middle" font-size="13" fill="#166534" font-family="Consolas, monospace">3 8</text>
  <rect x="470" y="252" width="100" height="32" rx="5" fill="#dcfce7" stroke="#16a34a"/>
  <text x="520" y="274" text-anchor="middle" font-size="13" fill="#166534" font-family="Consolas, monospace">1 5</text>

  <rect x="270" y="298" width="180" height="34" rx="5" fill="#16a34a"/>
  <text x="360" y="321" text-anchor="middle" font-size="14" fill="#fff" font-family="Consolas, monospace">1 3 5 8</text>

  <text x="615" y="200" font-size="13" font-weight="700" fill="#4338ca">O(n log n)</text>
  <text x="612" y="222" font-size="11" fill="#475569">log n уровней</text>
  <text x="612" y="238" font-size="11" fill="#475569">× n на уровень</text>

  <defs><marker id="as" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#818cf8"/></marker></defs>
</svg>

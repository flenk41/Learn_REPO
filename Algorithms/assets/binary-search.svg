<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="Segoe UI, Arial, sans-serif">
  <rect width="720" height="360" rx="16" fill="#eef2ff"/>
  <text x="360" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#312e81">Бинарный поиск — отбрось половину (O(log n))</text>
  <text x="360" y="60" text-anchor="middle" font-size="13" fill="#475569">найти 23 в отсортированном массиве</text>

  <!-- step 1 -->
  <text x="60" y="95" font-size="12" fill="#475569">шаг 1:</text>
  <g font-size="13" text-anchor="middle">
    <rect x="100" y="80" width="50" height="34" fill="#e5e7eb" stroke="#cbd5e1"/><text x="125" y="103">3</text>
    <rect x="150" y="80" width="50" height="34" fill="#e5e7eb" stroke="#cbd5e1"/><text x="175" y="103">8</text>
    <rect x="200" y="80" width="50" height="34" fill="#e5e7eb" stroke="#cbd5e1"/><text x="225" y="103">15</text>
    <rect x="250" y="80" width="50" height="34" fill="#4f46e5" stroke="#312e81"/><text x="275" y="103" fill="#fff">23</text>
    <rect x="300" y="80" width="50" height="34" fill="#e5e7eb" stroke="#cbd5e1"/><text x="325" y="103">42</text>
    <rect x="350" y="80" width="50" height="34" fill="#e5e7eb" stroke="#cbd5e1"/><text x="375" y="103">56</text>
    <rect x="400" y="80" width="50" height="34" fill="#e5e7eb" stroke="#cbd5e1"/><text x="425" y="103">91</text>
  </g>
  <text x="425" y="135" text-anchor="middle" font-size="11" fill="#dc2626">середина=42 &gt; 23 → отбрось правую</text>

  <!-- step 2 -->
  <text x="60" y="180" font-size="12" fill="#475569">шаг 2:</text>
  <g font-size="13" text-anchor="middle">
    <rect x="100" y="165" width="50" height="34" fill="#e5e7eb" stroke="#cbd5e1"/><text x="125" y="188">3</text>
    <rect x="150" y="165" width="50" height="34" fill="#fef3c7" stroke="#d97706"/><text x="175" y="188">8</text>
    <rect x="200" y="165" width="50" height="34" fill="#fef3c7" stroke="#d97706"/><text x="225" y="188">15</text>
    <rect x="250" y="165" width="50" height="34" fill="#4f46e5" stroke="#312e81"/><text x="275" y="188" fill="#fff">23</text>
    <rect x="300" y="165" width="170" height="34" fill="#fee2e2" stroke="#fca5a5"/><text x="385" y="188" fill="#991b1b">отброшено</text>
  </g>
  <text x="225" y="220" text-anchor="middle" font-size="11" fill="#d97706">середина=15 &lt; 23 → отбрось левую</text>

  <!-- step 3 -->
  <text x="60" y="265" font-size="12" fill="#475569">шаг 3:</text>
  <g font-size="13" text-anchor="middle">
    <rect x="250" y="250" width="50" height="34" fill="#16a34a" stroke="#166534"/><text x="275" y="273" fill="#fff">23 ✓</text>
  </g>
  <text x="370" y="273" font-size="13" fill="#16a34a" font-weight="700">найдено за 3 шага!</text>

  <text x="360" y="325" text-anchor="middle" font-size="12.5" fill="#4338ca">каждый шаг режет зону поиска вдвое → миллион элементов = ~20 шагов</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 390" font-family="Segoe UI, Arial, sans-serif">
  <rect width="760" height="390" rx="16" fill="#eef2ff"/>
  <text x="380" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#312e81">Двоичное дерево поиска (BST): поиск числа 7</text>

  <!-- edges -->
  <g stroke="#94a3b8" stroke-width="2">
    <line x1="380" y1="80" x2="240" y2="150"/>
    <line x1="380" y1="80" x2="520" y2="150"/>
    <line x1="240" y1="150" x2="160" y2="220"/>
    <line x1="240" y1="150" x2="320" y2="220"/>
    <line x1="520" y1="150" x2="450" y2="220"/>
    <line x1="520" y1="150" x2="600" y2="220"/>
  </g>
  <!-- highlighted path edges -->
  <g stroke="#f59e0b" stroke-width="3.5">
    <line x1="380" y1="80" x2="240" y2="150"/>
    <line x1="240" y1="150" x2="320" y2="220"/>
  </g>

  <!-- nodes -->
  <g text-anchor="middle" font-size="16" font-weight="700">
    <circle cx="380" cy="80" r="26" fill="#f59e0b"/><text x="380" y="86" fill="#fff">8</text>
    <circle cx="240" cy="150" r="24" fill="#f59e0b"/><text x="240" y="156" fill="#fff">4</text>
    <circle cx="520" cy="150" r="24" fill="#6366f1"/><text x="520" y="156" fill="#fff">12</text>
    <circle cx="160" cy="220" r="22" fill="#6366f1"/><text x="160" y="226" fill="#fff">2</text>
    <circle cx="320" cy="220" r="22" fill="#16a34a"/><text x="320" y="226" fill="#fff">7</text>
    <circle cx="450" cy="220" r="22" fill="#6366f1"/><text x="450" y="226" fill="#fff">10</text>
    <circle cx="600" cy="220" r="22" fill="#6366f1"/><text x="600" y="226" fill="#fff">14</text>
  </g>

  <!-- annotations -->
  <text x="430" y="84" font-size="11.5" fill="#b45309" font-weight="700">7 &lt; 8 → влево</text>
  <text x="300" y="150" font-size="11.5" fill="#b45309" font-weight="700">7 &gt; 4 → вправо</text>
  <text x="320" y="262" text-anchor="middle" font-size="11.5" fill="#16a34a" font-weight="700">нашли 7 за 3 шага ✓</text>

  <rect x="60" y="295" width="640" height="78" rx="10" fill="#e0e7ff"/>
  <text x="380" y="320" text-anchor="middle" font-size="12.5" fill="#3730a3">Правило BST: <tspan font-weight="700">слева — меньше</tspan> узла, <tspan font-weight="700">справа — больше</tspan>. На каждом шаге отбрасываешь половину дерева.</text>
  <text x="380" y="342" text-anchor="middle" font-size="12.5" fill="#3730a3">Поиск / вставка / удаление — <tspan font-weight="700">O(log n)</tspan> в сбалансированном дереве (как бинарный поиск, но в структуре).</text>
  <text x="380" y="363" text-anchor="middle" font-size="11.5" font-style="italic" fill="#4f46e5">⚠️ если дерево «вырождается» в список — становится O(n); отсюда балансировка (AVL, красно-чёрные)</text>
</svg>

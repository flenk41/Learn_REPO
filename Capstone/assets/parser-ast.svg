<svg viewBox="0 0 720 290" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="720" height="290" fill="#fff7ed" rx="12"/>
  <text x="360" y="30" text-anchor="middle" font-size="19" font-weight="700" fill="#7c2d12">Парсер: текст → токены → дерево (AST)</text>

  <!-- source -->
  <rect x="30" y="60" width="150" height="40" rx="8" fill="#fff" stroke="#c2410c" stroke-width="2"/>
  <text x="105" y="85" text-anchor="middle" font-size="13" font-family="monospace" fill="#7c2d12">2 + 3 * 4</text>

  <!-- tokens -->
  <g font-size="11" font-family="monospace">
    <rect x="220" y="62" width="34" height="36" rx="4" fill="#ffedd5" stroke="#c2410c"/><text x="237" y="85" text-anchor="middle" fill="#7c2d12">2</text>
    <rect x="258" y="62" width="34" height="36" rx="4" fill="#ffedd5" stroke="#c2410c"/><text x="275" y="85" text-anchor="middle" fill="#7c2d12">+</text>
    <rect x="296" y="62" width="34" height="36" rx="4" fill="#ffedd5" stroke="#c2410c"/><text x="313" y="85" text-anchor="middle" fill="#7c2d12">3</text>
    <rect x="334" y="62" width="34" height="36" rx="4" fill="#ffedd5" stroke="#c2410c"/><text x="351" y="85" text-anchor="middle" fill="#7c2d12">*</text>
    <rect x="372" y="62" width="34" height="36" rx="4" fill="#ffedd5" stroke="#c2410c"/><text x="389" y="85" text-anchor="middle" fill="#7c2d12">4</text>
  </g>
  <text x="313" y="118" text-anchor="middle" font-size="9" fill="#6b7280">токены (лексер)</text>

  <!-- AST -->
  <g>
    <circle cx="560" cy="75" r="20" fill="#c2410c"/><text x="560" y="80" text-anchor="middle" font-size="14" fill="#fff">+</text>
    <circle cx="510" cy="135" r="18" fill="#ea580c"/><text x="510" y="140" text-anchor="middle" font-size="13" fill="#fff">2</text>
    <circle cx="610" cy="135" r="20" fill="#c2410c"/><text x="610" y="140" text-anchor="middle" font-size="14" fill="#fff">*</text>
    <circle cx="575" cy="195" r="18" fill="#ea580c"/><text x="575" y="200" text-anchor="middle" font-size="13" fill="#fff">3</text>
    <circle cx="645" cy="195" r="18" fill="#ea580c"/><text x="645" y="200" text-anchor="middle" font-size="13" fill="#fff">4</text>
    <g stroke="#7c2d12" stroke-width="2"><line x1="546" y1="88" x2="518" y2="120"/><line x1="574" y1="88" x2="600" y2="120"/><line x1="600" y1="151" x2="583" y2="180"/><line x1="622" y1="151" x2="639" y2="180"/></g>
  </g>
  <text x="585" y="232" text-anchor="middle" font-size="9.5" fill="#6b7280">AST: дерево учитывает приоритет (* ниже)</text>

  <g stroke="#c2410c" stroke-width="2" fill="none">
    <path d="M 180 80 L 216 80"/><polygon points="218,80 209,76 209,84" fill="#c2410c"/>
    <path d="M 408 80 L 506 75" /><polygon points="508,75 499,72 499,80" fill="#c2410c"/>
  </g>

  <rect x="30" y="248" width="650" height="0"/>
  <text x="360" y="270" text-anchor="middle" font-size="11.5" fill="#7c2d12">Лексер → токены, парсер → дерево (структура с приоритетами). Дальше дерево вычисляют/компилируют. Свой интерпретатор.</text>
</svg>

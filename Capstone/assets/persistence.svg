<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" font-family="Segoe UI, Arial, sans-serif">
  <rect width="760" height="380" rx="16" fill="#fff7ed"/>
  <text x="380" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#7c2d12">Персистентность: snapshot vs WAL</text>

  <!-- memory -->
  <rect x="300" y="58" width="160" height="40" rx="8" fill="#c2410c"/>
  <text x="380" y="83" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">хранилище в RAM</text>

  <defs><marker id="aw" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#c2410c"/></marker></defs>

  <!-- snapshot side -->
  <line x1="320" y1="100" x2="200" y2="140" stroke="#c2410c" stroke-width="2" marker-end="url(#aw)"/>
  <rect x="60" y="146" width="280" height="120" rx="10" fill="#fed7aa" stroke="#c2410c" stroke-width="2"/>
  <text x="200" y="170" text-anchor="middle" font-size="13.5" fill="#7c2d12" font-weight="700">SNAPSHOT (периодически)</text>
  <text x="200" y="194" text-anchor="middle" font-size="11.5" fill="#9a3412">дамп ВСЕГО состояния на диск</text>
  <text x="200" y="216" text-anchor="middle" font-size="11" fill="#16a34a">✅ компактно, быстрый рестарт</text>
  <text x="200" y="236" text-anchor="middle" font-size="11" fill="#b91c1c">❌ теряются изменения между снимками</text>
  <text x="200" y="256" text-anchor="middle" font-size="10.5" fill="#9a3412">(делать в fork/COW, не блокируя)</text>

  <!-- WAL side -->
  <line x1="440" y1="100" x2="560" y2="140" stroke="#c2410c" stroke-width="2" marker-end="url(#aw)"/>
  <rect x="420" y="146" width="280" height="120" rx="10" fill="#fdba74" stroke="#c2410c" stroke-width="2"/>
  <text x="560" y="170" text-anchor="middle" font-size="13.5" fill="#7c2d12" font-weight="700">WAL (журнал, каждую запись)</text>
  <text x="560" y="194" text-anchor="middle" font-size="11.5" fill="#9a3412">SET/DEL → дописать в лог на диск</text>
  <text x="560" y="216" text-anchor="middle" font-size="11" fill="#16a34a">✅ рестарт = переиграть лог</text>
  <text x="560" y="236" text-anchor="middle" font-size="11" fill="#9a3412">⚙️ fsync определяет долговечность</text>
  <text x="560" y="256" text-anchor="middle" font-size="10.5" fill="#9a3412">+ компакция растущего лога</text>

  <rect x="60" y="282" width="640" height="84" rx="10" fill="#ffedd5"/>
  <text x="380" y="306" text-anchor="middle" font-size="13" fill="#7c2d12" font-weight="700">Главный trade-off: долговечность ↔ скорость (через fsync)</text>
  <text x="380" y="328" text-anchor="middle" font-size="12" fill="#9a3412">fsync каждую запись → не потеряешь ничего, но медленно. fsync раз/сек → быстро, но теряешь до секунды.</text>
  <text x="380" y="350" text-anchor="middle" font-size="11.5" font-style="italic" fill="#c2410c">это «D» в ACID (durability). Redis/реальные БД комбинируют snapshot + WAL.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 330" font-family="Segoe UI, Arial, sans-serif">
  <rect width="660" height="330" fill="#ffffff"/>
  <text x="330" y="32" text-anchor="middle" font-size="21" font-weight="700" fill="#1a1a2e">RAII: деструктор освобождает ресурс сам</text>

  <!-- scope block -->
  <rect x="60" y="58" width="540" height="200" rx="10" fill="#f5f7fa" stroke="#00599c" stroke-width="2"/>
  <text x="80" y="82" font-size="20" font-weight="700" fill="#00599c" font-family="Consolas, monospace">{</text>

  <!-- constructor -->
  <rect x="100" y="96" width="460" height="44" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="120" y="123" font-size="14" font-weight="700" fill="#2e7d32" font-family="Consolas, monospace">Resource r;</text>
  <text x="560" y="123" text-anchor="end" font-size="12" fill="#2e7d32">← конструктор: ЗАХВАТ ресурса</text>

  <!-- work -->
  <rect x="100" y="148" width="460" height="40" rx="8" fill="#fff8e1" stroke="#f4b400" stroke-width="1.5"/>
  <text x="120" y="173" font-size="14" fill="#555" font-family="Consolas, monospace">... работаем (даже если тут throw) ...</text>

  <!-- destructor auto -->
  <rect x="100" y="196" width="460" height="44" rx="8" fill="#ffebee" stroke="#e57373" stroke-width="2"/>
  <text x="120" y="223" font-size="14" font-weight="700" fill="#c62828" font-family="Consolas, monospace">(конец блока)</text>
  <text x="560" y="223" text-anchor="end" font-size="12" fill="#c62828">← деструктор: ОСВОБОЖДЕНИЕ автоматически</text>

  <text x="80" y="252" font-size="20" font-weight="700" fill="#00599c" font-family="Consolas, monospace">}</text>

  <rect x="60" y="278" width="540" height="42" rx="8" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="330" y="298" text-anchor="middle" font-size="13" font-weight="700" fill="#2e7d32">Деструктор вызывается ГАРАНТИРОВАННО на выходе из {} —</text>
  <text x="330" y="314" text-anchor="middle" font-size="12" fill="#555">даже при исключении (stack unwinding). Утечки невозможны. delete не нужен.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" font-family="Segoe UI, Arial, sans-serif">
  <rect width="760" height="380" rx="16" fill="#f0f6fb"/>
  <text x="380" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#00599c">Вариативные шаблоны и fold expressions</text>

  <rect x="60" y="58" width="640" height="56" rx="10" fill="#00599c"/>
  <text x="380" y="82" text-anchor="middle" font-size="13" fill="#fff" font-family="Consolas,monospace">template &lt;typename... Args&gt;  void f(Args... args)</text>
  <text x="380" y="102" text-anchor="middle" font-size="11.5" fill="#cfe2f3">пакет: любое число типов/значений · sizeof...(Args) = их количество</text>

  <!-- two ways -->
  <text x="200" y="150" text-anchor="middle" font-size="13.5" font-weight="700" fill="#c62828">Рекурсия (до C++17)</text>
  <rect x="60" y="160" width="280" height="80" rx="8" fill="#fff" stroke="#c62828" stroke-width="1.5"/>
  <text x="74" y="182" font-size="10.5" font-family="Consolas,monospace" fill="#7f1d1d">f(First first, Rest... rest) {</text>
  <text x="74" y="198" font-size="10.5" font-family="Consolas,monospace" fill="#7f1d1d">  use(first);</text>
  <text x="74" y="214" font-size="10.5" font-family="Consolas,monospace" fill="#7f1d1d">  f(rest...);  // хвост</text>
  <text x="74" y="230" font-size="10.5" font-family="Consolas,monospace" fill="#7f1d1d">}  // + база f()</text>

  <text x="560" y="150" text-anchor="middle" font-size="13.5" font-weight="700" fill="#2e7d32">Fold expression (C++17)</text>
  <rect x="420" y="160" width="280" height="80" rx="8" fill="#fff" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="434" y="184" font-size="11" font-family="Consolas,monospace" fill="#1b5e20">(use(args), ...);</text>
  <text x="434" y="206" font-size="10.5" fill="#388e3c">разворачивается в:</text>
  <text x="434" y="224" font-size="10.5" font-family="Consolas,monospace" fill="#1b5e20">use(a), use(b), use(c)</text>

  <rect x="60" y="258" width="640" height="100" rx="10" fill="#e8f0fe"/>
  <text x="380" y="280" text-anchor="middle" font-size="12.5" fill="#00599c" font-weight="700">4 формы fold (op — оператор, pack — пакет):</text>
  <g font-size="11.5" fill="#1a1a2e" font-family="Consolas,monospace">
    <text x="90" y="304">(... op pack)         левая:  ((a op b) op c)</text>
    <text x="90" y="324">(pack op ...)         правая: (a op (b op c))</text>
    <text x="400" y="304">(init op ... op pack)  левая с init</text>
    <text x="400" y="324">(pack op ... op init)  правая с init</text>
  </g>
  <text x="380" y="348" text-anchor="middle" font-size="11.5" font-style="italic" fill="#00599c">всё на этапе компиляции, zero-cost · основа make_unique, tuple, emplace</text>
</svg>

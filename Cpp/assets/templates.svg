<svg viewBox="0 0 720 290" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="720" height="290" fill="#f0f6fb" rx="12"/>
  <text x="360" y="30" text-anchor="middle" font-size="19" font-weight="700" fill="#00599c">Шаблоны: один код → много конкретных типов</text>

  <!-- template -->
  <rect x="210" y="55" width="300" height="64" rx="10" fill="#fff" stroke="#00599c" stroke-width="2.5"/>
  <text x="360" y="80" text-anchor="middle" font-size="13" font-family="monospace" fill="#00599c">template&lt;class T&gt;</text>
  <text x="360" y="102" text-anchor="middle" font-size="13" font-family="monospace" fill="#1a1a2e">T max(T a, T b){...}</text>
  <text x="360" y="138" text-anchor="middle" font-size="11" fill="#6b7280">пишешь ОДИН раз, для любого типа T</text>

  <!-- instantiations -->
  <g font-family="monospace" font-size="12">
    <rect x="40" y="175" width="190" height="58" rx="8" fill="#e3f2fd" stroke="#00599c"/>
    <text x="135" y="198" text-anchor="middle" font-weight="700" fill="#00599c">max&lt;int&gt;</text>
    <text x="135" y="218" text-anchor="middle" fill="#1a1a2e">int max(int,int)</text>

    <rect x="265" y="175" width="190" height="58" rx="8" fill="#e3f2fd" stroke="#00599c"/>
    <text x="360" y="198" text-anchor="middle" font-weight="700" fill="#00599c">max&lt;double&gt;</text>
    <text x="360" y="218" text-anchor="middle" fill="#1a1a2e">double max(...)</text>

    <rect x="490" y="175" width="190" height="58" rx="8" fill="#e3f2fd" stroke="#00599c"/>
    <text x="585" y="198" text-anchor="middle" font-weight="700" fill="#00599c">max&lt;string&gt;</text>
    <text x="585" y="218" text-anchor="middle" fill="#1a1a2e">string max(...)</text>
  </g>

  <g stroke="#2e7d32" stroke-width="2" fill="none">
    <path d="M 300 119 L 150 173"/><polygon points="148,174 157,172 153,180" fill="#2e7d32"/>
    <path d="M 360 119 L 360 173"/><polygon points="360,175 356,166 364,166" fill="#2e7d32"/>
    <path d="M 420 119 L 570 173"/><polygon points="572,174 563,172 567,180" fill="#2e7d32"/>
  </g>
  <text x="500" y="150" font-size="10.5" fill="#2e7d32">компилятор генерирует версию под каждый тип</text>

  <text x="360" y="262" text-anchor="middle" font-size="12" fill="#00599c">Типобезопасно (в отличие от макросов) + без дублирования кода. Основа STL (vector&lt;T&gt;, map&lt;K,V&gt;).</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 320" font-family="Segoe UI, Arial, sans-serif">
  <rect width="660" height="320" fill="#ffffff"/>
  <text x="330" y="30" text-anchor="middle" font-size="21" font-weight="700" fill="#1a1a2e">Виртуальные функции: vtable в памяти</text>
  <text x="330" y="52" text-anchor="middle" font-size="13" fill="#666" font-family="Consolas, monospace">Animal&amp; a → a.speak()  вызовет нужную версию</text>

  <defs>
    <marker id="vt" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#00599c"/>
    </marker>
  </defs>

  <!-- Dog object -->
  <text x="120" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#2e7d32">объект Dog</text>
  <rect x="50" y="100" width="140" height="70" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="65" y="125" font-size="12" font-weight="700" fill="#2e7d32" font-family="Consolas, monospace">vptr ●</text>
  <line x1="50" y1="135" x2="190" y2="135" stroke="#43a047"/>
  <text x="65" y="155" font-size="12" fill="#555" font-family="Consolas, monospace">name</text>

  <!-- Dog vtable -->
  <rect x="290" y="95" width="200" height="56" rx="8" fill="#fff8e1" stroke="#f4b400" stroke-width="2"/>
  <text x="390" y="115" text-anchor="middle" font-size="12" font-weight="700" fill="#bb8a00">vtable Dog</text>
  <text x="390" y="138" text-anchor="middle" font-size="12" fill="#555" font-family="Consolas, monospace">speak → Dog::speak</text>
  <path d="M120 125 C 200 120, 240 120, 286 120" fill="none" stroke="#00599c" stroke-width="2" marker-end="url(#vt)"/>

  <!-- Cat object -->
  <text x="120" y="210" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">объект Cat</text>
  <rect x="50" y="220" width="140" height="70" rx="8" fill="#e8f0fe" stroke="#3776ab" stroke-width="2"/>
  <text x="65" y="245" font-size="12" font-weight="700" fill="#1565c0" font-family="Consolas, monospace">vptr ●</text>
  <line x1="50" y1="255" x2="190" y2="255" stroke="#3776ab"/>
  <text x="65" y="275" font-size="12" fill="#555" font-family="Consolas, monospace">name</text>

  <!-- Cat vtable -->
  <rect x="290" y="215" width="200" height="56" rx="8" fill="#fff8e1" stroke="#f4b400" stroke-width="2"/>
  <text x="390" y="235" text-anchor="middle" font-size="12" font-weight="700" fill="#bb8a00">vtable Cat</text>
  <text x="390" y="258" text-anchor="middle" font-size="12" fill="#555" font-family="Consolas, monospace">speak → Cat::speak</text>
  <path d="M120 245 C 200 240, 240 240, 286 240" fill="none" stroke="#00599c" stroke-width="2" marker-end="url(#vt)"/>

  <text x="575" y="125" text-anchor="middle" font-size="11" fill="#888">Гав!</text>
  <text x="575" y="245" text-anchor="middle" font-size="11" fill="#888">Мяу!</text>
  <path d="M492 120 L 558 120" stroke="#ccc" stroke-width="1.5" marker-end="url(#vt)"/>
  <path d="M492 240 L 558 240" stroke="#ccc" stroke-width="1.5" marker-end="url(#vt)"/>

  <text x="330" y="308" text-anchor="middle" font-size="12" fill="#888">Каждый объект хранит vptr → таблицу своего класса. Вызов идёт через неё.</text>
</svg>

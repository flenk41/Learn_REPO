<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="Segoe UI, Arial, sans-serif">
  <rect width="720" height="400" rx="16" fill="#f0fdf4"/>
  <text x="360" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#14532d">Полиморфизм — один вызов, разное поведение ⭐⭐</text>

  <!-- base -->
  <rect x="280" y="70" width="160" height="56" rx="10" fill="#047857"/>
  <text x="360" y="94" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Фигура</text>
  <text x="360" y="114" text-anchor="middle" font-size="12" fill="#a7f3d0">площадь()  ← контракт</text>

  <!-- inheritance lines -->
  <line x1="320" y1="126" x2="160" y2="180" stroke="#059669" stroke-width="2" marker-end="url(#ip)"/>
  <line x1="360" y1="126" x2="360" y2="180" stroke="#059669" stroke-width="2" marker-end="url(#ip)"/>
  <line x1="400" y1="126" x2="560" y2="180" stroke="#059669" stroke-width="2" marker-end="url(#ip)"/>

  <!-- subclasses -->
  <rect x="90" y="184" width="140" height="64" rx="10" fill="#fff" stroke="#059669" stroke-width="2"/>
  <text x="160" y="208" text-anchor="middle" font-size="13.5" font-weight="700" fill="#065f46">Круг</text>
  <text x="160" y="230" text-anchor="middle" font-size="11" fill="#047857">площадь = πr²</text>

  <rect x="290" y="184" width="140" height="64" rx="10" fill="#fff" stroke="#059669" stroke-width="2"/>
  <text x="360" y="208" text-anchor="middle" font-size="13.5" font-weight="700" fill="#065f46">Квадрат</text>
  <text x="360" y="230" text-anchor="middle" font-size="11" fill="#047857">площадь = a²</text>

  <rect x="490" y="184" width="140" height="64" rx="10" fill="#fff" stroke="#059669" stroke-width="2"/>
  <text x="560" y="208" text-anchor="middle" font-size="13.5" font-weight="700" fill="#065f46">Треугольник</text>
  <text x="560" y="230" text-anchor="middle" font-size="11" fill="#047857">площадь = ½bh</text>

  <!-- code box -->
  <rect x="120" y="280" width="480" height="80" rx="10" fill="#0f172a"/>
  <text x="140" y="306" font-size="12.5" font-family="Consolas, monospace" fill="#e2e8f0">for ф in [Круг(2), Квадрат(3), Треугольник(...)]:</text>
  <text x="140" y="328" font-size="12.5" font-family="Consolas, monospace" fill="#5eead4">    ф.площадь()   # код НЕ знает тип — каждый сам считает</text>
  <text x="140" y="350" font-size="11.5" font-family="Consolas, monospace" fill="#94a3b8">    # новая фигура = новый класс, цикл НЕ меняется (OCP)</text>

  <defs><marker id="ip" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#059669"/></marker></defs>
</svg>

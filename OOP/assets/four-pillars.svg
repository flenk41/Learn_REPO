<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="Segoe UI, Arial, sans-serif">
  <rect width="720" height="400" rx="16" fill="#f0fdf4"/>
  <text x="360" y="40" text-anchor="middle" font-size="22" font-weight="800" fill="#14532d">🏛️ Четыре столпа ООП ⭐⭐</text>

  <!-- roof -->
  <polygon points="60,90 660,90 600,70 120,70" fill="#047857"/>
  <text x="360" y="106" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">ОБЪЕКТНО-ОРИЕНТИРОВАННОЕ ПРОГРАММИРОВАНИЕ</text>

  <!-- four columns -->
  <g>
    <rect x="70" y="120" width="135" height="210" rx="8" fill="#fff" stroke="#059669" stroke-width="2"/>
    <text x="137" y="155" text-anchor="middle" font-size="30">🎭</text>
    <text x="137" y="188" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">Абстракция</text>
    <text x="137" y="222" text-anchor="middle" font-size="11.5" fill="#047857">выделить</text>
    <text x="137" y="240" text-anchor="middle" font-size="11.5" fill="#047857">главное,</text>
    <text x="137" y="258" text-anchor="middle" font-size="11.5" fill="#047857">скрыть детали</text>

    <rect x="217" y="120" width="135" height="210" rx="8" fill="#fff" stroke="#059669" stroke-width="2"/>
    <text x="284" y="155" text-anchor="middle" font-size="30">🔒</text>
    <text x="284" y="188" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">Инкапсуляция</text>
    <text x="284" y="222" text-anchor="middle" font-size="11.5" fill="#047857">спрятать</text>
    <text x="284" y="240" text-anchor="middle" font-size="11.5" fill="#047857">внутренности</text>
    <text x="284" y="258" text-anchor="middle" font-size="11.5" fill="#047857">за интерфейсом</text>

    <rect x="364" y="120" width="135" height="210" rx="8" fill="#fff" stroke="#059669" stroke-width="2"/>
    <text x="431" y="155" text-anchor="middle" font-size="30">🧬</text>
    <text x="431" y="188" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">Наследование</text>
    <text x="431" y="222" text-anchor="middle" font-size="11.5" fill="#047857">переиспользовать</text>
    <text x="431" y="240" text-anchor="middle" font-size="11.5" fill="#047857">через</text>
    <text x="431" y="258" text-anchor="middle" font-size="11.5" fill="#047857">«является»</text>

    <rect x="511" y="120" width="135" height="210" rx="8" fill="#fff" stroke="#059669" stroke-width="2"/>
    <text x="578" y="155" text-anchor="middle" font-size="30">🔄</text>
    <text x="578" y="188" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">Полиморфизм</text>
    <text x="578" y="222" text-anchor="middle" font-size="11.5" fill="#047857">один интерфейс,</text>
    <text x="578" y="240" text-anchor="middle" font-size="11.5" fill="#047857">разное</text>
    <text x="578" y="258" text-anchor="middle" font-size="11.5" fill="#047857">поведение</text>
  </g>

  <!-- base -->
  <rect x="60" y="338" width="600" height="30" rx="6" fill="#047857"/>
  <text x="360" y="358" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">фундамент: класс и объект</text>
</svg>

<svg viewBox="0 0 720 300" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="720" height="300" fill="#ecfdf5" rx="12"/>
  <text x="360" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#065f46">Инкапсуляция: публичный интерфейс прячет данные</text>

  <!-- capsule -->
  <rect x="220" y="70" width="280" height="180" rx="22" fill="#fff" stroke="#059669" stroke-width="2.5"/>
  <text x="360" y="98" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">class BankAccount</text>

  <!-- private core -->
  <rect x="255" y="115" width="210" height="70" rx="10" fill="#fee2e2" stroke="#b91c1c" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="360" y="137" text-anchor="middle" font-size="12" font-weight="700" fill="#b91c1c">🔒 private (скрыто)</text>
  <text x="360" y="157" text-anchor="middle" font-size="11" fill="#374151">- balance: double</text>
  <text x="360" y="174" text-anchor="middle" font-size="11" fill="#374151">- pin: string</text>

  <!-- public methods -->
  <rect x="255" y="195" width="210" height="44" rx="10" fill="#d1fae5" stroke="#059669"/>
  <text x="360" y="214" text-anchor="middle" font-size="11.5" font-weight="700" fill="#065f46">+ deposit() + withdraw()</text>
  <text x="360" y="231" text-anchor="middle" font-size="11" fill="#047857">+ getBalance()  ← публичный API</text>

  <!-- outside access -->
  <text x="80" y="150" font-size="12.5" font-weight="700" fill="#065f46">снаружи:</text>
  <path d="M 90 175 L 250 215" stroke="#15803d" stroke-width="2" fill="none"/><polygon points="252,216 243,212 244,220" fill="#15803d"/>
  <text x="95" y="195" font-size="11" fill="#15803d">✓ acc.withdraw(100)</text>
  <path d="M 90 230 L 253 160" stroke="#b91c1c" stroke-width="2" fill="none" stroke-dasharray="5 3"/>
  <text x="95" y="248" font-size="11" fill="#b91c1c">✗ acc.balance = 999999</text>
  <text x="95" y="264" font-size="9.5" fill="#6b7280">(нельзя — данные защищены)</text>

  <!-- right note -->
  <rect x="520" y="110" width="180" height="130" rx="8" fill="#fff" stroke="#a7f3d0"/>
  <text x="610" y="133" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">зачем</text>
  <text x="535" y="156" font-size="10.5" fill="#374151">• данные меняются только</text>
  <text x="535" y="171" font-size="10.5" fill="#374151">  через методы (контроль)</text>
  <text x="535" y="190" font-size="10.5" fill="#374151">• инварианты целы</text>
  <text x="535" y="205" font-size="10.5" fill="#374151">  (баланс ≥ 0)</text>
  <text x="535" y="224" font-size="10.5" fill="#374151">• внутри можно менять,</text>
  <text x="535" y="237" font-size="10.5" fill="#374151">  не ломая пользователей</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" font-family="Segoe UI, Arial, sans-serif">
  <rect width="760" height="400" rx="16" fill="#ecfdf5"/>
  <text x="380" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#064e3b">Чистая архитектура: слои и направление зависимостей</text>

  <!-- concentric rings -->
  <circle cx="300" cy="220" r="150" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <circle cx="300" cy="220" r="110" fill="#a7f3d0" stroke="#059669" stroke-width="2"/>
  <circle cx="300" cy="220" r="65" fill="#6ee7b7" stroke="#059669" stroke-width="2"/>

  <text x="300" y="100" text-anchor="middle" font-size="12.5" fill="#064e3b" font-weight="700">Интерфейс (UI, API, CLI)</text>
  <text x="300" y="155" text-anchor="middle" font-size="12.5" fill="#064e3b" font-weight="700">Сценарии (use cases)</text>
  <text x="300" y="216" text-anchor="middle" font-size="13" fill="#064e3b" font-weight="700">Сущности</text>
  <text x="300" y="234" text-anchor="middle" font-size="10.5" fill="#065f46">бизнес-правила</text>

  <!-- dependency arrow -->
  <defs><marker id="ae" markerWidth="11" markerHeight="11" refX="8" refY="4.5" orient="auto"><path d="M0,0 L10,4.5 L0,9 z" fill="#dc2626"/></marker></defs>
  <line x1="300" y1="80" x2="300" y2="150" stroke="#dc2626" stroke-width="3" marker-end="url(#ae)"/>
  <text x="470" y="220" text-anchor="middle" font-size="12.5" fill="#dc2626" font-weight="700">зависимости</text>
  <text x="470" y="240" text-anchor="middle" font-size="12.5" fill="#dc2626" font-weight="700">направлены ВНУТРЬ →</text>
  <line x1="385" y1="255" x2="365" y2="245" stroke="#dc2626" stroke-width="3" marker-end="url(#ae)"/>

  <!-- side notes -->
  <g font-size="12">
    <text x="560" y="110" fill="#065f46" font-weight="700">Правило слоёв:</text>
    <text x="560" y="135" fill="#064e3b">• ядро (сущности) ни от</text>
    <text x="572" y="153" fill="#064e3b">кого не зависит</text>
    <text x="560" y="178" fill="#064e3b">• внешние слои зависят</text>
    <text x="572" y="196" fill="#064e3b">от внутренних, не наоборот</text>
    <text x="560" y="221" fill="#064e3b">• БД и UI — «детали»</text>
    <text x="572" y="239" fill="#064e3b">на краю, их легко заменить</text>
    <text x="560" y="270" fill="#059669" font-weight="700" font-style="italic">меняешь фреймворк —</text>
    <text x="560" y="288" fill="#059669" font-weight="700" font-style="italic">бизнес-логика не страдает</text>
  </g>

  <rect x="60" y="345" width="640" height="42" rx="10" fill="#d1fae5"/>
  <text x="380" y="371" text-anchor="middle" font-size="12.5" fill="#064e3b">Суть: <tspan font-weight="700">бизнес-логика в центре и независима</tspan>; базы, веб и UI — заменяемые детали снаружи (принцип DIP).</text>
</svg>

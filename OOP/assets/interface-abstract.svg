<svg viewBox="0 0 720 300" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="720" height="300" fill="#ecfdf5" rx="12"/>
  <text x="360" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#065f46">Интерфейс = контракт, реализации его выполняют</text>

  <!-- interface -->
  <rect x="270" y="58" width="180" height="74" rx="10" fill="#fff" stroke="#059669" stroke-width="2.5"/>
  <text x="360" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">«interface» Shape</text>
  <text x="360" y="101" text-anchor="middle" font-size="11" fill="#374151">area() — что УМЕТЬ</text>
  <text x="360" y="118" text-anchor="middle" font-size="11" fill="#374151">draw() — БЕЗ реализации</text>

  <!-- implementations -->
  <g>
    <rect x="60" y="195" width="170" height="70" rx="10" fill="#d1fae5" stroke="#059669"/>
    <text x="145" y="218" text-anchor="middle" font-size="12.5" font-weight="700" fill="#065f46">Circle</text>
    <text x="145" y="238" text-anchor="middle" font-size="10.5" fill="#374151">area = π·r²</text>
    <text x="145" y="254" text-anchor="middle" font-size="10.5" fill="#374151">draw: рисует круг</text>

    <rect x="275" y="195" width="170" height="70" rx="10" fill="#d1fae5" stroke="#059669"/>
    <text x="360" y="218" text-anchor="middle" font-size="12.5" font-weight="700" fill="#065f46">Rectangle</text>
    <text x="360" y="238" text-anchor="middle" font-size="10.5" fill="#374151">area = w·h</text>
    <text x="360" y="254" text-anchor="middle" font-size="10.5" fill="#374151">draw: рисует прямоуг.</text>

    <rect x="490" y="195" width="170" height="70" rx="10" fill="#d1fae5" stroke="#059669"/>
    <text x="575" y="218" text-anchor="middle" font-size="12.5" font-weight="700" fill="#065f46">Triangle</text>
    <text x="575" y="238" text-anchor="middle" font-size="10.5" fill="#374151">area = ½·b·h</text>
    <text x="575" y="254" text-anchor="middle" font-size="10.5" fill="#374151">draw: рисует треуг.</text>
  </g>

  <!-- implements arrows (hollow triangle) -->
  <g stroke="#059669" stroke-width="2" fill="none">
    <path d="M 145 195 L 300 134"/>
    <path d="M 360 195 L 360 134"/>
    <path d="M 575 195 L 420 134"/>
  </g>
  <polygon points="360,134 352,148 368,148" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="470" y="165" font-size="10.5" fill="#047857">implements (выполняют контракт)</text>

  <rect x="60" y="278" width="600" height="0"/>
  <text x="360" y="292" text-anchor="middle" font-size="11.5" fill="#065f46">Код работает с Shape — любую реализацию можно подставить (полиморфизм). Интерфейс = «ЧТО», классы = «КАК».</text>
</svg>

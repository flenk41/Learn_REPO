<svg viewBox="0 0 720 290" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="720" height="290" fill="#ecfdf5" rx="12"/>
  <text x="360" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#065f46">Порождающие паттерны: как создавать объекты</text>

  <rect x="30" y="60" width="210" height="180" rx="10" fill="#fff" stroke="#059669" stroke-width="2"/>
  <text x="135" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">Factory</text>
  <text x="135" y="108" text-anchor="middle" font-size="10.5" fill="#374151">фабрика решает,</text>
  <text x="135" y="124" text-anchor="middle" font-size="10.5" fill="#374151">КАКОЙ объект создать</text>
  <rect x="55" y="140" width="160" height="32" rx="6" fill="#d1fae5"/><text x="135" y="161" text-anchor="middle" font-size="10.5" fill="#065f46">create("circle") → Circle</text>
  <text x="135" y="195" text-anchor="middle" font-size="10" fill="#6b7280">скрывает конкретный класс;</text>
  <text x="135" y="210" text-anchor="middle" font-size="10" fill="#6b7280">клиент знает только интерфейс</text>

  <rect x="255" y="60" width="210" height="180" rx="10" fill="#fff" stroke="#059669" stroke-width="2"/>
  <text x="360" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">Builder</text>
  <text x="360" y="108" text-anchor="middle" font-size="10.5" fill="#374151">собирает СЛОЖНЫЙ объект</text>
  <text x="360" y="124" text-anchor="middle" font-size="10.5" fill="#374151">по шагам</text>
  <rect x="280" y="140" width="160" height="50" rx="6" fill="#d1fae5"/>
  <text x="360" y="158" text-anchor="middle" font-size="10" fill="#065f46">.setEngine().setColor()</text>
  <text x="360" y="175" text-anchor="middle" font-size="10" fill="#065f46">.addGPS().build()</text>
  <text x="360" y="210" text-anchor="middle" font-size="10" fill="#6b7280">вместо конструктора на 10 аргументов</text>

  <rect x="480" y="60" width="210" height="180" rx="10" fill="#fff" stroke="#059669" stroke-width="2"/>
  <text x="585" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">Singleton</text>
  <text x="585" y="108" text-anchor="middle" font-size="10.5" fill="#374151">РОВНО ОДИН экземпляр</text>
  <text x="585" y="124" text-anchor="middle" font-size="10.5" fill="#374151">на всю программу</text>
  <rect x="505" y="140" width="160" height="32" rx="6" fill="#d1fae5"/><text x="585" y="161" text-anchor="middle" font-size="10.5" fill="#065f46">getInstance()</text>
  <text x="585" y="195" text-anchor="middle" font-size="10" fill="#b45309">⚠️ часто антипаттерн</text>
  <text x="585" y="210" text-anchor="middle" font-size="10" fill="#6b7280">(глобальное состояние) — осторожно</text>

  <text x="360" y="270" text-anchor="middle" font-size="11.5" fill="#065f46">Паттерн — проверенное решение типовой задачи. Общий словарь команды, а не «магия».</text>
</svg>

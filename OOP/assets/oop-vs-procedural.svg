<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="Segoe UI, Arial, sans-serif">
  <rect width="720" height="400" rx="16" fill="#f0fdf4"/>
  <text x="360" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#14532d">Процедурное против ООП</text>

  <!-- procedural -->
  <rect x="40" y="70" width="300" height="290" rx="12" fill="#fff" stroke="#94a3b8" stroke-width="2"/>
  <text x="190" y="98" text-anchor="middle" font-size="16" font-weight="700" fill="#334155">Процедурное</text>
  <g font-size="12.5">
    <rect x="60" y="118" width="260" height="40" rx="7" fill="#e2e8f0"/><text x="190" y="143" text-anchor="middle" fill="#334155">данные (вперемешку, открыты)</text>
    <rect x="60" y="170" width="80" height="32" rx="6" fill="#fef9c3"/><text x="100" y="191" text-anchor="middle" fill="#713f12">функция1</text>
    <rect x="150" y="170" width="80" height="32" rx="6" fill="#fef9c3"/><text x="190" y="191" text-anchor="middle" fill="#713f12">функция2</text>
    <rect x="240" y="170" width="80" height="32" rx="6" fill="#fef9c3"/><text x="280" y="191" text-anchor="middle" fill="#713f12">функция3</text>
  </g>
  <line x1="100" y1="170" x2="160" y2="158" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="190" y1="170" x2="190" y2="158" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="280" y1="170" x2="220" y2="158" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="190" y="245" text-anchor="middle" font-size="12" fill="#64748b">функции работают над</text>
  <text x="190" y="263" text-anchor="middle" font-size="12" fill="#64748b">общими открытыми данными</text>
  <text x="190" y="320" text-anchor="middle" font-size="12.5" font-style="italic" fill="#b91c1c">всё связано → менять страшно</text>

  <!-- OOP -->
  <rect x="380" y="70" width="300" height="290" rx="12" fill="#fff" stroke="#059669" stroke-width="2.5"/>
  <text x="530" y="98" text-anchor="middle" font-size="16" font-weight="700" fill="#047857">ООП</text>
  <g>
    <rect x="400" y="115" width="260" height="80" rx="10" fill="#d1fae5" stroke="#059669"/>
    <text x="530" y="138" text-anchor="middle" font-size="13.5" font-weight="700" fill="#065f46">Объект «Пользователь»</text>
    <text x="530" y="160" text-anchor="middle" font-size="12" fill="#047857">данные: имя, email (скрыты)</text>
    <text x="530" y="180" text-anchor="middle" font-size="12" fill="#047857">поведение: войти(), сменить()</text>
  </g>
  <g>
    <rect x="400" y="208" width="125" height="64" rx="10" fill="#d1fae5" stroke="#059669"/>
    <text x="462" y="232" text-anchor="middle" font-size="12.5" font-weight="700" fill="#065f46">Заказ</text>
    <text x="462" y="252" text-anchor="middle" font-size="11" fill="#047857">данные+поведение</text>
    <rect x="535" y="208" width="125" height="64" rx="10" fill="#d1fae5" stroke="#059669"/>
    <text x="597" y="232" text-anchor="middle" font-size="12.5" font-weight="700" fill="#065f46">Платёж</text>
    <text x="597" y="252" text-anchor="middle" font-size="11" fill="#047857">данные+поведение</text>
  </g>
  <text x="530" y="320" text-anchor="middle" font-size="12.5" font-style="italic" fill="#047857">данные+поведение вместе, детали скрыты</text>
</svg>

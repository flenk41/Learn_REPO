<svg viewBox="0 0 720 360" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="720" height="360" fill="#fff5f3" rx="12"/>
  <text x="360" y="34" text-anchor="middle" font-size="19" font-weight="700" fill="#7f1d1d">Ветки изолируют работу, merge объединяет</text>

  <!-- main line -->
  <line x1="70" y1="130" x2="650" y2="130" stroke="#b91c1c" stroke-width="3"/>
  <text x="70" y="115" font-size="13" font-weight="700" fill="#b91c1c">main</text>
  <g fill="#b91c1c">
    <circle cx="120" cy="130" r="13"/><text x="120" y="134" text-anchor="middle" font-size="10" fill="#fff">A</text>
    <circle cx="220" cy="130" r="13"/><text x="220" y="134" text-anchor="middle" font-size="10" fill="#fff">B</text>
    <circle cx="320" cy="130" r="13"/><text x="320" y="134" text-anchor="middle" font-size="10" fill="#fff">C</text>
    <circle cx="560" cy="130" r="15" fill="#7f1d1d"/><text x="560" y="134" text-anchor="middle" font-size="10" fill="#fff">M</text>
  </g>

  <!-- feature line -->
  <path d="M 320 130 L 400 240 L 480 240" stroke="#f05133" stroke-width="3" fill="none"/>
  <path d="M 480 240 L 560 130" stroke="#f05133" stroke-width="3" fill="none" stroke-dasharray="6 4"/>
  <text x="360" y="270" font-size="13" font-weight="700" fill="#f05133">feature</text>
  <g fill="#f05133">
    <circle cx="400" cy="240" r="13"/><text x="400" y="244" text-anchor="middle" font-size="10" fill="#fff">D</text>
    <circle cx="480" cy="240" r="13"/><text x="480" y="244" text-anchor="middle" font-size="10" fill="#fff">E</text>
  </g>

  <text x="320" y="100" text-anchor="middle" font-size="11" fill="#6b7280">ответвление</text>
  <text x="560" y="100" text-anchor="middle" font-size="11" fill="#7f1d1d" font-weight="700">merge-коммит</text>
  <text x="560" y="165" text-anchor="middle" font-size="10" fill="#6b7280">(2 родителя)</text>

  <!-- commands -->
  <rect x="40" y="295" width="640" height="48" rx="8" fill="#1e1b2e"/>
  <text x="58" y="316" font-size="12" font-family="monospace" fill="#fda4af">git switch -c feature</text>
  <text x="240" y="316" font-size="12" font-family="monospace" fill="#86efac"># создать ветку (указатель на C)</text>
  <text x="58" y="335" font-size="12" font-family="monospace" fill="#fda4af">git switch main; git merge feature</text>
  <text x="330" y="335" font-size="12" font-family="monospace" fill="#86efac"># влить обратно → M</text>
</svg>

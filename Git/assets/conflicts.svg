<svg viewBox="0 0 720 300" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="720" height="300" fill="#fff5f3" rx="12"/>
  <text x="360" y="30" text-anchor="middle" font-size="19" font-weight="700" fill="#7f1d1d">Конфликт слияния: обе ветки правили одно место</text>

  <!-- markers code -->
  <rect x="30" y="55" width="400" height="180" rx="8" fill="#1e1b1b"/>
  <text x="48" y="80" font-size="12" font-family="monospace" fill="#9ca3af">price.py</text>
  <text x="48" y="104" font-size="12" font-family="monospace" fill="#fca5a5">&lt;&lt;&lt;&lt;&lt;&lt;&lt; HEAD</text>
  <text x="48" y="124" font-size="12" font-family="monospace" fill="#93c5fd">цена = базовая * 0.9</text>
  <text x="48" y="144" font-size="12" font-family="monospace" fill="#9ca3af">=======</text>
  <text x="48" y="164" font-size="12" font-family="monospace" fill="#86efac">цена = базовая - скидка</text>
  <text x="48" y="184" font-size="12" font-family="monospace" fill="#fca5a5">&gt;&gt;&gt;&gt;&gt;&gt;&gt; feature</text>
  <text x="48" y="216" font-size="11" font-family="monospace" fill="#fde68a">↑ выбери верное, убери маркеры</text>

  <!-- right: who -->
  <text x="445" y="118" font-size="11" fill="#7f1d1d">← твоя ветка (main)</text>
  <text x="445" y="170" font-size="11" fill="#7f1d1d">← вливаемая (feature)</text>

  <!-- steps -->
  <rect x="445" y="195" width="245" height="40" rx="6" fill="#fff" stroke="#f05133"/>
  <text x="567" y="219" text-anchor="middle" font-size="11" fill="#7f1d1d">правишь → git add → git commit</text>

  <rect x="30" y="248" width="660" height="44" rx="8" fill="#ffe4de" stroke="#f3b4a8"/>
  <text x="360" y="270" text-anchor="middle" font-size="12" fill="#7f1d1d">Конфликт — НЕ поломка: Git просит человека решить. Алгоритм: status → правка → add → commit.</text>
  <text x="360" y="287" text-anchor="middle" font-size="10.5" fill="#6b7280">Передумал — git merge --abort. Меньше конфликтов = частые маленькие слияния.</text>
</svg>

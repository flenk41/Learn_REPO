<svg viewBox="0 0 720 380" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="720" height="380" fill="#fff5f3" rx="12"/>
  <text x="360" y="34" text-anchor="middle" font-size="19" font-weight="700" fill="#7f1d1d">Pull Request — ворота качества перед main</text>

  <!-- feature branch -->
  <rect x="30" y="70" width="130" height="60" rx="8" fill="#fff" stroke="#f05133" stroke-width="2"/>
  <text x="95" y="96" text-anchor="middle" font-size="13" font-weight="700" fill="#f05133">feature/x</text>
  <text x="95" y="116" text-anchor="middle" font-size="10.5" fill="#6b7280">коммиты + push</text>

  <!-- PR box -->
  <rect x="210" y="55" width="300" height="240" rx="10" fill="#fff" stroke="#b91c1c" stroke-width="2.5"/>
  <rect x="210" y="55" width="300" height="34" rx="10" fill="#b91c1c"/>
  <rect x="210" y="72" width="300" height="17" fill="#b91c1c"/>
  <text x="360" y="78" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">PULL REQUEST</text>

  <rect x="228" y="100" width="264" height="30" rx="5" fill="#ffe4de"/>
  <text x="240" y="120" font-size="11.5" fill="#374151">📝 дифф + описание (что/зачем/как проверить)</text>
  <rect x="228" y="136" width="264" height="30" rx="5" fill="#ffe4de"/>
  <text x="240" y="156" font-size="11.5" fill="#374151">👀 ревью: код не человек · почему · nit</text>
  <rect x="228" y="172" width="264" height="30" rx="5" fill="#dcfce7"/>
  <text x="240" y="192" font-size="11.5" fill="#166534">✅ CI: сборка · тесты · линт · секреты</text>
  <rect x="228" y="208" width="264" height="30" rx="5" fill="#ffe4de"/>
  <text x="240" y="228" font-size="11.5" fill="#374151">🔁 правки → новые коммиты → PR обновлён</text>
  <rect x="228" y="244" width="264" height="34" rx="5" fill="#b91c1c"/>
  <text x="360" y="266" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Approve + зелёный CI → merge</text>

  <!-- main -->
  <rect x="560" y="70" width="130" height="60" rx="8" fill="#fff" stroke="#7f1d1d" stroke-width="2.5"/>
  <text x="625" y="96" text-anchor="middle" font-size="13" font-weight="700" fill="#7f1d1d">main</text>
  <text x="625" y="116" text-anchor="middle" font-size="10.5" fill="#6b7280">защищён 🔒</text>

  <!-- arrows -->
  <path d="M 160 100 L 206 100" stroke="#f05133" stroke-width="2.5" fill="none"/>
  <polygon points="210,100 201,95 201,105" fill="#f05133"/>
  <path d="M 512 261 Q 600 261 625 132" stroke="#b91c1c" stroke-width="2.5" fill="none"/>
  <polygon points="625,130 620,140 631,137" fill="#b91c1c"/>

  <rect x="40" y="315" width="640" height="48" rx="8" fill="#ffe4de" stroke="#f3b4a8"/>
  <text x="360" y="336" text-anchor="middle" font-size="12.5" fill="#7f1d1d">Код попадает в main только пройдя ревью человека и автопроверки CI.</text>
  <text x="360" y="354" text-anchor="middle" font-size="12" fill="#7f1d1d">Маленький PR ревьюят внимательно; большой — бегло «LGTM». Дроби работу.</text>
</svg>

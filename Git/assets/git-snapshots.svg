<svg viewBox="0 0 720 360" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="720" height="360" fill="#fff5f3" rx="12"/>
  <text x="360" y="34" text-anchor="middle" font-size="19" font-weight="700" fill="#7f1d1d">Git хранит снимки, а история — цепочка коммитов</text>

  <!-- commits -->
  <g>
    <rect x="50" y="120" width="110" height="80" rx="8" fill="#fff" stroke="#f05133" stroke-width="2"/>
    <text x="105" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#f05133">C1</text>
    <text x="105" y="170" text-anchor="middle" font-size="10.5" fill="#6b7280">снимок</text>
    <text x="105" y="187" text-anchor="middle" font-size="10" fill="#9ca3af">1a2b3c4</text>

    <rect x="210" y="120" width="110" height="80" rx="8" fill="#fff" stroke="#f05133" stroke-width="2"/>
    <text x="265" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#f05133">C2</text>
    <text x="265" y="170" text-anchor="middle" font-size="10.5" fill="#6b7280">снимок</text>
    <text x="265" y="187" text-anchor="middle" font-size="10" fill="#9ca3af">9z8y7x6</text>

    <rect x="370" y="120" width="110" height="80" rx="8" fill="#fff" stroke="#f05133" stroke-width="2"/>
    <text x="425" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#f05133">C3</text>
    <text x="425" y="170" text-anchor="middle" font-size="10.5" fill="#6b7280">снимок</text>
    <text x="425" y="187" text-anchor="middle" font-size="10" fill="#9ca3af">d4e5f6a</text>

    <rect x="530" y="120" width="110" height="80" rx="8" fill="#fff" stroke="#b91c1c" stroke-width="3"/>
    <text x="585" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#b91c1c">C4</text>
    <text x="585" y="170" text-anchor="middle" font-size="10.5" fill="#6b7280">снимок</text>
    <text x="585" y="187" text-anchor="middle" font-size="10" fill="#9ca3af">a1b2c3d</text>
  </g>

  <!-- parent arrows (point back) -->
  <g stroke="#f05133" stroke-width="2" fill="none">
    <path d="M 210 160 L 165 160"/><polygon points="160,160 170,155 170,165" fill="#f05133"/>
    <path d="M 370 160 L 325 160"/><polygon points="320,160 330,155 330,165" fill="#f05133"/>
    <path d="M 530 160 L 485 160"/><polygon points="480,160 490,155 490,165" fill="#f05133"/>
  </g>
  <text x="360" y="232" text-anchor="middle" font-size="12" fill="#7f1d1d">каждый коммит ссылается на РОДИТЕЛЯ (стрелка назад)</text>

  <!-- HEAD / main pointers -->
  <rect x="535" y="245" width="100" height="26" rx="13" fill="#b91c1c"/>
  <text x="585" y="262" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">main → HEAD</text>
  <path d="M 585 245 L 585 205" stroke="#b91c1c" stroke-width="2"/>
  <polygon points="585,200 580,210 590,210" fill="#b91c1c"/>

  <rect x="40" y="295" width="640" height="48" rx="8" fill="#ffe4de" stroke="#f3b4a8"/>
  <text x="60" y="316" font-size="12.5" fill="#7f1d1d">Коммит = снимок всего проекта + автор + дата + сообщение + ссылка на родителя.</text>
  <text x="60" y="335" font-size="12.5" fill="#7f1d1d">Ветка (main) и HEAD — лёгкие указатели на коммит, а не копии файлов.</text>
</svg>

<svg viewBox="0 0 720 290" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="720" height="290" fill="#fff5f3" rx="12"/>
  <text x="360" y="30" text-anchor="middle" font-size="19" font-weight="700" fill="#7f1d1d">fetch / pull / push — обмен с сервером</text>

  <!-- local -->
  <rect x="40" y="70" width="220" height="150" rx="10" fill="#fff" stroke="#f05133" stroke-width="2.5"/>
  <text x="150" y="94" text-anchor="middle" font-size="13" font-weight="700" fill="#f05133">локально (твой ПК)</text>
  <rect x="65" y="108" width="170" height="34" rx="5" fill="#ffe4de"/><text x="150" y="130" text-anchor="middle" font-size="11" fill="#7f1d1d">твой main</text>
  <rect x="65" y="150" width="170" height="34" rx="5" fill="#f3f4f6"/><text x="150" y="172" text-anchor="middle" font-size="11" fill="#374151">origin/main (кэш)</text>
  <text x="150" y="205" text-anchor="middle" font-size="9.5" fill="#6b7280">полная история у тебя</text>

  <!-- server -->
  <rect x="460" y="70" width="220" height="150" rx="10" fill="#fff" stroke="#7f1d1d" stroke-width="2.5"/>
  <text x="570" y="94" text-anchor="middle" font-size="13" font-weight="700" fill="#7f1d1d">сервер (origin)</text>
  <text x="570" y="135" text-anchor="middle" font-size="12" fill="#374151">общий репозиторий</text>
  <text x="570" y="160" text-anchor="middle" font-size="10.5" fill="#6b7280">GitHub / GitLab</text>

  <!-- arrows -->
  <path d="M 262 110 L 458 110" stroke="#15803d" stroke-width="2.5" fill="none"/><polygon points="262,110 271,106 271,114" fill="#15803d"/>
  <text x="360" y="103" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">git fetch — забрать в origin/* (безопасно)</text>

  <path d="M 262 150 L 458 150" stroke="#2563eb" stroke-width="2.5" fill="none"/><polygon points="262,150 271,146 271,154" fill="#2563eb"/>
  <text x="360" y="143" text-anchor="middle" font-size="11" font-weight="700" fill="#2563eb">git pull — fetch + слить в твой main</text>

  <path d="M 262 192 L 458 192" stroke="#b45309" stroke-width="2.5" fill="none"/><polygon points="458,192 449,188 449,196" fill="#b45309"/>
  <text x="360" y="185" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">git push — отдать свои коммиты</text>

  <rect x="40" y="240" width="640" height="44" rx="8" fill="#ffe4de" stroke="#f3b4a8"/>
  <text x="360" y="262" text-anchor="middle" font-size="11.5" fill="#7f1d1d">Push отклонён? Сервер ушёл вперёд → сначала pull, потом push. ⚠️ НИКОГДА push --force в общую ветку.</text>
  <text x="360" y="279" text-anchor="middle" font-size="10.5" fill="#6b7280">Git распределён: коммиты локальны, сеть нужна только для fetch/push.</text>
</svg>

<svg viewBox="0 0 720 340" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="720" height="340" fill="#fff5f3" rx="12"/>
  <text x="360" y="34" text-anchor="middle" font-size="19" font-weight="700" fill="#7f1d1d">Три зоны Git: рабочая папка → staging → репозиторий</text>

  <!-- zones -->
  <rect x="40" y="80" width="180" height="120" rx="10" fill="#fff" stroke="#f05133" stroke-width="2"/>
  <text x="130" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="#f05133">Рабочая папка</text>
  <text x="130" y="128" text-anchor="middle" font-size="11.5" fill="#6b7280">твои правки</text>
  <text x="130" y="160" text-anchor="middle" font-size="11.5" fill="#374151">modified</text>
  <text x="130" y="182" text-anchor="middle" font-size="11" fill="#9ca3af">file.txt ✎</text>

  <rect x="270" y="80" width="180" height="120" rx="10" fill="#fff" stroke="#f05133" stroke-width="2"/>
  <text x="360" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="#f05133">Staging (индекс)</text>
  <text x="360" y="128" text-anchor="middle" font-size="11.5" fill="#6b7280">что войдёт в коммит</text>
  <text x="360" y="160" text-anchor="middle" font-size="11.5" fill="#374151">staged</text>
  <text x="360" y="182" text-anchor="middle" font-size="11" fill="#9ca3af">file.txt ✓</text>

  <rect x="500" y="80" width="180" height="120" rx="10" fill="#fff" stroke="#b91c1c" stroke-width="2.5"/>
  <text x="590" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="#b91c1c">Репозиторий</text>
  <text x="590" y="128" text-anchor="middle" font-size="11.5" fill="#6b7280">история (.git)</text>
  <text x="590" y="160" text-anchor="middle" font-size="11.5" fill="#374151">committed</text>
  <text x="590" y="182" text-anchor="middle" font-size="11" fill="#9ca3af">снимок 🔒</text>

  <!-- forward arrows -->
  <g>
    <path d="M 220 130 L 268 130" stroke="#f05133" stroke-width="2.5" fill="none"/>
    <polygon points="270,130 261,125 261,135" fill="#f05133"/>
    <text x="244" y="120" text-anchor="middle" font-size="11.5" font-weight="700" fill="#f05133">git add</text>

    <path d="M 450 130 L 498 130" stroke="#b91c1c" stroke-width="2.5" fill="none"/>
    <polygon points="500,130 491,125 491,135" fill="#b91c1c"/>
    <text x="474" y="120" text-anchor="middle" font-size="11.5" font-weight="700" fill="#b91c1c">git commit</text>
  </g>

  <!-- back arrow -->
  <path d="M 500 222 Q 360 270 220 222" stroke="#9ca3af" stroke-width="2" fill="none" stroke-dasharray="5 3"/>
  <polygon points="220,222 230,220 226,230" fill="#9ca3af"/>
  <text x="360" y="262" text-anchor="middle" font-size="11.5" fill="#6b7280">git restore / checkout (откатить назад)</text>

  <rect x="40" y="288" width="640" height="40" rx="8" fill="#ffe4de" stroke="#f3b4a8"/>
  <text x="360" y="313" text-anchor="middle" font-size="12.5" fill="#7f1d1d">git status — компас: показывает, в какой зоне каждое изменение, и подсказывает команду.</text>
</svg>

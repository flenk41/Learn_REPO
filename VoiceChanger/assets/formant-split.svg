<svg viewBox="0 0 720 350" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="720" height="350" fill="#f0fdfa" rx="12"/>
  <text x="360" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#134e4a">Реализм: разделить ВЫСОТУ и ФОРМАНТЫ</text>

  <!-- axes -->
  <line x1="60" y1="170" x2="660" y2="170" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="660" y="188" text-anchor="end" font-size="10" fill="#64748b">частота →</text>
  <text x="50" y="80" font-size="10" fill="#64748b">ампл.</text>

  <!-- harmonics (fine structure = pitch) -->
  <g stroke="#0d9488" stroke-width="2">
    <line x1="90" y1="170" x2="90" y2="120"/>
    <line x1="130" y1="170" x2="130" y2="95"/>
    <line x1="170" y1="170" x2="170" y2="110"/>
    <line x1="210" y1="170" x2="210" y2="75"/>
    <line x1="250" y1="170" x2="250" y2="90"/>
    <line x1="290" y1="170" x2="290" y2="130"/>
    <line x1="330" y1="170" x2="330" y2="100"/>
    <line x1="370" y1="170" x2="370" y2="125"/>
    <line x1="410" y1="170" x2="410" y2="140"/>
    <line x1="450" y1="170" x2="450" y2="120"/>
    <line x1="490" y1="170" x2="490" y2="150"/>
    <line x1="530" y1="170" x2="530" y2="148"/>
    <line x1="570" y1="170" x2="570" y2="160"/>
    <line x1="610" y1="170" x2="610" y2="158"/>
  </g>
  <text x="200" y="200" font-size="11" fill="#0f766e" font-weight="700">↑ гармоники (шаг = F0) = ВЫСОТА (pitch)</text>

  <!-- envelope (formants) -->
  <path d="M 70 150 Q 130 70 210 70 Q 280 75 330 95 Q 380 110 410 135 Q 460 110 490 115 Q 540 130 610 150" fill="none" stroke="#be123c" stroke-width="3"/>
  <text x="150" y="58" font-size="11" fill="#be123c" font-weight="700">огибающая (форманты F1,F2,F3) = ТЕМБР</text>

  <!-- split arrows -->
  <text x="360" y="232" text-anchor="middle" font-size="13" font-weight="700" fill="#134e4a">разделить → менять НЕЗАВИСИМО:</text>

  <rect x="90" y="250" width="250" height="74" rx="8" fill="#fff" stroke="#0d9488" stroke-width="2"/>
  <text x="215" y="273" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0f766e">pitch_scale</text>
  <text x="215" y="293" text-anchor="middle" font-size="10.5" fill="#475569">меняет шаг гармоник</text>
  <text x="215" y="310" text-anchor="middle" font-size="10.5" fill="#475569">= выше/ниже голос</text>

  <rect x="380" y="250" width="250" height="74" rx="8" fill="#fff" stroke="#be123c" stroke-width="2"/>
  <text x="505" y="273" text-anchor="middle" font-size="12.5" font-weight="700" fill="#be123c">formant_scale</text>
  <text x="505" y="293" text-anchor="middle" font-size="10.5" fill="#475569">варпинг огибающей</text>
  <text x="505" y="310" text-anchor="middle" font-size="10.5" fill="#475569">= «размер» / пол / тембр</text>

  <text x="360" y="344" text-anchor="middle" font-size="10.5" fill="#134e4a">наивный resample двигает ОБА вместе → «бурундук». раздельно → реалистично.</text>
</svg>

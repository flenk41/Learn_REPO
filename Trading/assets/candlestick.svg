<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="Segoe UI, Arial, sans-serif">
  <rect width="720" height="400" rx="16" fill="#fffbeb"/>
  <text x="360" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#713f12">Анатомия японской свечи</text>

  <!-- bullish candle -->
  <text x="180" y="80" text-anchor="middle" font-size="15" font-weight="700" fill="#166534">Бычья (рост)</text>
  <line x1="180" y1="95" x2="180" y2="130" stroke="#166534" stroke-width="2.5"/>
  <rect x="155" y="130" width="50" height="120" rx="3" fill="#22c55e" stroke="#166534" stroke-width="2"/>
  <line x1="180" y1="250" x2="180" y2="290" stroke="#166534" stroke-width="2.5"/>
  <text x="250" y="118" font-size="11.5" fill="#444">← макс (верхняя тень)</text>
  <text x="250" y="155" font-size="11.5" fill="#166534">← закрытие (выше)</text>
  <text x="250" y="240" font-size="11.5" fill="#166534">← открытие</text>
  <text x="250" y="282" font-size="11.5" fill="#444">← мин (нижняя тень)</text>
  <text x="115" y="195" text-anchor="end" font-size="11.5" fill="#444">тело →</text>

  <!-- bearish candle -->
  <text x="500" y="80" text-anchor="middle" font-size="15" font-weight="700" fill="#991b1b">Медвежья (падение)</text>
  <line x1="500" y1="95" x2="500" y2="130" stroke="#991b1b" stroke-width="2.5"/>
  <rect x="475" y="130" width="50" height="120" rx="3" fill="#ef4444" stroke="#991b1b" stroke-width="2"/>
  <line x1="500" y1="250" x2="500" y2="290" stroke="#991b1b" stroke-width="2.5"/>
  <text x="565" y="155" font-size="11.5" fill="#991b1b">← открытие (выше)</text>
  <text x="565" y="240" font-size="11.5" fill="#991b1b">← закрытие (ниже)</text>

  <rect x="60" y="320" width="600" height="60" rx="10" fill="#fef3c7"/>
  <text x="360" y="345" text-anchor="middle" font-size="12.5" fill="#713f12">ТЕЛО = между открытием и закрытием · ТЕНИ (фитили) = до макс/мин периода</text>
  <text x="360" y="367" text-anchor="middle" font-size="12.5" font-style="italic" fill="#926310">большое тело = сильное движение · длинная тень = отказ от уровня</text>
</svg>

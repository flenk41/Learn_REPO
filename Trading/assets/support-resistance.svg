<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="Segoe UI, Arial, sans-serif">
  <rect width="720" height="400" rx="16" fill="#fffbeb"/>
  <text x="360" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#713f12">Поддержка и сопротивление ⭐⭐</text>

  <!-- resistance line -->
  <line x1="60" y1="100" x2="660" y2="100" stroke="#991b1b" stroke-width="2.5"/>
  <text x="70" y="92" font-size="13" font-weight="700" fill="#991b1b">СОПРОТИВЛЕНИЕ (продавцы давят вниз)</text>

  <!-- support line -->
  <line x1="60" y1="300" x2="660" y2="300" stroke="#166534" stroke-width="2.5"/>
  <text x="70" y="320" font-size="13" font-weight="700" fill="#166534">ПОДДЕРЖКА (покупатели держат)</text>

  <!-- zig-zag price bouncing -->
  <polyline points="60,300 130,105 200,295 280,108 360,298 440,103 520,290 600,110 660,250"
            fill="none" stroke="#ca8a04" stroke-width="2.5"/>

  <!-- bounce dots -->
  <circle cx="130" cy="105" r="5" fill="#991b1b"/>
  <circle cx="280" cy="108" r="5" fill="#991b1b"/>
  <circle cx="440" cy="103" r="5" fill="#991b1b"/>
  <circle cx="200" cy="295" r="5" fill="#166534"/>
  <circle cx="360" cy="298" r="5" fill="#166534"/>
  <circle cx="520" cy="290" r="5" fill="#166534"/>

  <text x="360" y="358" text-anchor="middle" font-size="12.5" fill="#444">цена много раз отбивается от уровней → чем больше касаний, тем СИЛЬНЕЕ уровень</text>
  <text x="360" y="380" text-anchor="middle" font-size="12" font-style="italic" fill="#926310">пробитое сопротивление становится поддержкой (смена ролей)</text>
</svg>

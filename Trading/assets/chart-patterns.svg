<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="Segoe UI, Arial, sans-serif">
  <rect width="720" height="420" rx="16" fill="#fffbeb"/>
  <text x="360" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#713f12">Графические паттерны</text>

  <text x="200" y="66" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">Продолжения</text>
  <text x="540" y="66" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">Разворота</text>

  <!-- flag -->
  <text x="115" y="92" font-size="12" fill="#444">Флаг</text>
  <polyline points="60,180 95,100 110,130 125,115 140,140 155,125" fill="none" stroke="#ca8a04" stroke-width="2.5"/>
  <line x1="105" y1="108" x2="160" y2="135" stroke="#888" stroke-width="1" stroke-dasharray="3"/>
  <line x1="118" y1="135" x2="170" y2="162" stroke="#888" stroke-width="1" stroke-dasharray="3"/>

  <!-- triangle -->
  <text x="290" y="92" font-size="12" fill="#444">Треугольник</text>
  <polyline points="240,100 300,160 260,135 300,150 275,143 300,147" fill="none" stroke="#ca8a04" stroke-width="2.5"/>
  <line x1="240" y1="100" x2="305" y2="148" stroke="#888" stroke-width="1" stroke-dasharray="3"/>
  <line x1="250" y1="175" x2="305" y2="148" stroke="#888" stroke-width="1" stroke-dasharray="3"/>

  <!-- double top -->
  <text x="470" y="92" font-size="12" fill="#444">Двойная вершина (M)</text>
  <polyline points="410,170 440,110 470,150 500,110 530,170" fill="none" stroke="#ca8a04" stroke-width="2.5"/>
  <line x1="440" y1="110" x2="500" y2="110" stroke="#991b1b" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="410" y1="150" x2="540" y2="150" stroke="#888" stroke-width="1" stroke-dasharray="3"/>

  <!-- head and shoulders -->
  <text x="610" y="92" font-size="12" fill="#444">Голова-плечи</text>
  <polyline points="560,175 580,140 600,155 620,110 640,155 660,140 680,175"
            fill="none" stroke="#ca8a04" stroke-width="2.5"/>
  <line x1="575" y1="160" x2="665" y2="160" stroke="#991b1b" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="620" y="103" text-anchor="middle" font-size="9" fill="#666">голова</text>

  <rect x="60" y="220" width="600" height="170" rx="12" fill="#fef3c7"/>
  <text x="360" y="250" text-anchor="middle" font-size="14" font-weight="700" fill="#713f12">Как торговать любой паттерн:</text>
  <text x="360" y="282" text-anchor="middle" font-size="13" fill="#5a4a20">1. распознал фигуру В КОНТЕКСТЕ (у уровня? в тренде?)</text>
  <text x="360" y="308" text-anchor="middle" font-size="13" fill="#5a4a20">2. дождался ПОДТВЕРЖДЕНИЯ (пробой границы, желательно с объёмом)</text>
  <text x="360" y="334" text-anchor="middle" font-size="13" fill="#5a4a20">3. вход на пробое · СТОП за противоположной границей · ТЕЙК = высота фигуры</text>
  <text x="360" y="368" text-anchor="middle" font-size="12.5" font-style="italic" fill="#926310">⚠️ паттерн без подтверждения — просто картинка · это вероятность, не гарантия</text>
</svg>

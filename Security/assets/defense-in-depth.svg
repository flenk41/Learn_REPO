<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" font-family="Segoe UI, Arial, sans-serif">
  <rect width="760" height="400" rx="16" fill="#f0fdf4"/>
  <text x="380" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#14532d">Защита в глубину: несколько рубежей</text>

  <!-- concentric layers -->
  <rect x="60" y="60" width="640" height="250" rx="14" fill="#bbf7d0" stroke="#15803d" stroke-width="2"/>
  <text x="80" y="82" font-size="12" fill="#14532d" font-weight="700">🌐 Сеть: файрвол, сегментация</text>
  <rect x="110" y="92" width="540" height="200" rx="12" fill="#86efac" stroke="#15803d" stroke-width="2"/>
  <text x="130" y="114" font-size="12" fill="#14532d" font-weight="700">🖥️ Хост: hardening, мин. привилегии</text>
  <rect x="170" y="124" width="420" height="160" rx="12" fill="#4ade80" stroke="#15803d" stroke-width="2"/>
  <text x="190" y="146" font-size="12" fill="#14532d" font-weight="700">📦 Приложение: валидация, авторизация</text>
  <rect x="240" y="156" width="280" height="100" rx="12" fill="#22c55e" stroke="#15803d" stroke-width="2"/>
  <text x="380" y="180" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">🔑 Данные</text>
  <text x="380" y="200" text-anchor="middle" font-size="11" fill="#dcfce7">шифрование, контроль доступа</text>
  <text x="380" y="222" text-anchor="middle" font-size="11" fill="#dcfce7">+ мониторинг на всех слоях</text>
  <text x="380" y="242" text-anchor="middle" font-size="10.5" fill="#f0fdf4">📊 логи · детект · реагирование</text>

  <!-- attack arrow trying through -->
  <defs><marker id="ax" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#b91c1c"/></marker></defs>
  <line x1="20" y1="185" x2="58" y2="185" stroke="#b91c1c" stroke-width="3" marker-end="url(#ax)"/>
  <text x="20" y="175" font-size="11" fill="#b91c1c" font-weight="700">атака</text>

  <rect x="60" y="322" width="640" height="60" rx="10" fill="#dcfce7"/>
  <text x="380" y="346" text-anchor="middle" font-size="12.5" fill="#14532d" font-weight="700">Один рубеж пробьют — следующий держит. «Предполагай взлом» → не один забор, а слои.</text>
  <text x="380" y="368" text-anchor="middle" font-size="11.5" font-style="italic" fill="#15803d">+ сегментация и мин. привилегии: взлом одного компонента ≠ доступ ко всему</text>
</svg>

<svg viewBox="0 0 720 290" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="720" height="290" fill="#f0fdf4" rx="12"/>
  <text x="360" y="30" text-anchor="middle" font-size="19" font-weight="700" fill="#14532d">Хранение паролей: не открытым текстом — хеш+соль</text>

  <!-- bad -->
  <rect x="30" y="55" width="320" height="95" rx="10" fill="#fff" stroke="#b91c1c" stroke-width="2"/>
  <text x="190" y="78" text-anchor="middle" font-size="13" font-weight="700" fill="#b91c1c">❌ ПЛОХО — открытый текст</text>
  <text x="50" y="102" font-size="11" font-family="monospace" fill="#374151">user: anna   pass: qwerty123</text>
  <text x="50" y="122" font-size="10.5" fill="#b91c1c">утекла БД → все пароли сразу у атакующего</text>
  <text x="50" y="140" font-size="10.5" fill="#b91c1c">(и на других сайтах — люди повторяют)</text>

  <!-- also bad: plain hash -->
  <rect x="370" y="55" width="320" height="95" rx="10" fill="#fff" stroke="#b45309" stroke-width="2"/>
  <text x="530" y="78" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">⚠️ СЛАБО — простой хеш (MD5/SHA)</text>
  <text x="390" y="102" font-size="11" font-family="monospace" fill="#374151">sha256("qwerty") = всегда одно</text>
  <text x="390" y="122" font-size="10.5" fill="#b45309">→ радужные таблицы, быстрый перебор GPU</text>
  <text x="390" y="140" font-size="10.5" fill="#b45309">одинаковые пароли → одинаковый хеш</text>

  <!-- good -->
  <rect x="30" y="165" width="660" height="115" rx="10" fill="#fff" stroke="#15803d" stroke-width="2.5"/>
  <text x="360" y="189" text-anchor="middle" font-size="14" font-weight="700" fill="#15803d">✅ ПРАВИЛЬНО — bcrypt / argon2 (медленный хеш + соль)</text>
  <text x="50" y="214" font-size="11.5" font-family="monospace" fill="#374151">store = bcrypt("qwerty" + случайная_СОЛЬ)</text>
  <rect x="50" y="225" width="620" height="44" rx="6" fill="#dcfce7"/>
  <text x="66" y="244" font-size="11" fill="#166534">• СОЛЬ (у каждого своя) → одинаковые пароли дают РАЗНЫЕ хеши, радужные таблицы бесполезны.</text>
  <text x="66" y="262" font-size="11" fill="#166534">• МЕДЛЕННО специально (cost-фактор) → перебор дорог. Пароль НЕ хранится и НЕ восстановим — только сверка.</text>
</svg>

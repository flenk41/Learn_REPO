<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" font-family="Segoe UI, Arial, sans-serif">
  <rect width="760" height="400" rx="16" fill="#f0fdf4"/>
  <text x="380" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#14532d">SQL-инъекция: ломаем и чиним ⭐⭐</text>

  <!-- vulnerable -->
  <rect x="40" y="58" width="340" height="150" rx="10" fill="#fff" stroke="#b91c1c" stroke-width="2"/>
  <text x="56" y="82" font-size="13" font-weight="700" fill="#b91c1c">❌ УЯЗВИМО — склейка строк</text>
  <rect x="56" y="92" width="308" height="50" rx="5" fill="#fef2f2"/>
  <text x="64" y="111" font-size="10.5" font-family="Consolas, monospace" fill="#7f1d1d">q = "...WHERE name='" + input + "'"</text>
  <text x="64" y="131" font-size="10.5" font-family="Consolas, monospace" fill="#7f1d1d">db.execute(q)</text>
  <text x="56" y="162" font-size="10.5" fill="#991b1b">ввод:  ' OR '1'='1</text>
  <text x="56" y="180" font-size="10.5" font-family="Consolas, monospace" fill="#991b1b">→ WHERE name='' OR '1'='1'  (всегда!)</text>
  <text x="56" y="198" font-size="10.5" fill="#b91c1c" font-weight="700">→ утечка всей БД / обход входа</text>

  <!-- secure -->
  <rect x="400" y="58" width="320" height="150" rx="10" fill="#fff" stroke="#15803d" stroke-width="2"/>
  <text x="416" y="82" font-size="13" font-weight="700" fill="#15803d">✅ БЕЗОПАСНО — параметры</text>
  <rect x="416" y="92" width="288" height="50" rx="5" fill="#f0fdf4"/>
  <text x="424" y="111" font-size="10.5" font-family="Consolas, monospace" fill="#14532d">db.execute(</text>
  <text x="424" y="131" font-size="10.5" font-family="Consolas, monospace" fill="#14532d">  "...WHERE name=?", (input,))</text>
  <text x="416" y="162" font-size="10.5" fill="#166534">ввод ' OR '1'='1 = обычная СТРОКА</text>
  <text x="416" y="180" font-size="10.5" fill="#166534">БД ищет имя буквально → не найдёт</text>
  <text x="416" y="198" font-size="10.5" fill="#15803d" font-weight="700">→ инъекция невозможна</text>

  <!-- principle -->
  <rect x="120" y="230" width="520" height="56" rx="10" fill="#15803d"/>
  <text x="380" y="254" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">Корень всех инъекций: смешали КОД и ДАННЫЕ</text>
  <text x="380" y="276" text-anchor="middle" font-size="12.5" fill="#bbf7d0">Защита одна: РАЗДЕЛЯЙ их (параметры / экранирование) — ввод не станет командой</text>

  <!-- defense in depth -->
  <text x="380" y="312" text-anchor="middle" font-size="12" fill="#166534" font-weight="700">+ слои защиты в глубину:</text>
  <g font-size="11" fill="#14532d" text-anchor="middle">
    <rect x="70" y="322" width="150" height="30" rx="6" fill="#dcfce7"/><text x="145" y="342">валидация ввода</text>
    <rect x="235" y="322" width="180" height="30" rx="6" fill="#dcfce7"/><text x="325" y="342">мин. привилегии БД</text>
    <rect x="430" y="322" width="160" height="30" rx="6" fill="#dcfce7"/><text x="510" y="342">скрыть ошибки БД</text>
    <rect x="605" y="322" width="85" height="30" rx="6" fill="#dcfce7"/><text x="647" y="342">ORM</text>
  </g>
  <text x="380" y="380" text-anchor="middle" font-size="11.5" font-style="italic" fill="#15803d">тот же принцип защищает от командных, NoSQL, LDAP-инъекций</text>
</svg>

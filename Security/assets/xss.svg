<svg viewBox="0 0 720 290" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="720" height="290" fill="#f0fdf4" rx="12"/>
  <text x="360" y="30" text-anchor="middle" font-size="19" font-weight="700" fill="#14532d">XSS: чужой скрипт исполняется в браузере жертвы</text>

  <!-- attacker -->
  <rect x="30" y="60" width="150" height="56" rx="8" fill="#fff" stroke="#b91c1c" stroke-width="2"/>
  <text x="105" y="83" text-anchor="middle" font-size="12" font-weight="700" fill="#b91c1c">атакующий</text>
  <text x="105" y="102" text-anchor="middle" font-size="9" font-family="monospace" fill="#b91c1c">&lt;script&gt;...&lt;/script&gt;</text>

  <!-- server -->
  <rect x="285" y="60" width="150" height="56" rx="8" fill="#fff" stroke="#15803d" stroke-width="2"/>
  <text x="360" y="83" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">сайт (БД)</text>
  <text x="360" y="102" text-anchor="middle" font-size="9" fill="#64748b">сохранил коммент как есть</text>

  <!-- victim -->
  <rect x="540" y="60" width="150" height="56" rx="8" fill="#fff" stroke="#b45309" stroke-width="2"/>
  <text x="615" y="83" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">жертва</text>
  <text x="615" y="102" text-anchor="middle" font-size="9" fill="#64748b">открыла страницу</text>

  <g stroke="#b91c1c" stroke-width="2" fill="none">
    <path d="M 180 88 L 283 88"/><polygon points="285,88 276,84 276,92" fill="#b91c1c"/>
    <path d="M 435 88 L 538 88"/><polygon points="540,88 531,84 531,92" fill="#b91c1c"/>
  </g>
  <text x="232" y="78" text-anchor="middle" font-size="9" fill="#b91c1c">① внедрил</text>
  <text x="488" y="78" text-anchor="middle" font-size="9" fill="#b91c1c">② отдан жертве</text>

  <rect x="430" y="135" width="260" height="50" rx="8" fill="#fee2e2" stroke="#b91c1c"/>
  <text x="560" y="156" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">③ скрипт ИСПОЛНЯЕТСЯ у жертвы</text>
  <text x="560" y="174" text-anchor="middle" font-size="9.5" fill="#b91c1c">кража cookie/сессии, действия от её имени</text>

  <rect x="30" y="205" width="660" height="78" rx="8" fill="#fff" stroke="#bbf7d0"/>
  <text x="48" y="227" font-size="12.5" font-weight="700" fill="#14532d">✅ Защита: НЕ доверяй вводу, экранируй вывод.</text>
  <text x="48" y="248" font-size="11.5" fill="#374151">• экранируй спецсимволы при выводе (&lt; → &amp;lt;) — браузер покажет ТЕКСТ, не код.</text>
  <text x="48" y="268" font-size="11.5" fill="#374151">• CSP (Content-Security-Policy), HttpOnly-cookie, фреймворки эскейпят по умолчанию.</text>
</svg>

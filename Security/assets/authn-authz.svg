<svg viewBox="0 0 720 270" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="720" height="270" fill="#f0fdf4" rx="12"/>
  <text x="360" y="30" text-anchor="middle" font-size="19" font-weight="700" fill="#14532d">Аутентификация vs авторизация</text>

  <rect x="40" y="60" width="300" height="160" rx="10" fill="#fff" stroke="#15803d" stroke-width="2"/>
  <text x="190" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#15803d">AUTHENTICATION</text>
  <text x="190" y="106" text-anchor="middle" font-size="12" fill="#374151">«КТО ты?»</text>
  <text x="190" y="132" text-anchor="middle" font-size="11" fill="#475569">проверка личности:</text>
  <text x="190" y="151" text-anchor="middle" font-size="11" fill="#475569">пароль, 2FA, ключ, биометрия</text>
  <rect x="70" y="165" width="240" height="36" rx="6" fill="#dcfce7"/>
  <text x="190" y="188" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">✓ «Это действительно Анна»</text>

  <rect x="380" y="60" width="300" height="160" rx="10" fill="#fff" stroke="#15803d" stroke-width="2"/>
  <text x="530" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#15803d">AUTHORIZATION</text>
  <text x="530" y="106" text-anchor="middle" font-size="12" fill="#374151">«что тебе МОЖНО?»</text>
  <text x="530" y="132" text-anchor="middle" font-size="11" fill="#475569">проверка прав:</text>
  <text x="530" y="151" text-anchor="middle" font-size="11" fill="#475569">роли, доступ к ресурсу</text>
  <rect x="410" y="165" width="240" height="36" rx="6" fill="#dcfce7"/>
  <text x="530" y="188" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">✓ «Анне можно читать, не удалять»</text>

  <path d="M 340 140 L 378 140" stroke="#15803d" stroke-width="2.5" fill="none"/><polygon points="380,140 371,136 371,144" fill="#15803d"/>
  <text x="360" y="132" text-anchor="middle" font-size="9" fill="#15803d">потом</text>

  <text x="360" y="248" text-anchor="middle" font-size="11.5" fill="#14532d">Сначала «кто» (authn), потом «что можно» (authz). ⚠️ IDOR — провал authz: вошёл как Анна, читаешь чужое по id.</text>
</svg>

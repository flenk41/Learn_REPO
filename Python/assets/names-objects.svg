<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" font-family="Segoe UI, Arial, sans-serif">
  <rect width="640" height="300" fill="#ffffff"/>
  <text x="320" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a2e">Имена — ярлыки, объекты живут в куче</text>
  <text x="320" y="58" text-anchor="middle" font-size="14" fill="#666" font-family="Consolas, monospace">a = [1, 2, 3]    b = a</text>

  <defs>
    <marker id="pa" markerWidth="11" markerHeight="11" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3776ab"/>
    </marker>
  </defs>

  <!-- names -->
  <rect x="70" y="110" width="90" height="50" rx="8" fill="#e8f0fe" stroke="#3776ab" stroke-width="2"/>
  <text x="115" y="142" text-anchor="middle" font-size="22" font-weight="700" fill="#3776ab" font-family="Consolas, monospace">a</text>
  <rect x="70" y="190" width="90" height="50" rx="8" fill="#e8f0fe" stroke="#3776ab" stroke-width="2"/>
  <text x="115" y="222" text-anchor="middle" font-size="22" font-weight="700" fill="#3776ab" font-family="Consolas, monospace">b</text>
  <text x="115" y="98" text-anchor="middle" font-size="12" fill="#888">имена (ярлыки)</text>

  <!-- object -->
  <rect x="360" y="135" width="220" height="80" rx="10" fill="#fff8e1" stroke="#f4b400" stroke-width="2.5"/>
  <text x="470" y="125" text-anchor="middle" font-size="12" fill="#888">объект в куче</text>
  <text x="470" y="170" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e" font-family="Consolas, monospace">list [1, 2, 3]</text>
  <text x="470" y="197" text-anchor="middle" font-size="12" fill="#999" font-family="Consolas, monospace">id = 140234   refcount = 2</text>

  <!-- arrows both names to one object -->
  <path d="M162 135 C 260 135, 280 165, 358 168" fill="none" stroke="#3776ab" stroke-width="2.5" marker-end="url(#pa)"/>
  <path d="M162 215 C 260 215, 280 185, 358 182" fill="none" stroke="#3776ab" stroke-width="2.5" marker-end="url(#pa)"/>

  <text x="320" y="280" text-anchor="middle" font-size="13" fill="#c62828" font-weight="600">b = a не копирует список — вешает второй ярлык на тот же объект</text>
</svg>

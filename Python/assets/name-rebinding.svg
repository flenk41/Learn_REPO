<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" font-family="Segoe UI, Arial, sans-serif">
  <rect width="640" height="280" fill="#ffffff"/>
  <text x="320" y="32" text-anchor="middle" font-size="21" font-weight="700" fill="#1a1a2e">Переприсваивание = ярлык переезжает</text>
  <text x="320" y="56" text-anchor="middle" font-size="14" fill="#666" font-family="Consolas, monospace">x = 10    потом    x = 20</text>

  <defs>
    <marker id="nb" markerWidth="11" markerHeight="11" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3776ab"/>
    </marker>
  </defs>

  <!-- BEFORE -->
  <text x="160" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#3776ab" font-family="Consolas, monospace">было: x = 10</text>
  <rect x="60" y="120" width="80" height="44" rx="8" fill="#e8f0fe" stroke="#3776ab" stroke-width="2"/>
  <text x="100" y="148" text-anchor="middle" font-size="18" font-weight="700" font-family="Consolas, monospace">x</text>
  <rect x="220" y="120" width="80" height="44" rx="8" fill="#fff8e1" stroke="#f4b400" stroke-width="2"/>
  <text x="260" y="148" text-anchor="middle" font-size="18" font-weight="700">10</text>
  <path d="M140 142 L 216 142" stroke="#3776ab" stroke-width="2.5" marker-end="url(#nb)"/>

  <!-- AFTER -->
  <text x="480" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#3776ab" font-family="Consolas, monospace">стало: x = 20</text>
  <rect x="380" y="120" width="80" height="44" rx="8" fill="#e8f0fe" stroke="#3776ab" stroke-width="2"/>
  <text x="420" y="148" text-anchor="middle" font-size="18" font-weight="700" font-family="Consolas, monospace">x</text>
  <!-- old object 10 now garbage -->
  <rect x="380" y="195" width="80" height="44" rx="8" fill="#ffebee" stroke="#e57373" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="420" y="223" text-anchor="middle" font-size="16" font-weight="700" fill="#c62828">10</text>
  <text x="420" y="256" text-anchor="middle" font-size="11" fill="#c62828">🗑 никто не ссылается → удалён</text>
  <!-- new object 20 -->
  <rect x="540" y="120" width="80" height="44" rx="8" fill="#fff8e1" stroke="#f4b400" stroke-width="2"/>
  <text x="580" y="148" text-anchor="middle" font-size="18" font-weight="700">20</text>
  <path d="M460 142 L 536 142" stroke="#3776ab" stroke-width="2.5" marker-end="url(#nb)"/>

  <line x1="330" y1="90" x2="330" y2="250" stroke="#e0e0e0" stroke-width="1.5" stroke-dasharray="4 4"/>
</svg>

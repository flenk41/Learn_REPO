<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" font-family="Segoe UI, Arial, sans-serif">
  <rect width="640" height="300" fill="#ffffff"/>
  <text x="320" y="32" text-anchor="middle" font-size="21" font-weight="700" fill="#1a1a2e">Индексы и срезы строки</text>
  <text x="320" y="56" text-anchor="middle" font-size="14" fill="#666" font-family="Consolas, monospace">s = "Python"</text>

  <g font-family="Consolas, monospace">
    <!-- chars -->
    <g>
      <rect x="120" y="80" width="66" height="56" fill="#e8f0fe" stroke="#3776ab" stroke-width="2"/>
      <text x="153" y="116" text-anchor="middle" font-size="24" font-weight="700">P</text>
      <rect x="186" y="80" width="66" height="56" fill="#e8f0fe" stroke="#3776ab" stroke-width="2"/>
      <text x="219" y="116" text-anchor="middle" font-size="24" font-weight="700">y</text>
      <rect x="252" y="80" width="66" height="56" fill="#e8f0fe" stroke="#3776ab" stroke-width="2"/>
      <text x="285" y="116" text-anchor="middle" font-size="24" font-weight="700">t</text>
      <rect x="318" y="80" width="66" height="56" fill="#e8f0fe" stroke="#3776ab" stroke-width="2"/>
      <text x="351" y="116" text-anchor="middle" font-size="24" font-weight="700">h</text>
      <rect x="384" y="80" width="66" height="56" fill="#e8f0fe" stroke="#3776ab" stroke-width="2"/>
      <text x="417" y="116" text-anchor="middle" font-size="24" font-weight="700">o</text>
      <rect x="450" y="80" width="66" height="56" fill="#e8f0fe" stroke="#3776ab" stroke-width="2"/>
      <text x="483" y="116" text-anchor="middle" font-size="24" font-weight="700">n</text>
    </g>
    <!-- positive indices -->
    <g font-size="14" fill="#3776ab" font-weight="700">
      <text x="153" y="72" text-anchor="middle">0</text>
      <text x="219" y="72" text-anchor="middle">1</text>
      <text x="285" y="72" text-anchor="middle">2</text>
      <text x="351" y="72" text-anchor="middle">3</text>
      <text x="417" y="72" text-anchor="middle">4</text>
      <text x="483" y="72" text-anchor="middle">5</text>
    </g>
    <!-- negative indices -->
    <g font-size="13" fill="#c62828">
      <text x="153" y="156" text-anchor="middle">-6</text>
      <text x="219" y="156" text-anchor="middle">-5</text>
      <text x="285" y="156" text-anchor="middle">-4</text>
      <text x="351" y="156" text-anchor="middle">-3</text>
      <text x="417" y="156" text-anchor="middle">-2</text>
      <text x="483" y="156" text-anchor="middle">-1</text>
    </g>
  </g>

  <!-- slice examples -->
  <g font-family="Consolas, monospace" font-size="14">
    <rect x="80" y="190" width="220" height="30" rx="6" fill="#f3e5f5" stroke="#8e24aa" stroke-width="1.5"/>
    <text x="92" y="210" fill="#6a1b9a">s[0]    → 'P'   s[-1] → 'n'</text>
    <rect x="340" y="190" width="220" height="30" rx="6" fill="#f3e5f5" stroke="#8e24aa" stroke-width="1.5"/>
    <text x="352" y="210" fill="#6a1b9a">s[0:3]  → 'Pyt'</text>
    <rect x="80" y="228" width="220" height="30" rx="6" fill="#fff3e0" stroke="#ffb74d" stroke-width="1.5"/>
    <text x="92" y="248" fill="#ef6c00">s[2:]   → 'thon'</text>
    <rect x="340" y="228" width="220" height="30" rx="6" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1.5"/>
    <text x="352" y="248" fill="#2e7d32">s[::-1] → 'nohtyP'  (разворот)</text>
  </g>
  <text x="320" y="285" text-anchor="middle" font-size="12" fill="#888">строка неизменяема: s[0]="J" нельзя — создаётся новая строка</text>
</svg>

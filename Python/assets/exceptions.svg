<svg viewBox="0 0 720 300" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="720" height="300" fill="#eef5fb" rx="12"/>
  <text x="360" y="30" text-anchor="middle" font-size="19" font-weight="700" fill="#1e3a5f">Исключения: try / except / else / finally</text>

  <!-- flow -->
  <rect x="40" y="60" width="170" height="50" rx="8" fill="#fff" stroke="#3776ab" stroke-width="2"/>
  <text x="125" y="83" text-anchor="middle" font-size="12.5" font-family="monospace" font-weight="700" fill="#3776ab">try:</text>
  <text x="125" y="100" text-anchor="middle" font-size="10" fill="#6b7280">рискованный код</text>

  <!-- branch ok -->
  <rect x="290" y="55" width="170" height="44" rx="8" fill="#e8f5e9" stroke="#2e7d32"/>
  <text x="375" y="74" text-anchor="middle" font-size="11.5" font-family="monospace" font-weight="700" fill="#2e7d32">else:</text>
  <text x="375" y="91" text-anchor="middle" font-size="9.5" fill="#475569">всё прошло без ошибки</text>

  <!-- branch err -->
  <rect x="290" y="115" width="170" height="44" rx="8" fill="#ffebee" stroke="#c62828"/>
  <text x="375" y="134" text-anchor="middle" font-size="11.5" font-family="monospace" font-weight="700" fill="#c62828">except E as e:</text>
  <text x="375" y="151" text-anchor="middle" font-size="9.5" fill="#475569">поймать и обработать</text>

  <!-- finally -->
  <rect x="520" y="85" width="160" height="50" rx="8" fill="#fff8e1" stroke="#f59e0b"/>
  <text x="600" y="108" text-anchor="middle" font-size="11.5" font-family="monospace" font-weight="700" fill="#b45309">finally:</text>
  <text x="600" y="124" text-anchor="middle" font-size="9.5" fill="#475569">ВСЕГДА (очистка)</text>

  <g stroke="#3776ab" stroke-width="2" fill="none">
    <path d="M 210 78 L 288 76"/><polygon points="290,76 281,72 281,80" fill="#2e7d32"/>
    <path d="M 210 95 L 288 134"/><polygon points="290,135 281,130 280,138" fill="#c62828"/>
    <path d="M 460 77 L 518 100"/><polygon points="520,101 511,99 514,107" fill="#f59e0b"/>
    <path d="M 460 137 L 518 115"/><polygon points="520,114 511,116 514,123" fill="#f59e0b"/>
  </g>
  <text x="248" y="68" font-size="9" fill="#2e7d32">ок</text>
  <text x="240" y="120" font-size="9" fill="#c62828">ошибка</text>

  <rect x="40" y="185" width="640" height="100" rx="8" fill="#fff" stroke="#bcd4ea"/>
  <text x="58" y="208" font-size="12.5" font-weight="700" fill="#1e3a5f">EAFP — «проще просить прощения, чем разрешения» (питоний стиль):</text>
  <text x="58" y="230" font-size="11.5" font-family="monospace" fill="#374151">try: value = d[key]      # пробуй сделать</text>
  <text x="58" y="249" font-size="11.5" font-family="monospace" fill="#374151">except KeyError: ...      # обработай, если не вышло</text>
  <text x="58" y="272" font-size="11" fill="#6b7280">Лови КОНКРЕТНЫЕ исключения (KeyError), не голый except. finally — для close/release.</text>
</svg>

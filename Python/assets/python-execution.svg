<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" font-family="Segoe UI, Arial, sans-serif">
  <rect width="700" height="220" fill="#ffffff"/>
  <text x="350" y="34" text-anchor="middle" font-size="21" font-weight="700" fill="#1a1a2e">Как Python выполняет твой код</text>

  <defs>
    <marker id="pe" markerWidth="11" markerHeight="11" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- source -->
  <rect x="30" y="95" width="120" height="60" rx="8" fill="#eceff1" stroke="#455a64" stroke-width="2"/>
  <text x="90" y="120" text-anchor="middle" font-size="13" font-weight="700" font-family="Consolas, monospace">program.py</text>
  <text x="90" y="140" text-anchor="middle" font-size="11" fill="#666">твой текст</text>

  <!-- compiler -->
  <rect x="210" y="95" width="140" height="60" rx="8" fill="#e8f0fe" stroke="#3776ab" stroke-width="2"/>
  <text x="280" y="118" text-anchor="middle" font-size="13" font-weight="700" fill="#3776ab">Компилятор</text>
  <text x="280" y="138" text-anchor="middle" font-size="11" fill="#555">→ байт-код (.pyc)</text>

  <!-- PVM -->
  <rect x="410" y="95" width="140" height="60" rx="8" fill="#fff8e1" stroke="#f4b400" stroke-width="2.5"/>
  <text x="480" y="118" text-anchor="middle" font-size="13" font-weight="700" fill="#bb8a00">PVM</text>
  <text x="480" y="138" text-anchor="middle" font-size="11" fill="#555">выполняет байт-код</text>

  <!-- result -->
  <rect x="600" y="95" width="80" height="60" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="640" y="122" text-anchor="middle" font-size="13" font-weight="700" fill="#2e7d32">Вывод</text>
  <text x="640" y="140" text-anchor="middle" font-size="16">✓</text>

  <path d="M151 125 L 207 125" stroke="#555" stroke-width="2" marker-end="url(#pe)"/>
  <path d="M351 125 L 407 125" stroke="#555" stroke-width="2" marker-end="url(#pe)"/>
  <path d="M551 125 L 597 125" stroke="#555" stroke-width="2" marker-end="url(#pe)"/>

  <text x="350" y="195" text-anchor="middle" font-size="13" fill="#3776ab" font-weight="600">CPython = компилятор в байт-код + виртуальная машина (PVM). Это интерпретатор.</text>
</svg>

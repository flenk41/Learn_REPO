<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" font-family="Segoe UI, Arial, sans-serif">
  <rect width="760" height="380" rx="16" fill="#fff1f2"/>
  <text x="380" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#881337">Соц. инженерия бьёт в обход техники</text>

  <!-- wall of technical defenses -->
  <text x="230" y="74" text-anchor="middle" font-size="13.5" font-weight="700" fill="#475569">Технические защиты</text>
  <g font-size="12" text-anchor="middle">
    <rect x="80" y="90" width="140" height="40" rx="8" fill="#e2e8f0" stroke="#94a3b8"/><text x="150" y="115" fill="#334155">🛡️ Файрвол</text>
    <rect x="80" y="138" width="140" height="40" rx="8" fill="#e2e8f0" stroke="#94a3b8"/><text x="150" y="163" fill="#334155">🔒 Шифрование</text>
    <rect x="80" y="186" width="140" height="40" rx="8" fill="#e2e8f0" stroke="#94a3b8"/><text x="150" y="211" fill="#334155">🦠 Антивирус</text>
    <rect x="80" y="234" width="140" height="40" rx="8" fill="#e2e8f0" stroke="#94a3b8"/><text x="150" y="259" fill="#334155">🔑 Сложные пароли</text>
  </g>
  <text x="150" y="298" text-anchor="middle" font-size="11.5" fill="#16a34a" font-weight="700">крепко защищено ✅</text>

  <!-- bypass arrow -->
  <defs><marker id="ah" markerWidth="11" markerHeight="11" refX="8" refY="4.5" orient="auto"><path d="M0,0 L10,4.5 L0,9 z" fill="#be123c"/></marker></defs>
  <path d="M250,182 C360,182 360,182 420,182" fill="none" stroke="#be123c" stroke-width="3" stroke-dasharray="2 0" marker-end="url(#ah)"/>
  <text x="335" y="172" text-anchor="middle" font-size="12.5" fill="#be123c" font-weight="700">одно письмо/звонок</text>
  <text x="335" y="200" text-anchor="middle" font-size="11.5" fill="#be123c">в ОБХОД всего</text>

  <!-- the human target -->
  <circle cx="540" cy="182" r="62" fill="#fecdd3" stroke="#be123c" stroke-width="2.5"/>
  <text x="540" y="178" text-anchor="middle" font-size="34">🧑‍💻</text>
  <text x="540" y="212" text-anchor="middle" font-size="13" fill="#881337" font-weight="700">ЧЕЛОВЕК</text>
  <text x="540" y="270" text-anchor="middle" font-size="12" fill="#be123c" font-weight="700">сам отдаёт пароль/доступ/деньги</text>

  <rect x="60" y="320" width="640" height="44" rx="10" fill="#ffe4e6"/>
  <text x="380" y="347" text-anchor="middle" font-size="12.5" fill="#881337">Зачем ломать дверь, если можно <tspan font-weight="700">уговорить открыть</tspan>? Человек — часть периметра безопасности.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" font-family="Segoe UI, Arial, sans-serif">
  <rect width="760" height="400" rx="16" fill="#fff1f2"/>
  <text x="380" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#881337">Личная защита: что закрывает большинство атак</text>

  <!-- top 3 priority -->
  <text x="380" y="66" text-anchor="middle" font-size="13.5" font-weight="700" fill="#be123c">ТОП-3 за вечер (максимум пользы)</text>
  <g font-size="12.5" text-anchor="middle">
    <rect x="60" y="80" width="210" height="64" rx="10" fill="#be123c"/>
    <text x="165" y="106" fill="#fff" font-weight="700">🔑 Менеджер паролей</text>
    <text x="165" y="126" fill="#fecdd3" font-size="11">уникальный пароль на сервис</text>
    <rect x="285" y="80" width="190" height="64" rx="10" fill="#be123c"/>
    <text x="380" y="106" fill="#fff" font-weight="700">📱 MFA на почте</text>
    <text x="380" y="126" fill="#fecdd3" font-size="11">почта = ключ ко всему</text>
    <rect x="490" y="80" width="210" height="64" rx="10" fill="#be123c"/>
    <text x="595" y="106" fill="#fff" font-weight="700">⏸️ Рефлекс паузы</text>
    <text x="595" y="126" fill="#fecdd3" font-size="11">срочность/секрет → стоп</text>
  </g>

  <!-- supporting layers -->
  <text x="380" y="176" text-anchor="middle" font-size="13" font-weight="700" fill="#9f1239">Дальше — гигиена-привычки</text>
  <g font-size="12" fill="#881337">
    <rect x="70" y="190" width="300" height="34" rx="7" fill="#fff" stroke="#fecdd3"/><text x="86" y="212">✅ проверять отправителя и реальные ссылки</text>
    <rect x="390" y="190" width="300" height="34" rx="7" fill="#fff" stroke="#fecdd3"/><text x="406" y="212">✅ «положи трубку и перезвони сам»</text>
    <rect x="70" y="230" width="300" height="34" rx="7" fill="#fff" stroke="#fecdd3"/><text x="86" y="252">✅ выдуманные ответы на секрет-вопросы</text>
    <rect x="390" y="230" width="300" height="34" rx="7" fill="#fff" stroke="#fecdd3"/><text x="406" y="252">✅ блокировать экран, обновления</text>
    <rect x="70" y="270" width="300" height="34" rx="7" fill="#fff" stroke="#fecdd3"/><text x="86" y="292">✅ не вводить пароль по ссылке из письма</text>
    <rect x="390" y="270" width="300" height="34" rx="7" fill="#fff" stroke="#fecdd3"/><text x="406" y="292">✅ проверять email в базах утечек</text>
  </g>

  <rect x="60" y="320" width="640" height="64" rx="10" fill="#dcfce7"/>
  <text x="380" y="344" text-anchor="middle" font-size="12.5" fill="#166534" font-weight="700">Гигиена &gt; героизм: привычки работают фоном и ловят атаку, даже когда бдительность подвела.</text>
  <text x="380" y="366" text-anchor="middle" font-size="11.5" fill="#15803d">Уникальные пароли + MFA обесценивают украденный пароль. Пауза обезоруживает срочный фишинг.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="Segoe UI, Arial, sans-serif">
  <rect width="760" height="360" rx="16" fill="#fff1f2"/>
  <text x="380" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#881337">Цепочка атаки — разорви любое звено</text>

  <!-- chain stages -->
  <defs><marker id="ac2" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#be123c"/></marker></defs>
  <g font-size="12" text-anchor="middle">
    <rect x="40" y="80" width="120" height="50" rx="9" fill="#be123c"/><text x="100" y="103" fill="#fff" font-weight="700">1 Разведка</text><text x="100" y="120" fill="#fecdd3" font-size="10">OSINT</text>
    <rect x="190" y="80" width="120" height="50" rx="9" fill="#be123c"/><text x="250" y="103" fill="#fff" font-weight="700">2 Подготовка</text><text x="250" y="120" fill="#fecdd3" font-size="10">претекст/письмо</text>
    <rect x="340" y="80" width="120" height="50" rx="9" fill="#be123c"/><text x="400" y="103" fill="#fff" font-weight="700">3 Контакт</text><text x="400" y="120" fill="#fecdd3" font-size="10">письмо/звонок</text>
    <rect x="490" y="80" width="120" height="50" rx="9" fill="#be123c"/><text x="550" y="103" fill="#fff" font-weight="700">4 Эксплуатация</text><text x="550" y="120" fill="#fecdd3" font-size="10">выдал данные</text>
    <rect x="640" y="80" width="90" height="50" rx="9" fill="#7f1d1d"/><text x="685" y="103" fill="#fff" font-weight="700">5 Цель</text><text x="685" y="120" fill="#fecaca" font-size="10">доступ/деньги</text>
  </g>
  <g stroke="#be123c" stroke-width="2.5" marker-end="url(#ac2)">
    <line x1="162" y1="105" x2="186" y2="105"/>
    <line x1="312" y1="105" x2="336" y2="105"/>
    <line x1="462" y1="105" x2="486" y2="105"/>
    <line x1="612" y1="105" x2="636" y2="105"/>
  </g>

  <!-- cut points / defenses -->
  <g font-size="22" text-anchor="middle" fill="#16a34a">
    <text x="100" y="160">✂️</text>
    <text x="400" y="160">✂️</text>
    <text x="550" y="160">✂️</text>
    <text x="640" y="160">✂️</text>
  </g>
  <g font-size="11" text-anchor="middle" fill="#15803d" font-weight="700">
    <text x="100" y="184">меньше следа</text>
    <text x="400" y="184">распознал письмо</text>
    <text x="550" y="184">MFA спасает</text>
    <text x="690" y="184">мониторинг</text>
  </g>

  <!-- defense in depth layers -->
  <rect x="60" y="210" width="640" height="92" rx="10" fill="#ffe4e6"/>
  <text x="380" y="234" text-anchor="middle" font-size="13" fill="#881337" font-weight="700">Защита в глубину — несколько рубежей</text>
  <g font-size="11.5" fill="#881337" text-anchor="middle">
    <text x="160" y="258">🔒 меньше следа</text>
    <text x="380" y="258">👁️ распознавание</text>
    <text x="600" y="258">🔑 MFA / мониторинг</text>
  </g>
  <text x="380" y="284" text-anchor="middle" font-size="12" fill="#9f1239">человек ошибётся — пусть поймает следующий слой. Достаточно разорвать ОДНО звено.</text>

  <text x="380" y="332" text-anchor="middle" font-size="11.5" font-style="italic" fill="#be123c">атака — это процесс, а не одно письмо. На каждом этапе есть защитное действие.</text>
</svg>

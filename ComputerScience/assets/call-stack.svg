<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" font-family="Segoe UI, Arial, sans-serif">
  <rect width="760" height="400" rx="16" fill="#f0f9ff"/>
  <text x="380" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#0c4a6e">Стек вызовов: main() → f() → g()</text>

  <!-- stack frames -->
  <g text-anchor="middle" font-size="12">
    <rect x="240" y="60" width="280" height="44" rx="6" fill="#7dd3fc"/>
    <text x="380" y="80" fill="#0c4a6e" font-weight="700">кадр main</text>
    <text x="380" y="97" font-size="10.5" fill="#0369a1">локальные main</text>

    <rect x="240" y="108" width="280" height="60" rx="6" fill="#38bdf8"/>
    <text x="380" y="127" fill="#0c4a6e" font-size="10.5">↑ адрес возврата в main</text>
    <text x="380" y="144" fill="#0c4a6e" font-weight="700">кадр f</text>
    <text x="380" y="160" font-size="10.5" fill="#0369a1">сохранённые регистры + локальные f</text>

    <rect x="240" y="172" width="280" height="60" rx="6" fill="#0ea5e9"/>
    <text x="380" y="191" fill="#fff" font-size="10.5">↑ адрес возврата в f</text>
    <text x="380" y="208" fill="#fff" font-weight="700">кадр g  ← rsp (вершина)</text>
    <text x="380" y="224" font-size="10.5" fill="#e0f2fe">локальные g</text>
  </g>
  <text x="565" y="205" font-size="11" fill="#0369a1" font-weight="700">← rsp</text>
  <text x="200" y="150" text-anchor="end" font-size="10.5" fill="#0369a1" transform="rotate(-90 200 150)">растёт вниз (LIFO)</text>

  <!-- prologue/epilogue -->
  <rect x="560" y="60" width="170" height="100" rx="8" fill="#fff" stroke="#0369a1"/>
  <text x="645" y="80" text-anchor="middle" font-size="11.5" fill="#0c4a6e" font-weight="700">пролог функции:</text>
  <text x="572" y="100" font-size="9.5" font-family="Consolas,monospace" fill="#0369a1">push rbp</text>
  <text x="572" y="114" font-size="9.5" font-family="Consolas,monospace" fill="#0369a1">mov rbp, rsp</text>
  <text x="572" y="128" font-size="9.5" font-family="Consolas,monospace" fill="#0369a1">sub rsp, N</text>
  <text x="645" y="150" text-anchor="middle" font-size="10" fill="#0369a1">эпилог: ret → назад</text>

  <rect x="60" y="252" width="640" height="60" rx="10" fill="#e0f2fe"/>
  <text x="380" y="276" text-anchor="middle" font-size="12.5" fill="#0c4a6e">call → кладёт адрес возврата на стек · ret → снимает и прыгает назад · выделение локальных = сдвиг rsp</text>
  <text x="380" y="298" text-anchor="middle" font-size="12" fill="#0c4a6e">Стек <tspan font-weight="700">быстр</tspan> (движение указателя) но <tspan font-weight="700">ограничен</tspan> (~8 МБ) → глубокая рекурсия = переполнение.</text>

  <rect x="60" y="322" width="640" height="58" rx="10" fill="#fee2e2"/>
  <text x="380" y="345" text-anchor="middle" font-size="12" fill="#7f1d1d" font-weight="700">⚠️ Безопасность: адрес возврата лежит рядом с буферами на стеке.</text>
  <text x="380" y="366" text-anchor="middle" font-size="11.5" fill="#7f1d1d">Переполнение буфера без проверки границ → перезапись адреса возврата → захват исполнения.</text>
</svg>

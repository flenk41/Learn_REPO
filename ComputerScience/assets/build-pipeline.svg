<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" font-family="Segoe UI, Arial, sans-serif">
  <rect width="760" height="400" rx="16" fill="#f0f9ff"/>
  <text x="380" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#0c4a6e">От исходника к программе: 4 шага ⭐⭐</text>

  <defs><marker id="ap" markerWidth="11" markerHeight="11" refX="8" refY="4.5" orient="auto"><path d="M0,0 L10,4.5 L0,9 z" fill="#0369a1"/></marker></defs>

  <g text-anchor="middle">
    <rect x="40" y="70" width="120" height="56" rx="8" fill="#0c4a6e"/><text x="100" y="95" font-size="13" fill="#fff" font-weight="700">main.c</text><text x="100" y="114" font-size="10.5" fill="#bae6fd">исходник</text>

    <rect x="210" y="70" width="120" height="56" rx="8" fill="#0369a1"/><text x="270" y="92" font-size="11.5" fill="#fff" font-weight="700">1 Препроцессор</text><text x="270" y="109" font-size="10" fill="#bae6fd">#include #define</text><text x="270" y="122" font-size="10" fill="#bae6fd">→ main.i</text>

    <rect x="380" y="70" width="120" height="56" rx="8" fill="#0369a1"/><text x="440" y="92" font-size="11.5" fill="#fff" font-weight="700">2 Компилятор</text><text x="440" y="109" font-size="10" fill="#bae6fd">→ АССЕМБЛЕР</text><text x="440" y="122" font-size="10" fill="#bae6fd">main.s</text>

    <rect x="550" y="70" width="120" height="56" rx="8" fill="#0369a1"/><text x="610" y="92" font-size="11.5" fill="#fff" font-weight="700">3 Ассемблер</text><text x="610" y="109" font-size="10" fill="#bae6fd">→ маш. код</text><text x="610" y="122" font-size="10" fill="#bae6fd">main.o (объектник)</text>
  </g>
  <g stroke="#0369a1" stroke-width="2.5" marker-end="url(#ap)">
    <line x1="162" y1="98" x2="206" y2="98"/>
    <line x1="332" y1="98" x2="376" y2="98"/>
    <line x1="502" y1="98" x2="546" y2="98"/>
  </g>

  <!-- linking -->
  <line x1="610" y1="128" x2="610" y2="158" stroke="#0369a1" stroke-width="2.5" marker-end="url(#ap)"/>
  <rect x="250" y="160" width="260" height="56" rx="8" fill="#0284c7"/>
  <text x="380" y="184" text-anchor="middle" font-size="12.5" fill="#fff" font-weight="700">4 Линковщик (+ библиотеки)</text>
  <text x="380" y="203" text-anchor="middle" font-size="10.5" fill="#e0f2fe">соединяет .o, разрешает символы, релокации</text>
  <line x1="550" y1="180" x2="512" y2="180" stroke="#0369a1" stroke-width="2.5" marker-end="url(#ap)"/>
  <text x="595" y="150" font-size="10.5" fill="#0369a1">utils.o, libc…</text>

  <line x1="380" y1="218" x2="380" y2="246" stroke="#0369a1" stroke-width="2.5" marker-end="url(#ap)"/>
  <rect x="300" y="248" width="160" height="44" rx="8" fill="#16a34a"/>
  <text x="380" y="272" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">program (ELF/PE)</text>

  <rect x="60" y="306" width="640" height="80" rx="10" fill="#e0f2fe"/>
  <text x="380" y="330" text-anchor="middle" font-size="12.5" fill="#0c4a6e">Каждый шаг можно вызвать отдельно: <tspan font-family="Consolas,monospace">gcc -E</tspan> · <tspan font-family="Consolas,monospace">-S</tspan> · <tspan font-family="Consolas,monospace">-c</tspan> · (линковка)</text>
  <text x="380" y="352" text-anchor="middle" font-size="12" fill="#0c4a6e"><tspan font-weight="700">undefined reference</tspan> = шаг 4 не нашёл символ · <tspan font-weight="700">multiple definition</tspan> = нашёл дважды</text>
  <text x="380" y="374" text-anchor="middle" font-size="11.5" font-style="italic" fill="#0369a1">«скомпилировать» — это на самом деле 4 разных шага. Понял их → сборка перестала быть магией.</text>
</svg>

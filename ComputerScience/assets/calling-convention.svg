<svg viewBox="0 0 720 300" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="720" height="300" fill="#f0f9ff" rx="12"/>
  <text x="360" y="30" text-anchor="middle" font-size="19" font-weight="700" fill="#0c4a6e">Соглашение о вызове: как передать аргументы</text>

  <text x="40" y="62" font-size="13" font-family="monospace" fill="#0c4a6e">add(a, b, c)  // вызов функции</text>

  <!-- registers -->
  <rect x="40" y="80" width="300" height="150" rx="10" fill="#fff" stroke="#0369a1" stroke-width="2"/>
  <text x="190" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#0369a1">первые аргументы → РЕГИСТРЫ</text>
  <g font-family="monospace" font-size="12">
    <rect x="60" y="115" width="120" height="28" rx="4" fill="#e0f2fe"/><text x="120" y="134" text-anchor="middle" fill="#0c4a6e">rdi = a</text>
    <rect x="60" y="148" width="120" height="28" rx="4" fill="#e0f2fe"/><text x="120" y="167" text-anchor="middle" fill="#0c4a6e">rsi = b</text>
    <rect x="60" y="181" width="120" height="28" rx="4" fill="#e0f2fe"/><text x="120" y="200" text-anchor="middle" fill="#0c4a6e">rdx = c</text>
    <rect x="200" y="115" width="120" height="28" rx="4" fill="#dcfce7"/><text x="260" y="134" text-anchor="middle" fill="#166534">rax = ответ</text>
  </g>
  <text x="190" y="222" text-anchor="middle" font-size="9.5" fill="#64748b">(System V ABI, x86-64: rdi,rsi,rdx,rcx,r8,r9)</text>

  <!-- stack -->
  <rect x="380" y="80" width="300" height="150" rx="10" fill="#fff" stroke="#0369a1" stroke-width="2"/>
  <text x="530" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#0369a1">остальные → СТЕК</text>
  <g font-size="11" fill="#0c4a6e">
    <rect x="430" y="115" width="200" height="26" rx="3" fill="#f1f5f9" stroke="#94a3b8"/><text x="530" y="133" text-anchor="middle">адрес возврата</text>
    <rect x="430" y="143" width="200" height="26" rx="3" fill="#f1f5f9" stroke="#94a3b8"/><text x="530" y="161" text-anchor="middle">сохранённый rbp</text>
    <rect x="430" y="171" width="200" height="26" rx="3" fill="#e0f2fe" stroke="#94a3b8"/><text x="530" y="189" text-anchor="middle">локальные переменные</text>
  </g>
  <text x="530" y="222" text-anchor="middle" font-size="9.5" fill="#64748b">кадр (stack frame) функции</text>

  <rect x="40" y="250" width="640" height="42" rx="8" fill="#fff" stroke="#bae6fd"/>
  <text x="360" y="270" text-anchor="middle" font-size="11.5" fill="#0c4a6e">ABI = договор, КАК вызывать функции (регистры/стек/возврат). Поэтому код разных компиляторов/языков совместим.</text>
  <text x="360" y="287" text-anchor="middle" font-size="10.5" fill="#64748b">Это и основа FFI (Rust↔C), и почему важно для отладки/безопасности (переполнение стека).</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" font-family="Segoe UI, Arial, sans-serif">
  <rect width="760" height="420" rx="16" fill="#f0f9ff"/>
  <text x="380" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#0c4a6e">Башня абстракций: от транзистора до программы</text>

  <g text-anchor="middle" font-size="13">
    <rect x="180" y="56" width="400" height="34" rx="6" fill="#7dd3fc"/><text x="380" y="79" fill="#0c4a6e" font-weight="700">Приложение (твой код) ← ты здесь</text>
    <rect x="180" y="94" width="400" height="34" rx="6" fill="#7dd3fc"/><text x="380" y="117" fill="#0c4a6e">Язык / рантайм (C, C++, Rust, Python…)</text>
    <rect x="180" y="132" width="400" height="34" rx="6" fill="#0ea5e9"/><text x="380" y="155" fill="#fff" font-weight="700">Компилятор / тулчейн → машинный код  ⭐ Ур.2</text>
    <rect x="180" y="170" width="400" height="34" rx="6" fill="#7dd3fc"/><text x="380" y="193" fill="#0c4a6e">Операционная система (ядро, процессы) ← Ур.3 + ОС</text>
    <rect x="180" y="208" width="400" height="34" rx="6" fill="#7dd3fc"/><text x="380" y="231" fill="#0c4a6e">ISA — набор команд (x86-64 / ARM)</text>
    <rect x="180" y="246" width="400" height="34" rx="6" fill="#0ea5e9"/><text x="380" y="269" fill="#fff" font-weight="700">Микроархитектура (CPU: конвейер, кэш) ← Ур.1</text>
    <rect x="180" y="284" width="400" height="34" rx="6" fill="#7dd3fc"/><text x="380" y="307" fill="#0c4a6e">Логические схемы (вентили, регистры)</text>
    <rect x="180" y="322" width="400" height="34" rx="6" fill="#bae6fd"/><text x="380" y="345" fill="#0c4a6e">Транзисторы / физика</text>
  </g>

  <text x="120" y="120" text-anchor="middle" font-size="11" fill="#0369a1" font-weight="700" transform="rotate(-90 120 200)">высокий уровень</text>
  <text x="640" y="300" text-anchor="middle" font-size="11" fill="#0369a1" font-weight="700" transform="rotate(-90 640 280)">ближе к железу</text>

  <rect x="60" y="372" width="640" height="40" rx="10" fill="#e0f2fe"/>
  <text x="380" y="397" text-anchor="middle" font-size="12.5" fill="#0c4a6e">Системный разработчик понимает <tspan font-weight="700">середину башни</tspan> (компилятор → CPU → память) — не нужна физика.</text>
</svg>

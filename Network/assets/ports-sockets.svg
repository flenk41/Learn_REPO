<svg viewBox="0 0 720 290" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="720" height="290" fill="#eff6ff" rx="12"/>
  <text x="360" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1e3a8a">Порты и сокеты: адрес = IP + порт</text>

  <!-- client -->
  <rect x="40" y="70" width="200" height="130" rx="10" fill="#fff" stroke="#2563eb" stroke-width="2"/>
  <text x="140" y="94" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">КЛИЕНТ</text>
  <text x="140" y="116" text-anchor="middle" font-size="11.5" fill="#374151">IP 192.168.1.5</text>
  <rect x="65" y="130" width="150" height="28" rx="5" fill="#dbeafe"/><text x="140" y="149" text-anchor="middle" font-size="10.5" fill="#1e3a8a">порт 54321 (случайный)</text>
  <text x="140" y="180" text-anchor="middle" font-size="10" fill="#6b7280">браузер</text>

  <!-- server -->
  <rect x="480" y="70" width="200" height="130" rx="10" fill="#fff" stroke="#2563eb" stroke-width="2"/>
  <text x="580" y="94" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">СЕРВЕР</text>
  <text x="580" y="116" text-anchor="middle" font-size="11.5" fill="#374151">IP 93.184.216.34</text>
  <rect x="505" y="130" width="150" height="28" rx="5" fill="#dbeafe"/><text x="580" y="149" text-anchor="middle" font-size="10.5" fill="#1e3a8a">порт 443 (HTTPS)</text>
  <text x="580" y="180" text-anchor="middle" font-size="10" fill="#6b7280">веб-сервер слушает</text>

  <!-- connection -->
  <path d="M 240 135 L 478 135" stroke="#1e3a8a" stroke-width="2.5" fill="none"/>
  <circle cx="240" cy="135" r="5" fill="#2563eb"/><circle cx="478" cy="135" r="5" fill="#2563eb"/>
  <text x="360" y="125" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">соединение (сокет ↔ сокет)</text>

  <rect x="60" y="215" width="600" height="62" rx="8" fill="#fff" stroke="#bfdbfe"/>
  <text x="78" y="238" font-size="12" fill="#1e3a8a"><tspan font-weight="700">Сокет</tspan> = IP + порт. Соединение определяется ЧЕТВЁРКОЙ:</text>
  <text x="78" y="258" font-size="11.5" font-family="monospace" fill="#1d4ed8">(IP клиента, порт клиента, IP сервера, порт сервера)</text>
  <text x="78" y="273" font-size="10.5" fill="#475569">порт = «дверь» к нужной программе (80 HTTP, 443 HTTPS, 22 SSH, 53 DNS). IP находит машину, порт — программу.</text>
</svg>

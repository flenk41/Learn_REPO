<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="Segoe UI, Arial, sans-serif">
  <rect x="0" y="0" width="720" height="380" rx="16" fill="#f3f6fc"/>
  <text x="360" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">DNS — как имя превращается в IP-адрес</text>

  <rect x="40" y="70" width="150" height="56" rx="10" fill="#2563eb"/>
  <text x="115" y="95" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">браузер</text>
  <text x="115" y="114" text-anchor="middle" font-size="11" fill="#dbeafe">google.com?</text>

  <rect x="285" y="70" width="150" height="56" rx="10" fill="#fff" stroke="#0891b2" stroke-width="2"/>
  <text x="360" y="95" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">резолвер</text>
  <text x="360" y="114" text-anchor="middle" font-size="11" fill="#64748b">(есть в кэше?)</text>

  <line x1="190" y1="98" x2="280" y2="98" stroke="#475569" stroke-width="2" marker-end="url(#c)"/>

  <!-- hierarchy -->
  <rect x="540" y="58" width="150" height="34" rx="8" fill="#fff" stroke="#94a3b8" stroke-width="1.4"/>
  <text x="615" y="80" text-anchor="middle" font-size="12" fill="#1e293b">корень (.)</text>
  <rect x="540" y="100" width="150" height="34" rx="8" fill="#fff" stroke="#94a3b8" stroke-width="1.4"/>
  <text x="615" y="122" text-anchor="middle" font-size="12" fill="#1e293b">TLD (.com)</text>
  <rect x="540" y="142" width="150" height="34" rx="8" fill="#fff" stroke="#94a3b8" stroke-width="1.4"/>
  <text x="615" y="164" text-anchor="middle" font-size="11.5" fill="#1e293b">авторитет. google.com</text>

  <line x1="435" y1="92" x2="535" y2="75" stroke="#475569" stroke-width="1.6" marker-end="url(#c)"/>
  <line x1="435" y1="100" x2="535" y2="117" stroke="#475569" stroke-width="1.6" marker-end="url(#c)"/>
  <line x1="435" y1="110" x2="535" y2="159" stroke="#475569" stroke-width="1.6" marker-end="url(#c)"/>
  <text x="487" y="135" text-anchor="middle" font-size="10.5" fill="#64748b">идёт по иерархии</text>

  <!-- answer back -->
  <rect x="240" y="210" width="240" height="44" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.6"/>
  <text x="360" y="238" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">ответ: 142.250.74.78 → кэшируется</text>
  <line x1="615" y1="176" x2="430" y2="208" stroke="#2563eb" stroke-width="2" marker-end="url(#c)"/>
  <line x1="300" y1="210" x2="180" y2="128" stroke="#2563eb" stroke-width="2" marker-end="url(#c)"/>

  <text x="360" y="300" text-anchor="middle" font-size="12.5" fill="#334155">имя читается справа налево по зонам: . → .com → google.com → www</text>
  <text x="360" y="326" text-anchor="middle" font-size="12" font-style="italic" fill="#64748b">первый запрос — весь путь; следующие (пока жив TTL) — из кэша, мгновенно</text>

  <defs>
    <marker id="c" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#475569"/>
    </marker>
  </defs>
</svg>

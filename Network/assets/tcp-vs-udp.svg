<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="Segoe UI, Arial, sans-serif">
  <rect x="0" y="0" width="720" height="400" rx="16" fill="#f3f6fc"/>
  <text x="360" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">TCP против UDP ⭐⭐</text>

  <!-- TCP card -->
  <rect x="40" y="62" width="310" height="300" rx="12" fill="#fff" stroke="#2563eb" stroke-width="2"/>
  <rect x="40" y="62" width="310" height="44" rx="12" fill="#2563eb"/>
  <text x="195" y="91" text-anchor="middle" font-size="17" font-weight="700" fill="#fff">TCP — «телефонный звонок»</text>
  <g font-size="13" fill="#1e293b">
    <text x="62" y="136">✅ соединение (рукопожатие)</text>
    <text x="62" y="164">✅ гарантирует доставку</text>
    <text x="62" y="192">✅ сохраняет порядок</text>
    <text x="62" y="220">✅ переотправляет потери</text>
    <text x="62" y="248">📦 поток байт</text>
    <text x="62" y="276" fill="#b91c1c">➖ медленнее старт, накладные</text>
  </g>
  <rect x="62" y="296" width="266" height="50" rx="8" fill="#dbeafe"/>
  <text x="195" y="318" text-anchor="middle" font-size="12" fill="#1e3a8a">веб, файлы, почта, SSH, БД</text>
  <text x="195" y="337" text-anchor="middle" font-size="11.5" font-style="italic" fill="#1e3a8a">когда важна ПОЛНОТА</text>

  <!-- UDP card -->
  <rect x="370" y="62" width="310" height="300" rx="12" fill="#fff" stroke="#0891b2" stroke-width="2"/>
  <rect x="370" y="62" width="310" height="44" rx="12" fill="#0891b2"/>
  <text x="525" y="91" text-anchor="middle" font-size="17" font-weight="700" fill="#fff">UDP — «открытка по почте»</text>
  <g font-size="13" fill="#1e293b">
    <text x="392" y="136">⚡ без соединения — шлёшь сразу</text>
    <text x="392" y="164">➖ не гарантирует доставку</text>
    <text x="392" y="192">➖ порядок не гарантирован</text>
    <text x="392" y="220">➖ не переотправляет</text>
    <text x="392" y="248">✉️ отдельные сообщения</text>
    <text x="392" y="276" fill="#047857">✅ быстро, минимум накладных</text>
  </g>
  <rect x="392" y="296" width="266" height="50" rx="8" fill="#cffafe"/>
  <text x="525" y="318" text-anchor="middle" font-size="12" fill="#155e75">видео, голос, игры, DNS, IoT</text>
  <text x="525" y="337" text-anchor="middle" font-size="11.5" font-style="italic" fill="#155e75">когда важна СВЕЖЕСТЬ</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="Segoe UI, Arial, sans-serif">
  <rect x="0" y="0" width="720" height="400" rx="16" fill="#f3f6fc"/>
  <text x="360" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">TCP — тройное рукопожатие (3-way handshake) ⭐⭐</text>

  <!-- actors -->
  <rect x="70" y="70" width="150" height="44" rx="10" fill="#2563eb"/>
  <text x="145" y="98" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">КЛИЕНТ</text>
  <rect x="500" y="70" width="150" height="44" rx="10" fill="#1e293b"/>
  <text x="575" y="98" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">СЕРВЕР</text>

  <line x1="145" y1="114" x2="145" y2="350" stroke="#94a3b8" stroke-width="2"/>
  <line x1="575" y1="114" x2="575" y2="350" stroke="#94a3b8" stroke-width="2"/>

  <!-- SYN -->
  <line x1="145" y1="150" x2="575" y2="180" stroke="#2563eb" stroke-width="2.5" marker-end="url(#b)"/>
  <text x="360" y="158" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb">1. SYN (хочу соединиться, seq=x)</text>

  <!-- SYN+ACK -->
  <line x1="575" y1="210" x2="145" y2="240" stroke="#0891b2" stroke-width="2.5" marker-end="url(#b)"/>
  <text x="360" y="218" text-anchor="middle" font-size="13" font-weight="700" fill="#0891b2">2. SYN+ACK (ок, seq=y, ack=x+1)</text>

  <!-- ACK -->
  <line x1="145" y1="270" x2="575" y2="300" stroke="#2563eb" stroke-width="2.5" marker-end="url(#b)"/>
  <text x="360" y="278" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb">3. ACK (подтверждаю, ack=y+1)</text>

  <rect x="180" y="318" width="360" height="30" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.4"/>
  <text x="360" y="338" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">✓ соединение установлено → обмен данными</text>

  <text x="360" y="372" text-anchor="middle" font-size="11.5" font-style="italic" fill="#64748b">три шага: обе стороны убедились «я тебя слышу, и ты меня слышишь»</text>

  <defs>
    <marker id="b" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 z" fill="#475569"/>
    </marker>
  </defs>
</svg>

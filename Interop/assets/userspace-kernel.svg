<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" font-family="Segoe UI, Arial, sans-serif">
  <rect width="640" height="300" fill="#ffffff"/>
  <text x="320" y="30" text-anchor="middle" font-size="21" font-weight="700" fill="#1a1a2e">User space vs Kernel space</text>

  <!-- user space -->
  <rect x="40" y="55" width="560" height="80" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="320" y="80" text-anchor="middle" font-size="15" font-weight="700" fill="#15803d">USER SPACE (пользовательское)</text>
  <text x="320" y="102" text-anchor="middle" font-size="12" fill="#444">обычные программы: браузер, игры, твой Python</text>
  <text x="320" y="122" text-anchor="middle" font-size="11" fill="#166534">ограниченные права · изолированы · краш ≠ крах системы</text>

  <!-- boundary -->
  <rect x="40" y="145" width="560" height="30" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="320" y="165" text-anchor="middle" font-size="12" font-weight="700" fill="#b45309">⬍ системные вызовы (syscalls) — единственная дверь между мирами</text>

  <!-- kernel space -->
  <rect x="40" y="185" width="560" height="80" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="320" y="210" text-anchor="middle" font-size="15" font-weight="700" fill="#b91c1c">KERNEL SPACE (ядро)</text>
  <text x="320" y="232" text-anchor="middle" font-size="12" fill="#444">ядро ОС, драйверы: полный доступ к железу и памяти</text>
  <text x="320" y="252" text-anchor="middle" font-size="11" fill="#7f1d1d">⚠️ ошибка здесь = крах ВСЕЙ системы (kernel panic / BSOD)</text>

  <text x="320" y="288" text-anchor="middle" font-size="12" fill="#888">Разделение защищает: программы в песочнице, полные права — только у проверенного ядра</text>
</svg>

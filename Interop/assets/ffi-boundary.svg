<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 260" font-family="Segoe UI, Arial, sans-serif">
  <rect width="680" height="260" fill="#ffffff"/>
  <text x="340" y="32" text-anchor="middle" font-size="21" font-weight="700" fill="#1a1a2e">FFI: один язык вызывает функции другого</text>

  <defs>
    <marker id="fb" markerWidth="11" markerHeight="11" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0891b2"/>
    </marker>
  </defs>

  <!-- caller -->
  <rect x="40" y="80" width="220" height="110" rx="10" fill="#cffafe" stroke="#0891b2" stroke-width="2"/>
  <text x="150" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="#0e7490">Python / Rust / JS</text>
  <text x="150" y="128" text-anchor="middle" font-size="12" fill="#555">(удобный язык)</text>
  <rect x="60" y="142" width="180" height="34" rx="6" fill="#fff" stroke="#0891b2"/>
  <text x="150" y="164" text-anchor="middle" font-size="12" font-family="Consolas, monospace">lib.fast(data)</text>

  <!-- boundary -->
  <line x1="340" y1="60" x2="340" y2="210" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="6 4"/>
  <text x="340" y="52" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">ГРАНИЦА (C-ABI)</text>
  <text x="340" y="224" text-anchor="middle" font-size="10" fill="#b45309">данные переупаковываются</text>

  <!-- callee -->
  <rect x="420" y="80" width="220" height="110" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="530" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="#a16207">C / C++ / Rust</text>
  <text x="530" y="128" text-anchor="middle" font-size="12" fill="#555">(быстрое ядро)</text>
  <rect x="440" y="142" width="180" height="34" rx="6" fill="#fff" stroke="#ca8a04"/>
  <text x="530" y="164" text-anchor="middle" font-size="12" font-family="Consolas, monospace">нативный код</text>

  <path d="M242 159 C 300 159, 300 135, 358 135" fill="none" stroke="#0891b2" stroke-width="2.5" marker-end="url(#fb)"/>
  <path d="M438 150 C 380 150, 380 175, 318 175" fill="none" stroke="#ca8a04" stroke-width="2.5" marker-end="url(#fb)"/>
  <text x="340" y="118" text-anchor="middle" font-size="10" fill="#0e7490">вызов →</text>
  <text x="340" y="192" text-anchor="middle" font-size="10" fill="#a16207">← результат</text>
</svg>

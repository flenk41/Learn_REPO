<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" font-family="Segoe UI, Arial, sans-serif">
  <rect width="600" height="320" fill="#ffffff"/>
  <text x="300" y="32" text-anchor="middle" font-size="21" font-weight="700" fill="#1a1a2e">Драйвер — переводчик между ОС и железом</text>

  <defs>
    <marker id="ds" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0891b2"/>
    </marker>
  </defs>

  <!-- apps -->
  <rect x="120" y="55" width="360" height="44" rx="8" fill="#cffafe" stroke="#0891b2" stroke-width="2"/>
  <text x="300" y="82" text-anchor="middle" font-size="14" font-weight="700" fill="#0e7490">Приложения (браузер, игры, твой Python)</text>

  <!-- OS -->
  <rect x="120" y="110" width="360" height="44" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="300" y="137" text-anchor="middle" font-size="14" font-weight="700" fill="#4338ca">Операционная система (ядро)</text>
  <text x="495" y="137" font-size="10" fill="#888">↕ syscalls</text>

  <!-- driver -->
  <rect x="120" y="165" width="360" height="50" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2.5"/>
  <text x="300" y="188" text-anchor="middle" font-size="14" font-weight="700" fill="#a16207">ДРАЙВЕР  ←── переводчик ──►</text>
  <text x="300" y="207" text-anchor="middle" font-size="11" fill="#854d0e">C / Rust · регистры, прерывания, DMA</text>

  <!-- hardware -->
  <rect x="120" y="226" width="360" height="44" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="300" y="253" text-anchor="middle" font-size="14" font-weight="700" fill="#b91c1c">Железо (диск, GPU, сеть, USB…)</text>

  <path d="M300 99 L 300 108" stroke="#0891b2" stroke-width="2" marker-end="url(#ds)"/>
  <path d="M300 154 L 300 163" stroke="#0891b2" stroke-width="2" marker-end="url(#ds)"/>
  <path d="M300 215 L 300 224" stroke="#0891b2" stroke-width="2" marker-end="url(#ds)"/>

  <text x="300" y="296" text-anchor="middle" font-size="12" fill="#888">Приложение пишет в «файл» — не зная, SSD это или флешка. Драйвер скрывает различия.</text>
  <text x="300" y="313" text-anchor="middle" font-size="11" fill="#a16207">Ошибка в драйвере ядра = крах ВСЕЙ системы → нужен контроль памяти (C/Rust)</text>
</svg>

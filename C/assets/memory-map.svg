<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 520" font-family="Segoe UI, Arial, sans-serif">
  <rect width="640" height="520" fill="#ffffff"/>
  <text x="320" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a2e">Карта памяти процесса</text>
  <text x="320" y="56" text-anchor="middle" font-size="13" fill="#666">адреса растут снизу вверх</text>

  <!-- high address label -->
  <text x="30" y="92" font-size="12" fill="#888">высокие адреса</text>

  <!-- STACK -->
  <rect x="120" y="100" width="400" height="90" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="320" y="130" text-anchor="middle" font-size="18" font-weight="700" fill="#1976d2">STACK (стек)</text>
  <text x="320" y="152" text-anchor="middle" font-size="13" fill="#333">локальные переменные функций, аргументы</text>
  <text x="320" y="172" text-anchor="middle" font-size="12" fill="#1976d2" font-weight="600">авто: чистится сам · растёт вниз ↓</text>
  <text x="540" y="150" font-size="22" fill="#1976d2">↓</text>

  <!-- free space -->
  <rect x="120" y="200" width="400" height="60" rx="6" fill="#fafafa" stroke="#ccc" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="320" y="235" text-anchor="middle" font-size="13" fill="#999">свободное пространство</text>

  <!-- HEAP -->
  <rect x="120" y="270" width="400" height="90" rx="6" fill="#fff3e0" stroke="#f57c00" stroke-width="2"/>
  <text x="100" y="312" font-size="22" fill="#f57c00">↑</text>
  <text x="320" y="298" text-anchor="middle" font-size="18" font-weight="700" fill="#f57c00">HEAP (куча)</text>
  <text x="320" y="320" text-anchor="middle" font-size="13" fill="#333">динамическая память: malloc / free</text>
  <text x="320" y="340" text-anchor="middle" font-size="12" fill="#f57c00" font-weight="600">вручную: ты управляешь · растёт вверх ↑</text>

  <!-- BSS -->
  <rect x="120" y="370" width="400" height="42" rx="6" fill="#f3e5f5" stroke="#8e24aa" stroke-width="2"/>
  <text x="320" y="396" text-anchor="middle" font-size="14" font-weight="700" fill="#8e24aa">BSS — глобальные без значения (= 0)</text>

  <!-- DATA -->
  <rect x="120" y="416" width="400" height="42" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
  <text x="320" y="442" text-anchor="middle" font-size="14" font-weight="700" fill="#388e3c">DATA — глобальные с начальным значением</text>

  <!-- TEXT -->
  <rect x="120" y="462" width="400" height="42" rx="6" fill="#eceff1" stroke="#455a64" stroke-width="2"/>
  <text x="320" y="488" text-anchor="middle" font-size="14" font-weight="700" fill="#455a64">TEXT — код программы (только чтение)</text>

  <text x="30" y="490" font-size="12" fill="#888">низкие</text>
  <text x="30" y="504" font-size="12" fill="#888">адреса</text>
</svg>

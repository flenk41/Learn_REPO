<svg viewBox="0 0 720 300" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="720" height="300" fill="#fff3e0" rx="12"/>
  <text x="360" y="30" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">Битовые операции: работа с отдельными битами</text>

  <g font-family="monospace" font-size="14">
    <!-- AND -->
    <text x="40" y="70" font-size="13" font-weight="700" font-family="sans-serif" fill="#f57c00">AND (&amp;) — маска: оставить биты</text>
    <text x="60" y="94" fill="#374151">1 1 0 1 0 1 1 0</text>
    <text x="60" y="114" fill="#374151">0 0 0 0 1 1 1 1  &amp;</text>
    <line x1="58" y1="122" x2="230" y2="122" stroke="#9ca3af"/>
    <text x="60" y="140" fill="#388e3c">0 0 0 0 0 1 1 0</text>

    <!-- OR -->
    <text x="400" y="70" font-size="13" font-weight="700" font-family="sans-serif" fill="#f57c00">OR (|) — установить биты</text>
    <text x="420" y="94" fill="#374151">1 1 0 1 0 0 0 0</text>
    <text x="420" y="114" fill="#374151">0 0 0 0 1 0 0 1  |</text>
    <line x1="418" y1="122" x2="590" y2="122" stroke="#9ca3af"/>
    <text x="420" y="140" fill="#388e3c">1 1 0 1 1 0 0 1</text>
  </g>

  <g font-family="monospace" font-size="13">
    <text x="40" y="180" font-size="13" font-weight="700" font-family="sans-serif" fill="#f57c00">сдвиги и XOR</text>
    <text x="60" y="204" fill="#374151">x &lt;&lt; 1   умножить на 2 (сдвиг влево)</text>
    <text x="60" y="224" fill="#374151">x &gt;&gt; 1   разделить на 2 (сдвиг вправо)</text>
    <text x="60" y="244" fill="#374151">x ^ y    XOR — биты различаются</text>
    <text x="60" y="264" fill="#374151">~x       NOT — инверсия всех битов</text>
  </g>

  <rect x="420" y="165" width="270" height="110" rx="8" fill="#fff" stroke="#f0c27b"/>
  <text x="438" y="187" font-size="12" font-weight="700" fill="#1a1a2e">флаги в одном int (битовая маска):</text>
  <text x="438" y="209" font-size="11" font-family="monospace" fill="#374151">flags |= READ      // включить</text>
  <text x="438" y="228" font-size="11" font-family="monospace" fill="#374151">flags &amp;= ~READ     // выключить</text>
  <text x="438" y="247" font-size="11" font-family="monospace" fill="#374151">if (flags &amp; READ) // проверить</text>
  <text x="438" y="267" font-size="10" fill="#6b7280">экономия памяти: 8 флагов в 1 байте</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 260" font-family="Segoe UI, Arial, sans-serif">
  <rect width="680" height="260" fill="#ffffff"/>
  <text x="340" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a2e">Односвязный список: узлы связаны указателями</text>
  <text x="340" y="58" text-anchor="middle" font-size="13" fill="#666">узлы разбросаны по куче, next ведёт к следующему</text>

  <defs>
    <marker id="la" markerWidth="11" markerHeight="11" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#f57c00"/>
    </marker>
  </defs>

  <!-- head -->
  <text x="60" y="120" font-size="15" font-weight="700" fill="#1976d2" font-family="Consolas, monospace">head</text>
  <path d="M62 130 L 62 150 L 110 150" fill="none" stroke="#f57c00" stroke-width="2.5" marker-end="url(#la)"/>

  <!-- node 1 -->
  <g font-family="Consolas, monospace">
    <rect x="110" y="130" width="120" height="60" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <line x1="190" y1="130" x2="190" y2="190" stroke="#1976d2"/>
    <text x="150" y="167" text-anchor="middle" font-size="20" font-weight="700">10</text>
    <text x="210" y="165" text-anchor="middle" font-size="13" fill="#f57c00">•</text>
    <circle cx="210" cy="160" r="5" fill="#f57c00"/>
  </g>
  <path d="M210 160 L 260 160" fill="none" stroke="#f57c00" stroke-width="2.5" marker-end="url(#la)"/>

  <!-- node 2 -->
  <g font-family="Consolas, monospace">
    <rect x="260" y="130" width="120" height="60" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <line x1="340" y1="130" x2="340" y2="190" stroke="#1976d2"/>
    <text x="300" y="167" text-anchor="middle" font-size="20" font-weight="700">20</text>
    <circle cx="360" cy="160" r="5" fill="#f57c00"/>
  </g>
  <path d="M360 160 L 410 160" fill="none" stroke="#f57c00" stroke-width="2.5" marker-end="url(#la)"/>

  <!-- node 3 -->
  <g font-family="Consolas, monospace">
    <rect x="410" y="130" width="120" height="60" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <line x1="490" y1="130" x2="490" y2="190" stroke="#1976d2"/>
    <text x="450" y="167" text-anchor="middle" font-size="20" font-weight="700">30</text>
    <text x="510" y="165" text-anchor="middle" font-size="13" fill="#455a64" font-weight="700">⊥</text>
  </g>

  <!-- NULL -->
  <text x="560" y="165" font-size="15" font-weight="700" fill="#455a64" font-family="Consolas, monospace">NULL</text>
  <path d="M528 160 L 552 160" fill="none" stroke="#455a64" stroke-width="2" marker-end="url(#la)"/>

  <text x="150" y="222" text-anchor="middle" font-size="12" fill="#888">value | next</text>
  <text x="340" y="248" text-anchor="middle" font-size="13" fill="#333" font-family="Consolas, monospace">struct Node { int value; struct Node *next; };</text>
</svg>

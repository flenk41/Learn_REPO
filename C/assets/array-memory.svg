<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" font-family="Segoe UI, Arial, sans-serif">
  <rect width="660" height="300" fill="#ffffff"/>
  <text x="330" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a2e">Массив — соседние ячейки памяти</text>
  <text x="330" y="58" text-anchor="middle" font-size="14" fill="#666" font-family="Consolas, monospace">int arr[5] = {10, 20, 30, 40, 50};</text>

  <!-- cells -->
  <g font-family="Consolas, monospace">
    <!-- cell 0 -->
    <rect x="60" y="100" width="100" height="60" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="110" y="138" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a2e">10</text>
    <rect x="160" y="100" width="100" height="60" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="210" y="138" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a2e">20</text>
    <rect x="260" y="100" width="100" height="60" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="310" y="138" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a2e">30</text>
    <rect x="360" y="100" width="100" height="60" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="410" y="138" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a2e">40</text>
    <rect x="460" y="100" width="100" height="60" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="510" y="138" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a2e">50</text>
  </g>

  <!-- index labels -->
  <g font-size="13" fill="#1976d2" font-weight="700">
    <text x="110" y="92" text-anchor="middle">[0]</text>
    <text x="210" y="92" text-anchor="middle">[1]</text>
    <text x="310" y="92" text-anchor="middle">[2]</text>
    <text x="410" y="92" text-anchor="middle">[3]</text>
    <text x="510" y="92" text-anchor="middle">[4]</text>
  </g>

  <!-- address labels -->
  <g font-size="12" fill="#888" font-family="Consolas, monospace">
    <text x="110" y="180" text-anchor="middle">0x1000</text>
    <text x="210" y="180" text-anchor="middle">0x1004</text>
    <text x="310" y="180" text-anchor="middle">0x1008</text>
    <text x="410" y="180" text-anchor="middle">0x100C</text>
    <text x="510" y="180" text-anchor="middle">0x1010</text>
  </g>
  <text x="330" y="205" text-anchor="middle" font-size="12" fill="#999">каждый int = 4 байта → адреса растут на 4</text>

  <!-- pointer equivalence -->
  <rect x="120" y="232" width="420" height="48" rx="8" fill="#fff3e0" stroke="#f57c00" stroke-width="2"/>
  <text x="330" y="262" text-anchor="middle" font-size="17" font-weight="700" fill="#f57c00" font-family="Consolas, monospace">arr[i]  ≡  *(arr + i)</text>
</svg>

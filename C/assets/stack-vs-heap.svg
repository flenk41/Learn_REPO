<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 360" font-family="Segoe UI, Arial, sans-serif">
  <rect width="660" height="360" fill="#ffffff"/>
  <text x="330" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a2e">Стек хранит адрес, значение — в куче</text>
  <text x="330" y="58" text-anchor="middle" font-size="13" fill="#666" font-family="Consolas, monospace">int *p = malloc(sizeof(int));  *p = 5;</text>

  <!-- STACK box -->
  <rect x="50" y="90" width="240" height="220" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="170" y="118" text-anchor="middle" font-size="18" font-weight="700" fill="#1976d2">STACK</text>
  <rect x="80" y="150" width="180" height="80" rx="6" fill="#ffffff" stroke="#1976d2"/>
  <text x="170" y="142" text-anchor="middle" font-size="14" fill="#1976d2" font-family="Consolas, monospace">p</text>
  <text x="170" y="196" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a2e" font-family="Consolas, monospace">0x7000</text>
  <text x="170" y="260" text-anchor="middle" font-size="12" fill="#666">сам указатель p</text>
  <text x="170" y="278" text-anchor="middle" font-size="12" fill="#666">живёт в стеке</text>

  <!-- HEAP box -->
  <rect x="370" y="90" width="240" height="220" rx="8" fill="#fff3e0" stroke="#f57c00" stroke-width="2"/>
  <text x="490" y="118" text-anchor="middle" font-size="18" font-weight="700" fill="#f57c00">HEAP</text>
  <rect x="400" y="150" width="180" height="80" rx="6" fill="#ffffff" stroke="#f57c00"/>
  <text x="490" y="142" text-anchor="middle" font-size="13" fill="#f57c00" font-family="Consolas, monospace">0x7000</text>
  <text x="490" y="196" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a2e">5</text>
  <text x="490" y="260" text-anchor="middle" font-size="12" fill="#666">значение лежит</text>
  <text x="490" y="278" text-anchor="middle" font-size="12" fill="#666">в куче (malloc)</text>

  <!-- arrow -->
  <defs>
    <marker id="a2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#f57c00"/>
    </marker>
  </defs>
  <path d="M260 190 L 398 190" fill="none" stroke="#f57c00" stroke-width="2.5" marker-end="url(#a2)"/>

  <text x="330" y="338" text-anchor="middle" font-size="13" fill="#c62828" font-weight="600">не забудь free(p); — куча не чистится сама!</text>
</svg>

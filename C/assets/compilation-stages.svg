<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" font-family="Segoe UI, Arial, sans-serif">
  <rect width="700" height="220" fill="#ffffff"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a2e">4 стадии: из текста .c в программу</text>

  <defs>
    <marker id="ca" markerWidth="11" markerHeight="11" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <g font-family="Segoe UI, Arial">
    <!-- source -->
    <rect x="20" y="90" width="90" height="50" rx="6" fill="#eceff1" stroke="#455a64" stroke-width="2"/>
    <text x="65" y="112" text-anchor="middle" font-size="13" font-weight="700">hello.c</text>
    <text x="65" y="130" text-anchor="middle" font-size="11" fill="#666">текст</text>

    <!-- preprocessor -->
    <rect x="140" y="90" width="100" height="50" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="190" y="110" text-anchor="middle" font-size="12" font-weight="700" fill="#1976d2">1 Препроц.</text>
    <text x="190" y="128" text-anchor="middle" font-size="10" fill="#555">#include</text>

    <!-- compiler -->
    <rect x="270" y="90" width="100" height="50" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="320" y="110" text-anchor="middle" font-size="12" font-weight="700" fill="#388e3c">2 Компил.</text>
    <text x="320" y="128" text-anchor="middle" font-size="10" fill="#555">→ asm</text>

    <!-- assembler -->
    <rect x="400" y="90" width="100" height="50" rx="6" fill="#fff3e0" stroke="#f57c00" stroke-width="2"/>
    <text x="450" y="110" text-anchor="middle" font-size="12" font-weight="700" fill="#f57c00">3 Ассембл.</text>
    <text x="450" y="128" text-anchor="middle" font-size="10" fill="#555">→ .o байты</text>

    <!-- linker -->
    <rect x="530" y="90" width="100" height="50" rx="6" fill="#f3e5f5" stroke="#8e24aa" stroke-width="2"/>
    <text x="580" y="110" text-anchor="middle" font-size="12" font-weight="700" fill="#8e24aa">4 Линковщ.</text>
    <text x="580" y="128" text-anchor="middle" font-size="10" fill="#555">+ printf</text>

    <!-- exe -->
    <rect x="615" y="90" width="70" height="50" rx="6" fill="#1a1a2e"/>
    <text x="650" y="112" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">.exe</text>
    <text x="650" y="130" text-anchor="middle" font-size="9" fill="#bbb">готово</text>
  </g>

  <!-- arrows -->
  <path d="M111 115 L 138 115" stroke="#555" stroke-width="2" marker-end="url(#ca)"/>
  <path d="M241 115 L 268 115" stroke="#555" stroke-width="2" marker-end="url(#ca)"/>
  <path d="M371 115 L 398 115" stroke="#555" stroke-width="2" marker-end="url(#ca)"/>
  <path d="M501 115 L 528 115" stroke="#555" stroke-width="2" marker-end="url(#ca)"/>

  <text x="350" y="185" text-anchor="middle" font-size="13" fill="#333" font-family="Consolas, monospace">gcc hello.c -o hello   (делает все 4 шага сразу)</text>
</svg>

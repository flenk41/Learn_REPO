<svg viewBox="0 0 720 290" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="720" height="290" fill="#fff3e0" rx="12"/>
  <text x="360" y="30" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a2e">Указатель на функцию: передать ПОВЕДЕНИЕ</text>

  <!-- function pointer var -->
  <rect x="40" y="65" width="220" height="60" rx="8" fill="#fff" stroke="#f57c00" stroke-width="2"/>
  <text x="150" y="90" text-anchor="middle" font-size="12.5" font-family="monospace" fill="#1a1a2e">int (*op)(int,int)</text>
  <text x="150" y="112" text-anchor="middle" font-size="10.5" fill="#6b7280">переменная — адрес функции</text>

  <!-- functions -->
  <g>
    <rect x="380" y="55" width="140" height="34" rx="6" fill="#fff3e0" stroke="#388e3c" stroke-width="2"/>
    <text x="450" y="77" text-anchor="middle" font-size="12" font-family="monospace" fill="#388e3c">add(a,b)</text>
    <rect x="380" y="100" width="140" height="34" rx="6" fill="#fff3e0" stroke="#388e3c" stroke-width="2"/>
    <text x="450" y="122" text-anchor="middle" font-size="12" font-family="monospace" fill="#388e3c">mul(a,b)</text>
    <rect x="380" y="145" width="140" height="34" rx="6" fill="#fff3e0" stroke="#388e3c" stroke-width="2"/>
    <text x="450" y="167" text-anchor="middle" font-size="12" font-family="monospace" fill="#388e3c">sub(a,b)</text>
  </g>

  <path d="M 260 95 C 320 95, 330 72, 378 72" stroke="#f57c00" stroke-width="2" fill="none"/><polygon points="380,72 371,68 371,76" fill="#f57c00"/>
  <text x="320" y="60" font-size="10.5" fill="#f57c00">op = add; op(2,3) → 5</text>
  <text x="320" y="135" font-size="10" fill="#9ca3af">op = mul; op(2,3) → 6</text>

  <rect x="40" y="200" width="640" height="74" rx="8" fill="#fff" stroke="#f0c27b"/>
  <text x="58" y="223" font-size="12.5" fill="#1a1a2e">Одна переменная может «указывать» на любую из функций → выбираешь поведение в рантайме.</text>
  <text x="58" y="245" font-size="12" fill="#475569">Зачем: коллбэки, таблицы функций, <tspan font-family="monospace">qsort(arr, n, size, compare)</tspan> — передаёшь СВОЮ функцию сравнения.</text>
  <text x="58" y="264" font-size="11.5" fill="#6b7280">Это «полиморфизм» в C: код вызывает через указатель, не зная конкретную функцию заранее.</text>
</svg>

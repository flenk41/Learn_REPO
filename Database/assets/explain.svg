<svg viewBox="0 0 720 280" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="720" height="280" fill="#f5f3ff" rx="12"/>
  <text x="360" y="30" text-anchor="middle" font-size="19" font-weight="700" fill="#4c1d95">EXPLAIN: seq scan vs index scan</text>

  <text x="360" y="58" text-anchor="middle" font-size="12" font-family="monospace" fill="#4c1d95">EXPLAIN SELECT * FROM users WHERE email = '...'</text>

  <!-- seq scan -->
  <rect x="30" y="75" width="320" height="150" rx="10" fill="#fff" stroke="#b91c1c" stroke-width="2"/>
  <text x="190" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#b91c1c">❌ Seq Scan (без индекса)</text>
  <g fill="#fde2dd" stroke="#c4b5fd">
    <rect x="55" y="112" width="40" height="22"/><rect x="100" y="112" width="40" height="22"/><rect x="145" y="112" width="40" height="22"/><rect x="190" y="112" width="40" height="22"/><rect x="235" y="112" width="40" height="22"/><rect x="280" y="112" width="40" height="22"/>
    <rect x="55" y="138" width="40" height="22"/><rect x="100" y="138" width="40" height="22"/><rect x="145" y="138" width="40" height="22"/><rect x="190" y="138" width="40" height="22"/><rect x="235" y="138" width="40" height="22"/><rect x="280" y="138" width="40" height="22"/>
  </g>
  <text x="190" y="183" text-anchor="middle" font-size="11" fill="#b91c1c">проверяет КАЖДУЮ строку — O(n)</text>
  <text x="190" y="205" text-anchor="middle" font-size="10.5" fill="#6b7280">1 млн строк = 1 млн проверок</text>

  <!-- index scan -->
  <rect x="370" y="75" width="320" height="150" rx="10" fill="#fff" stroke="#15803d" stroke-width="2"/>
  <text x="530" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#15803d">✅ Index Scan (с индексом)</text>
  <rect x="500" y="112" width="60" height="22" rx="3" fill="#ddd6fe"/><text x="530" y="128" text-anchor="middle" font-size="9" fill="#4c1d95">корень</text>
  <rect x="445" y="145" width="50" height="20" rx="3" fill="#ede9fe"/><rect x="565" y="145" width="50" height="20" rx="3" fill="#c4b5fd"/>
  <rect x="555" y="172" width="70" height="20" rx="3" fill="#a78bfa"/><text x="590" y="187" text-anchor="middle" font-size="9" fill="#fff">найдено</text>
  <g stroke="#15803d" stroke-width="1.5"><line x1="515" y1="134" x2="470" y2="145"/><line x1="545" y1="134" x2="590" y2="145"/><line x1="590" y1="165" x2="590" y2="172"/></g>
  <text x="530" y="207" text-anchor="middle" font-size="11" fill="#15803d">спуск по дереву — O(log n), ~3 шага</text>

  <rect x="30" y="240" width="660" height="0"/>
  <text x="360" y="262" text-anchor="middle" font-size="12" fill="#4c1d95">EXPLAIN показывает ПЛАН: видишь «Seq Scan» на большой таблице → добавь индекс. Измеряй, не угадывай.</text>
</svg>

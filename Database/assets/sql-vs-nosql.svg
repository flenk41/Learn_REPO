<svg viewBox="0 0 720 400" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="720" height="400" fill="#f5f3ff" rx="12"/>
  <text x="360" y="34" text-anchor="middle" font-size="19" font-weight="700" fill="#4c1d95">SQL (реляционные) vs NoSQL: разные инструменты</text>

  <!-- SQL column -->
  <rect x="40" y="60" width="310" height="300" rx="10" fill="#fff" stroke="#6d28d9" stroke-width="2"/>
  <rect x="40" y="60" width="310" height="36" rx="10" fill="#6d28d9"/>
  <rect x="40" y="78" width="310" height="18" fill="#6d28d9"/>
  <text x="195" y="85" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">SQL · реляционные</text>
  <g font-size="12.5" fill="#1e1b4b">
    <text x="60" y="125">📐 Жёсткая схема (таблицы, столбцы, типы)</text>
    <text x="60" y="153">🔗 Связи и JOIN-ы между таблицами</text>
    <text x="60" y="181">✅ ACID-транзакции (надёжность)</text>
    <text x="60" y="209">🔍 Мощный язык запросов (SQL)</text>
    <text x="60" y="237">📊 Сильная консистентность</text>
    <text x="60" y="271" font-weight="700" fill="#4c1d95">Когда: связанные данные, транзакции,</text>
    <text x="60" y="290" font-weight="700" fill="#4c1d95">отчёты. ПО УМОЛЧАНИЮ для большинства.</text>
  </g>
  <text x="60" y="325" font-size="12" fill="#6b7280">PostgreSQL · MySQL · SQLite · SQL Server</text>
  <text x="195" y="350" text-anchor="middle" font-size="12.5" fill="#15803d" font-weight="700">по умолчанию начинай отсюда</text>

  <!-- NoSQL column -->
  <rect x="370" y="60" width="310" height="300" rx="10" fill="#fff" stroke="#0891b2" stroke-width="2"/>
  <rect x="370" y="60" width="310" height="36" rx="10" fill="#0891b2"/>
  <rect x="370" y="78" width="310" height="18" fill="#0891b2"/>
  <text x="525" y="85" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">NoSQL · нереляционные</text>
  <g font-size="12.5" fill="#1e1b4b">
    <text x="390" y="125">🤸 Гибкая/без схемы (документы, пары)</text>
    <text x="390" y="153">📦 Документная · key-value · колоночная · граф</text>
    <text x="390" y="181">🚀 Горизонтальный масштаб (шардинг)</text>
    <text x="390" y="209">⚡ Часто eventual consistency (быстро)</text>
    <text x="390" y="237">🔁 Слабее транзакции/связи</text>
    <text x="390" y="271" font-weight="700" fill="#0e7490">Когда: огромный масштаб, гибкая</text>
    <text x="390" y="290" font-weight="700" fill="#0e7490">структура, кэш, специфичная модель.</text>
  </g>
  <text x="390" y="325" font-size="12" fill="#6b7280">MongoDB · Redis · Cassandra · DynamoDB · Neo4j</text>
  <text x="525" y="350" text-anchor="middle" font-size="12.5" fill="#0e7490" font-weight="700">когда реляционной реально мало</text>
</svg>

<svg viewBox="0 0 720 400" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="720" height="400" fill="#f5f3ff" rx="12"/>
  <text x="360" y="34" text-anchor="middle" font-size="19" font-weight="700" fill="#4c1d95">JOIN-ы — сердце SQL: соединение таблиц по связи</text>

  <!-- INNER JOIN -->
  <g>
    <circle cx="130" cy="120" r="42" fill="#6d28d9" fill-opacity="0.35" stroke="#6d28d9" stroke-width="2"/>
    <circle cx="180" cy="120" r="42" fill="#be123c" fill-opacity="0.35" stroke="#be123c" stroke-width="2"/>
    <clipPath id="cl"><circle cx="180" cy="120" r="42"/></clipPath>
    <circle cx="130" cy="120" r="42" fill="#7c2d92" clip-path="url(#cl)"/>
    <text x="155" y="190" text-anchor="middle" font-size="14" font-weight="700" fill="#4c1d95">INNER JOIN</text>
    <text x="155" y="208" text-anchor="middle" font-size="11.5" fill="#1e1b4b">только совпадения</text>
  </g>

  <!-- LEFT JOIN -->
  <g>
    <circle cx="400" cy="120" r="42" fill="#6d28d9" fill-opacity="0.6" stroke="#6d28d9" stroke-width="2"/>
    <circle cx="450" cy="120" r="42" fill="#be123c" fill-opacity="0.2" stroke="#be123c" stroke-width="2"/>
    <text x="425" y="190" text-anchor="middle" font-size="14" font-weight="700" fill="#4c1d95">LEFT JOIN</text>
    <text x="425" y="208" text-anchor="middle" font-size="11.5" fill="#1e1b4b">все левые + совпавшие</text>
  </g>

  <!-- FULL JOIN -->
  <g>
    <circle cx="600" cy="120" r="42" fill="#6d28d9" fill-opacity="0.45" stroke="#6d28d9" stroke-width="2"/>
    <circle cx="640" cy="120" r="42" fill="#be123c" fill-opacity="0.45" stroke="#be123c" stroke-width="2"/>
    <text x="620" y="190" text-anchor="middle" font-size="14" font-weight="700" fill="#4c1d95">FULL JOIN</text>
    <text x="620" y="208" text-anchor="middle" font-size="11.5" fill="#1e1b4b">всё из обеих</text>
  </g>

  <!-- example -->
  <rect x="40" y="240" width="640" height="130" rx="8" fill="#1e1b2e"/>
  <text x="60" y="268" font-size="13" font-family="monospace" fill="#c4b5fd">SELECT u.name, o.сумма</text>
  <text x="60" y="290" font-size="13" font-family="monospace" fill="#a78bfa">FROM users u</text>
  <text x="60" y="312" font-size="13" font-family="monospace" fill="#f0abfc">JOIN orders o ON o.user_id = u.id;</text>
  <text x="60" y="346" font-size="12.5" font-family="monospace" fill="#86efac">— соединяет строки users и orders по ключу связи</text>
  <text x="60" y="364" font-size="12.5" font-family="monospace" fill="#fca5a5">↑ ON-условие = по какому полю связываем таблицы</text>
</svg>

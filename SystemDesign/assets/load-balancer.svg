<svg viewBox="0 0 720 320" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="720" height="320" fill="#eef2ff" rx="12"/>
  <text x="360" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#312e81">Балансировщик: масштаб + отказоустойчивость</text>

  <!-- requests -->
  <rect x="30" y="130" width="90" height="44" rx="8" fill="#fff" stroke="#3730a3" stroke-width="2"/>
  <text x="75" y="157" text-anchor="middle" font-size="12" font-weight="700" fill="#3730a3">запросы</text>

  <!-- LB -->
  <rect x="170" y="120" width="120" height="64" rx="10" fill="#312e81"/>
  <text x="230" y="148" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Балансир.</text>
  <text x="230" y="167" text-anchor="middle" font-size="10" fill="#c7d2fe">health-чеки</text>

  <!-- servers -->
  <g font-size="12" font-weight="700">
    <rect x="380" y="60" width="150" height="34" rx="7" fill="#fff" stroke="#15803d" stroke-width="2"/>
    <text x="455" y="82" text-anchor="middle" fill="#15803d">Сервер 1 ✓</text>
    <rect x="380" y="106" width="150" height="34" rx="7" fill="#fff" stroke="#15803d" stroke-width="2"/>
    <text x="455" y="128" text-anchor="middle" fill="#15803d">Сервер 2 ✓</text>
    <rect x="380" y="152" width="150" height="34" rx="7" fill="#fff" stroke="#b91c1c" stroke-width="2" stroke-dasharray="5 3"/>
    <text x="455" y="174" text-anchor="middle" fill="#b91c1c">Сервер 3 ✗ упал</text>
    <rect x="380" y="198" width="150" height="34" rx="7" fill="#eef2ff" stroke="#6366f1" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="455" y="220" text-anchor="middle" fill="#4338ca">Сервер 4 + (добавлен)</text>
  </g>

  <!-- arrows -->
  <path d="M 120 152 L 168 152" stroke="#3730a3" stroke-width="2.5" fill="none"/><polygon points="170,152 161,148 161,156" fill="#3730a3"/>
  <g stroke="#15803d" stroke-width="2" fill="none">
    <path d="M 290 145 L 378 77"/><polygon points="380,77 371,76 374,84" fill="#15803d"/>
    <path d="M 290 150 L 378 123"/><polygon points="380,123 371,120 372,128" fill="#15803d"/>
  </g>
  <path d="M 290 158 L 378 169" stroke="#b91c1c" stroke-width="1.5" fill="none" stroke-dasharray="4 3"/>
  <path d="M 290 163 L 378 215" stroke="#6366f1" stroke-width="1.5" fill="none" stroke-dasharray="4 3"/>

  <rect x="555" y="120" width="140" height="64" rx="8" fill="#e0e7ff" stroke="#a5b4fc"/>
  <text x="625" y="143" text-anchor="middle" font-size="11" font-weight="700" fill="#312e81">round robin /</text>
  <text x="625" y="160" text-anchor="middle" font-size="11" font-weight="700" fill="#312e81">least connections</text>
  <text x="625" y="176" text-anchor="middle" font-size="9.5" fill="#475569">как выбрать сервер</text>

  <rect x="30" y="262" width="660" height="46" rx="8" fill="#fff" stroke="#a5b4fc"/>
  <text x="360" y="283" text-anchor="middle" font-size="12.5" fill="#312e81">Упал сервер → LB исключает его (health-чек). Добавил → включил. Пул держит нагрузку.</text>
  <text x="360" y="301" text-anchor="middle" font-size="11.5" fill="#3730a3">⚠️ сам LB тоже резервируй (2 шт.) — иначе он единая точка отказа.</text>
</svg>

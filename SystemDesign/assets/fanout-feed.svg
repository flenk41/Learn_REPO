<svg viewBox="0 0 720 360" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="720" height="360" fill="#eef2ff" rx="12"/>
  <text x="360" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#312e81">Лента: fan-out on read vs on write</text>

  <!-- on read -->
  <rect x="30" y="55" width="320" height="135" rx="10" fill="#fff" stroke="#6366f1" stroke-width="2"/>
  <text x="190" y="78" text-anchor="middle" font-size="14" font-weight="700" fill="#4338ca">on READ (pull)</text>
  <text x="50" y="102" font-size="11.5" fill="#475569">GET /feed → собрать из подписок НА ЛЕТУ</text>
  <rect x="50" y="115" width="80" height="28" rx="5" fill="#e0e7ff"/><text x="90" y="133" text-anchor="middle" font-size="10" fill="#312e81">подписка1</text>
  <rect x="140" y="115" width="80" height="28" rx="5" fill="#e0e7ff"/><text x="180" y="133" text-anchor="middle" font-size="10" fill="#312e81">подписка2</text>
  <rect x="230" y="115" width="80" height="28" rx="5" fill="#e0e7ff"/><text x="270" y="133" text-anchor="middle" font-size="10" fill="#312e81">подписка3</text>
  <text x="190" y="162" text-anchor="middle" font-size="10.5" fill="#15803d">✓ дёшево писать</text>
  <text x="190" y="178" text-anchor="middle" font-size="10.5" fill="#b91c1c">✗ дорого читать (мерж многих)</text>

  <!-- on write -->
  <rect x="370" y="55" width="320" height="135" rx="10" fill="#fff" stroke="#3730a3" stroke-width="2"/>
  <text x="530" y="78" text-anchor="middle" font-size="14" font-weight="700" fill="#3730a3">on WRITE (push)</text>
  <text x="390" y="102" font-size="11.5" fill="#475569">POST → разложить в ленты подписчиков ЗАРАНЕЕ</text>
  <rect x="390" y="115" width="90" height="28" rx="5" fill="#c7d2fe"/><text x="435" y="133" text-anchor="middle" font-size="10" fill="#312e81">лента A ✓</text>
  <rect x="490" y="115" width="90" height="28" rx="5" fill="#c7d2fe"/><text x="535" y="133" text-anchor="middle" font-size="10" fill="#312e81">лента B ✓</text>
  <rect x="590" y="115" width="90" height="28" rx="5" fill="#c7d2fe"/><text x="635" y="133" text-anchor="middle" font-size="10" fill="#312e81">лента C ✓</text>
  <text x="530" y="162" text-anchor="middle" font-size="10.5" fill="#15803d">✓ мгновенно читать</text>
  <text x="530" y="178" text-anchor="middle" font-size="10.5" fill="#b91c1c">✗ дорого писать (звезда=миллионы вставок)</text>

  <!-- hybrid -->
  <rect x="90" y="215" width="540" height="115" rx="10" fill="#312e81"/>
  <text x="360" y="242" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">ГИБРИД — решение проблемы знаменитостей</text>
  <text x="360" y="270" text-anchor="middle" font-size="12.5" fill="#c7d2fe">обычные авторы → push (разложить заранее, мгновенное чтение)</text>
  <text x="360" y="293" text-anchor="middle" font-size="12.5" fill="#c7d2fe">знаменитости (млн подписчиков) → pull (домержить при чтении)</text>
  <text x="360" y="318" text-anchor="middle" font-size="11.5" fill="#a5b4fc">+ fan-out асинхронно (очередь) · eventual consistency здесь ок</text>
</svg>

<svg viewBox="0 0 720 380" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="720" height="380" fill="#eef2ff" rx="12"/>
  <text x="360" y="34" text-anchor="middle" font-size="19" font-weight="700" fill="#312e81">Анатомия системы: путь запроса по блокам</text>

  <!-- user -->
  <rect x="30" y="170" width="90" height="44" rx="8" fill="#fff" stroke="#3730a3" stroke-width="2"/>
  <text x="75" y="197" text-anchor="middle" font-size="12" font-weight="700" fill="#3730a3">польз.</text>

  <!-- CDN -->
  <rect x="150" y="80" width="100" height="44" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="200" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#4338ca">CDN</text>
  <text x="200" y="115" text-anchor="middle" font-size="9.5" fill="#475569">статика</text>

  <!-- LB -->
  <rect x="150" y="170" width="100" height="44" rx="8" fill="#312e81"/>
  <text x="200" y="190" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Балансир.</text>
  <text x="200" y="205" text-anchor="middle" font-size="9.5" fill="#c7d2fe">LB</text>

  <!-- servers -->
  <rect x="295" y="150" width="110" height="30" rx="6" fill="#fff" stroke="#3730a3" stroke-width="1.6"/>
  <text x="350" y="170" text-anchor="middle" font-size="11" fill="#3730a3">сервер (stateless)</text>
  <rect x="295" y="186" width="110" height="30" rx="6" fill="#fff" stroke="#3730a3" stroke-width="1.6"/>
  <text x="350" y="206" text-anchor="middle" font-size="11" fill="#3730a3">сервер (stateless)</text>
  <rect x="295" y="222" width="110" height="30" rx="6" fill="#fff" stroke="#3730a3" stroke-width="1.6"/>
  <text x="350" y="242" text-anchor="middle" font-size="11" fill="#3730a3">сервер (stateless)</text>

  <!-- cache -->
  <rect x="450" y="120" width="110" height="44" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="505" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="#4338ca">Кэш (Redis)</text>
  <text x="505" y="155" text-anchor="middle" font-size="9.5" fill="#475569">частые данные</text>

  <!-- DB -->
  <rect x="450" y="180" width="110" height="58" rx="8" fill="#fff" stroke="#3730a3" stroke-width="2"/>
  <text x="505" y="202" text-anchor="middle" font-size="12" font-weight="700" fill="#3730a3">БД + реплики</text>
  <text x="505" y="218" text-anchor="middle" font-size="9.5" fill="#475569">источник правды</text>
  <text x="505" y="232" text-anchor="middle" font-size="9.5" fill="#475569">чтения → реплики</text>

  <!-- queue + workers -->
  <rect x="590" y="255" width="100" height="40" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="640" y="272" text-anchor="middle" font-size="11" font-weight="700" fill="#4338ca">Очередь</text>
  <text x="640" y="287" text-anchor="middle" font-size="9" fill="#475569">фоновые задачи</text>

  <g stroke="#6366f1" stroke-width="2" fill="none">
    <path d="M 120 185 L 148 185"/><polygon points="150,185 142,181 142,189" fill="#6366f1"/>
    <path d="M 120 180 L 135 102 L 148 102"/><polygon points="150,102 142,98 142,106" fill="#6366f1"/>
    <path d="M 250 192 L 293 175"/><polygon points="295,174 286,174 290,182" fill="#6366f1"/>
    <path d="M 250 192 L 293 201"/>
    <path d="M 250 192 L 293 230"/>
    <path d="M 405 165 L 448 145"/><polygon points="450,144 441,144 445,152" fill="#6366f1"/>
    <path d="M 405 201 L 448 205"/><polygon points="450,205 442,201 442,209" fill="#6366f1"/>
    <path d="M 405 237 L 588 270"/><polygon points="590,270 581,269 584,277" fill="#6366f1"/>
  </g>

  <rect x="30" y="312" width="660" height="50" rx="8" fill="#fff" stroke="#a5b4fc"/>
  <text x="48" y="333" font-size="11.5" fill="#312e81">DNS → CDN (статика) → балансировщик → stateless-серверы → кэш + БД (реплики).</text>
  <text x="48" y="351" font-size="11.5" fill="#312e81">Тяжёлое/фоновое — в очередь. Каждый блок решает своё узкое место.</text>
</svg>

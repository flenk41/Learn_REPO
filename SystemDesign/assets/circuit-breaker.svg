<svg viewBox="0 0 720 320" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="720" height="320" fill="#eef2ff" rx="12"/>
  <text x="360" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#312e81">Circuit breaker: защита от каскадного отказа</text>

  <!-- states -->
  <circle cx="150" cy="140" r="62" fill="#dcfce7" stroke="#15803d" stroke-width="2.5"/>
  <text x="150" y="135" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">CLOSED</text>
  <text x="150" y="155" text-anchor="middle" font-size="10.5" fill="#15803d">зовём зависимость</text>

  <circle cx="570" cy="140" r="62" fill="#fee2e2" stroke="#b91c1c" stroke-width="2.5"/>
  <text x="570" y="135" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">OPEN</text>
  <text x="570" y="155" text-anchor="middle" font-size="10.5" fill="#b91c1c">НЕ зовём, сразу ошибка</text>

  <circle cx="360" cy="250" r="52" fill="#fef9c3" stroke="#b45309" stroke-width="2.5"/>
  <text x="360" y="248" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">HALF-OPEN</text>
  <text x="360" y="266" text-anchor="middle" font-size="10" fill="#b45309">пробный запрос</text>

  <!-- transitions -->
  <path d="M 212 140 L 506 140" stroke="#b91c1c" stroke-width="2.5" fill="none"/><polygon points="508,140 499,136 499,144" fill="#b91c1c"/>
  <text x="360" y="130" text-anchor="middle" font-size="11.5" font-weight="700" fill="#b91c1c">много ошибок →</text>

  <path d="M 545 196 C 480 240, 430 245, 412 245" stroke="#b45309" stroke-width="2" fill="none"/><polygon points="410,245 419,241 419,249" fill="#b45309"/>
  <text x="470" y="232" text-anchor="middle" font-size="10" fill="#b45309">через время</text>

  <path d="M 312 232 C 230 205, 200 195, 178 192" stroke="#15803d" stroke-width="2" fill="none"/><polygon points="176,191 185,189 183,197" fill="#15803d"/>
  <text x="250" y="222" text-anchor="middle" font-size="10" fill="#15803d">успех → CLOSED</text>
  <path d="M 400 248 C 470 250, 520 215, 545 200" stroke="#b91c1c" stroke-width="1.6" fill="none" stroke-dasharray="4 3"/>
  <text x="475" y="270" text-anchor="middle" font-size="9.5" fill="#b91c1c">ошибка → снова OPEN</text>

  <rect x="30" y="295" width="660" height="0" />
  <text x="360" y="312" text-anchor="middle" font-size="12" fill="#312e81">Защищает и тебя (не висишь на таймаутах), и упавшую зависимость (не добиваешь ретраями).</text>
</svg>

<svg viewBox="0 0 720 360" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="720" height="360" fill="#eef2ff" rx="12"/>
  <text x="360" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#312e81">Масштабирование: вертикально vs горизонтально</text>

  <!-- vertical -->
  <rect x="30" y="55" width="320" height="270" rx="10" fill="#fff" stroke="#6366f1" stroke-width="2"/>
  <text x="190" y="80" text-anchor="middle" font-size="15" font-weight="700" fill="#4338ca">ВЕРТИКАЛЬНО (scale up)</text>
  <rect x="150" y="100" width="80" height="40" rx="6" fill="#c7d2fe"/><text x="190" y="125" text-anchor="middle" font-size="11" fill="#312e81">🖥️</text>
  <rect x="140" y="150" width="100" height="55" rx="6" fill="#a5b4fc"/><text x="190" y="182" text-anchor="middle" font-size="13" fill="#312e81">🖥️ мощнее</text>
  <rect x="130" y="215" width="120" height="70" rx="6" fill="#6366f1"/><text x="190" y="255" text-anchor="middle" font-size="14" fill="#fff">🖥️ ещё мощнее</text>
  <text x="190" y="305" text-anchor="middle" font-size="11" fill="#475569">просто, но ПОТОЛОК + точка отказа</text>

  <!-- horizontal -->
  <rect x="370" y="55" width="320" height="270" rx="10" fill="#fff" stroke="#3730a3" stroke-width="2.5"/>
  <text x="530" y="80" text-anchor="middle" font-size="15" font-weight="700" fill="#3730a3">ГОРИЗОНТАЛЬНО (scale out)</text>
  <rect x="480" y="98" width="100" height="30" rx="6" fill="#312e81"/><text x="530" y="118" text-anchor="middle" font-size="11" fill="#fff">Балансировщик</text>
  <g fill="#6366f1">
    <rect x="395" y="160" width="55" height="44" rx="6"/><rect x="460" y="160" width="55" height="44" rx="6"/>
    <rect x="525" y="160" width="55" height="44" rx="6"/><rect x="590" y="160" width="55" height="44" rx="6"/>
  </g>
  <g fill="#fff" font-size="16"><text x="422" y="188" text-anchor="middle">🖥️</text><text x="487" y="188" text-anchor="middle">🖥️</text><text x="552" y="188" text-anchor="middle">🖥️</text><text x="617" y="188" text-anchor="middle">🖥️</text></g>
  <rect x="490" y="230" width="80" height="34" rx="6" fill="#a5b4fc" stroke-dasharray="4 3" stroke="#3730a3"/>
  <text x="530" y="252" text-anchor="middle" font-size="11" fill="#312e81">+ ещё 🖥️</text>
  <g stroke="#3730a3" stroke-width="1.5"><line x1="530" y1="128" x2="422" y2="160"/><line x1="530" y1="128" x2="487" y2="160"/><line x1="530" y1="128" x2="552" y2="160"/><line x1="530" y1="128" x2="617" y2="160"/></g>
  <text x="530" y="290" text-anchor="middle" font-size="11" fill="#475569">больше машин, почти без предела + HA</text>
  <text x="530" y="308" text-anchor="middle" font-size="10.5" fill="#3730a3" font-weight="700">требует stateless-серверы (модуль 09)</text>

  <text x="360" y="345" text-anchor="middle" font-size="12" fill="#312e81">Начни вертикально (просто) → горизонтально, когда упёрся или нужна доступность.</text>
</svg>

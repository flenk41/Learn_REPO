<svg viewBox="0 0 720 380" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="720" height="380" fill="#eef2ff" rx="12"/>
  <text x="360" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#312e81">CAP: при разделении выбираешь C или A</text>

  <!-- triangle -->
  <polygon points="360,70 215,250 505,250" fill="none" stroke="#3730a3" stroke-width="2"/>
  <circle cx="360" cy="70" r="6" fill="#3730a3"/>
  <circle cx="215" cy="250" r="6" fill="#3730a3"/>
  <circle cx="505" cy="250" r="6" fill="#3730a3"/>
  <text x="360" y="58" text-anchor="middle" font-size="14" font-weight="700" fill="#3730a3">C — Consistency</text>
  <text x="360" y="44" text-anchor="middle" font-size="10.5" fill="#475569">все видят одни данные</text>
  <text x="180" y="268" text-anchor="middle" font-size="14" font-weight="700" fill="#3730a3">A — Availability</text>
  <text x="180" y="283" text-anchor="middle" font-size="10.5" fill="#475569">всегда отвечает</text>
  <text x="540" y="268" text-anchor="middle" font-size="14" font-weight="700" fill="#3730a3">P — Partition</text>
  <text x="540" y="283" text-anchor="middle" font-size="10.5" fill="#475569">переживает разрыв сети</text>

  <text x="360" y="175" text-anchor="middle" font-size="12" fill="#312e81" font-weight="700">P обязателен</text>
  <text x="360" y="192" text-anchor="middle" font-size="10.5" fill="#475569">(сеть рвётся)</text>

  <!-- choice boxes -->
  <rect x="40" y="295" width="310" height="70" rx="8" fill="#fff" stroke="#6366f1" stroke-width="2"/>
  <text x="55" y="317" font-size="13" font-weight="700" fill="#4338ca">CP — выбрал Consistency</text>
  <text x="55" y="336" font-size="11" fill="#475569">«лучше отказать, чем дать неверное»</text>
  <text x="55" y="353" font-size="11" fill="#312e81">→ банк, остатки, брони, баланс</text>

  <rect x="370" y="295" width="310" height="70" rx="8" fill="#fff" stroke="#6366f1" stroke-width="2"/>
  <text x="385" y="317" font-size="13" font-weight="700" fill="#4338ca">AP — выбрал Availability</text>
  <text x="385" y="336" font-size="11" fill="#475569">«лучше ответить, пусть устаревшим»</text>
  <text x="385" y="353" font-size="11" fill="#312e81">→ лента, лайки, статусы (eventual)</text>

  <text x="360" y="285" text-anchor="middle" font-size="11.5" fill="#3730a3" font-weight="700">выбирай модель консистентности ПОД ДАННЫЕ, не на всю систему</text>
</svg>

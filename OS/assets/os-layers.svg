<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="Segoe UI, Arial, sans-serif">
  <rect x="0" y="0" width="720" height="400" rx="16" fill="#f1f5f9"/>
  <text x="360" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">ОС — посредник между железом и программами</text>

  <!-- apps -->
  <rect x="90" y="70" width="540" height="70" rx="10" fill="#fff" stroke="#475569" stroke-width="2"/>
  <text x="360" y="100" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">ПРОГРАММЫ</text>
  <text x="360" y="122" text-anchor="middle" font-size="12.5" fill="#64748b">браузер · игра · твой код — пользуются ресурсами</text>

  <!-- OS -->
  <rect x="90" y="160" width="540" height="90" rx="10" fill="#475569"/>
  <text x="360" y="190" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">ОПЕРАЦИОННАЯ СИСТЕМА (ядро)</text>
  <text x="360" y="214" text-anchor="middle" font-size="12.5" fill="#cbd5e1">раздаёт и защищает ресурсы · системные вызовы</text>
  <g font-size="12" fill="#fff">
    <rect x="110" y="222" width="110" height="22" rx="5" fill="#64748b"/><text x="165" y="238" text-anchor="middle">процессы</text>
    <rect x="230" y="222" width="110" height="22" rx="5" fill="#64748b"/><text x="285" y="238" text-anchor="middle">память ⭐</text>
    <rect x="350" y="222" width="110" height="22" rx="5" fill="#64748b"/><text x="405" y="238" text-anchor="middle">файлы / I-O</text>
    <rect x="470" y="222" width="140" height="22" rx="5" fill="#64748b"/><text x="540" y="238" text-anchor="middle">защита / изоляция</text>
  </g>

  <!-- hardware -->
  <rect x="90" y="270" width="540" height="70" rx="10" fill="#fff" stroke="#475569" stroke-width="2"/>
  <text x="360" y="300" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">ЖЕЛЕЗО</text>
  <text x="360" y="322" text-anchor="middle" font-size="12.5" fill="#64748b">CPU · RAM · диск · сеть — физические ресурсы</text>

  <!-- arrows -->
  <line x1="360" y1="140" x2="360" y2="158" stroke="#94a3b8" stroke-width="2" marker-end="url(#o)"/>
  <line x1="360" y1="250" x2="360" y2="268" stroke="#94a3b8" stroke-width="2" marker-end="url(#o)"/>
  <text x="640" y="155" text-anchor="end" font-size="11" fill="#64748b" transform="rotate(0)"></text>

  <text x="360" y="372" text-anchor="middle" font-size="12" font-style="italic" fill="#64748b">программы видят простые абстракции, ОС переводит их в реальные действия с железом</text>

  <defs>
    <marker id="o" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>

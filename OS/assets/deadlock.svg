<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="Segoe UI, Arial, sans-serif">
  <rect x="0" y="0" width="720" height="360" rx="16" fill="#f1f5f9"/>
  <text x="360" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Deadlock — «смертельные объятия»</text>

  <!-- thread A -->
  <rect x="80" y="90" width="150" height="60" rx="10" fill="#475569"/>
  <text x="155" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Поток A</text>
  <text x="155" y="138" text-anchor="middle" font-size="11" fill="#cbd5e1">держит замок 1</text>

  <!-- thread B -->
  <rect x="490" y="90" width="150" height="60" rx="10" fill="#475569"/>
  <text x="565" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Поток B</text>
  <text x="565" y="138" text-anchor="middle" font-size="11" fill="#cbd5e1">держит замок 2</text>

  <!-- lock 1 -->
  <rect x="80" y="230" width="150" height="56" rx="10" fill="#fff" stroke="#475569" stroke-width="1.8"/>
  <text x="155" y="258" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1e293b">🔒 Замок 1</text>
  <text x="155" y="276" text-anchor="middle" font-size="10.5" fill="#64748b">занят A</text>

  <!-- lock 2 -->
  <rect x="490" y="230" width="150" height="56" rx="10" fill="#fff" stroke="#475569" stroke-width="1.8"/>
  <text x="565" y="258" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1e293b">🔒 Замок 2</text>
  <text x="565" y="276" text-anchor="middle" font-size="10.5" fill="#64748b">занят B</text>

  <!-- holds -->
  <line x1="140" y1="150" x2="140" y2="228" stroke="#64748b" stroke-width="2" marker-end="url(#d)"/>
  <text x="100" y="195" text-anchor="middle" font-size="10.5" fill="#475569">держит</text>
  <line x1="580" y1="150" x2="580" y2="228" stroke="#64748b" stroke-width="2" marker-end="url(#d)"/>
  <text x="620" y="195" text-anchor="middle" font-size="10.5" fill="#475569">держит</text>

  <!-- wants (crossed) -->
  <line x1="225" y1="258" x2="488" y2="120" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="6 5" marker-end="url(#dr)"/>
  <line x1="495" y1="258" x2="232" y2="120" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="6 5" marker-end="url(#dr)"/>
  <text x="360" y="180" text-anchor="middle" font-size="12" font-weight="700" fill="#b91c1c">A хочет замок 2 · B хочет замок 1</text>
  <text x="360" y="212" text-anchor="middle" font-size="12.5" font-weight="700" fill="#b91c1c">→ оба ждут друг друга → ЗАСТРЯЛИ НАВСЕГДА</text>

  <text x="360" y="330" text-anchor="middle" font-size="12" font-style="italic" fill="#64748b">лечится единым порядком захвата замков (сначала 1, потом 2 — всегда) → цикл невозможен</text>

  <defs>
    <marker id="d" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#64748b"/></marker>
    <marker id="dr" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#dc2626"/></marker>
  </defs>
</svg>

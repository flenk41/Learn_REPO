<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="Segoe UI, Arial, sans-serif">
  <rect x="0" y="0" width="720" height="400" rx="16" fill="#f1f5f9"/>
  <text x="360" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Таблица страниц и page fault ⭐⭐</text>

  <!-- virtual address -->
  <text x="160" y="72" text-anchor="middle" font-size="12.5" font-weight="700" fill="#475569">виртуальный адрес</text>
  <rect x="60" y="82" width="120" height="34" rx="5" fill="#fff" stroke="#475569" stroke-width="1.6"/>
  <text x="120" y="104" text-anchor="middle" font-size="12" fill="#334155">№ страницы</text>
  <rect x="180" y="82" width="100" height="34" rx="5" fill="#e2e8f0" stroke="#475569" stroke-width="1.6"/>
  <text x="230" y="104" text-anchor="middle" font-size="12" fill="#334155">смещение</text>

  <!-- page table -->
  <rect x="60" y="150" width="280" height="170" rx="10" fill="#fff" stroke="#475569" stroke-width="2"/>
  <text x="200" y="174" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">Таблица страниц</text>
  <g font-size="11.5" fill="#334155">
    <rect x="76" y="186" width="248" height="26" rx="4" fill="#e2e8f0"/><text x="86" y="204">стр.0 → фрейм 7   present ✓  rw-</text>
    <rect x="76" y="216" width="248" height="26" rx="4" fill="#dbeafe"/><text x="86" y="234">стр.1 → фрейм 3   present ✓  r-x</text>
    <rect x="76" y="246" width="248" height="26" rx="4" fill="#fee2e2"/><text x="86" y="264">стр.2 → (на диске)  present ✗</text>
    <rect x="76" y="276" width="248" height="26" rx="4" fill="#e2e8f0"/><text x="86" y="294">стр.3 → фрейм 9   present ✓  rw-</text>
  </g>
  <line x1="120" y1="116" x2="160" y2="148" stroke="#94a3b8" stroke-width="2" marker-end="url(#g)"/>

  <!-- RAM -->
  <rect x="420" y="100" width="240" height="120" rx="10" fill="#fff" stroke="#1e293b" stroke-width="1.6"/>
  <text x="540" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">Физическая RAM</text>
  <text x="540" y="150" text-anchor="middle" font-size="11.5" fill="#334155">present ✓ → фрейм найден →</text>
  <text x="540" y="170" text-anchor="middle" font-size="11.5" fill="#334155">+ смещение = физ. адрес ✅</text>
  <text x="540" y="196" text-anchor="middle" font-size="11" font-style="italic" fill="#64748b">быстро, аппаратно (MMU)</text>
  <line x1="324" y1="199" x2="418" y2="160" stroke="#94a3b8" stroke-width="2" marker-end="url(#g)"/>

  <!-- page fault -->
  <rect x="420" y="240" width="240" height="110" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1.8"/>
  <text x="540" y="264" text-anchor="middle" font-size="13" font-weight="700" fill="#b91c1c">present ✗ → PAGE FAULT</text>
  <text x="540" y="288" text-anchor="middle" font-size="11" fill="#7f1d1d">ОС: грузит страницу с диска в RAM,</text>
  <text x="540" y="306" text-anchor="middle" font-size="11" fill="#7f1d1d">обновляет таблицу (present=1),</text>
  <text x="540" y="324" text-anchor="middle" font-size="11" fill="#7f1d1d">процесс продолжает (штатно!)</text>
  <line x1="324" y1="259" x2="418" y2="280" stroke="#dc2626" stroke-width="2" marker-end="url(#gr)"/>

  <text x="360" y="378" text-anchor="middle" font-size="11.5" font-style="italic" fill="#64748b">адрес = № страницы (ищем в таблице) + смещение (не меняется) · доступ к чужой странице → segfault</text>

  <defs>
    <marker id="g" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#94a3b8"/></marker>
    <marker id="gr" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#dc2626"/></marker>
  </defs>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" font-family="Segoe UI, Arial, sans-serif">
  <rect width="760" height="380" rx="16" fill="#f1f5f9"/>
  <text x="380" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Мьютекс и семафор — защита общего ресурса</text>

  <!-- MUTEX -->
  <text x="200" y="72" text-anchor="middle" font-size="15" font-weight="700" fill="#7c3aed">МЬЮТЕКС = 1 ключ</text>
  <text x="200" y="90" text-anchor="middle" font-size="11.5" fill="#64748b">в критической секции только ОДИН поток</text>
  <!-- threads -->
  <rect x="50" y="110" width="70" height="38" rx="6" fill="#16a34a"/><text x="85" y="134" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">поток 1</text>
  <rect x="50" y="160" width="70" height="38" rx="6" fill="#94a3b8"/><text x="85" y="184" text-anchor="middle" font-size="11" fill="#fff">поток 2</text>
  <rect x="50" y="210" width="70" height="38" rx="6" fill="#94a3b8"/><text x="85" y="234" text-anchor="middle" font-size="11" fill="#fff">поток 3</text>
  <text x="150" y="270" text-anchor="middle" font-size="11" fill="#dc2626">2,3 ждут 🔒</text>
  <!-- gate -->
  <rect x="150" y="150" width="46" height="58" rx="6" fill="#fff" stroke="#7c3aed" stroke-width="2"/>
  <text x="173" y="185" text-anchor="middle" font-size="20">🔑</text>
  <!-- resource -->
  <rect x="240" y="150" width="110" height="58" rx="8" fill="#7c3aed"/>
  <text x="295" y="176" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">РЕСУРС</text>
  <text x="295" y="194" text-anchor="middle" font-size="10.5" fill="#ddd6fe">(файл, счётчик)</text>
  <line x1="120" y1="129" x2="148" y2="170" stroke="#16a34a" stroke-width="2.5"/>
  <line x1="196" y1="179" x2="238" y2="179" stroke="#16a34a" stroke-width="2.5"/>

  <line x1="390" y1="60" x2="390" y2="320" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- SEMAPHORE -->
  <text x="575" y="72" text-anchor="middle" font-size="15" font-weight="700" fill="#0891b2">СЕМАФОР = N пропусков</text>
  <text x="575" y="90" text-anchor="middle" font-size="11.5" fill="#64748b">пускает до N потоков одновременно (тут N=2)</text>
  <rect x="430" y="110" width="70" height="38" rx="6" fill="#16a34a"/><text x="465" y="134" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">поток 1</text>
  <rect x="430" y="160" width="70" height="38" rx="6" fill="#16a34a"/><text x="465" y="184" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">поток 2</text>
  <rect x="430" y="210" width="70" height="38" rx="6" fill="#94a3b8"/><text x="465" y="234" text-anchor="middle" font-size="11" fill="#fff">поток 3</text>
  <text x="530" y="270" text-anchor="middle" font-size="11" fill="#dc2626">3 ждёт</text>
  <rect x="530" y="140" width="46" height="78" rx="6" fill="#fff" stroke="#0891b2" stroke-width="2"/>
  <text x="553" y="166" text-anchor="middle" font-size="13">🎫🎫</text>
  <text x="553" y="206" text-anchor="middle" font-size="10" fill="#0891b2">2 свободно</text>
  <rect x="620" y="150" width="110" height="58" rx="8" fill="#0891b2"/>
  <text x="675" y="176" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">ПУЛ РЕСУРСОВ</text>
  <text x="675" y="194" text-anchor="middle" font-size="10.5" fill="#cffafe">(2 соединения)</text>

  <rect x="60" y="335" width="640" height="34" rx="9" fill="#e2e8f0"/>
  <text x="380" y="357" text-anchor="middle" font-size="12.5" fill="#1e293b">Мьютекс — частный случай семафора с N=1. Цель — не дать потокам портить общие данные одновременно.</text>
</svg>

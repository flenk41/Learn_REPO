<svg viewBox="0 0 720 300" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="720" height="300" fill="#f1f5f9" rx="12"/>
  <text x="360" y="30" text-anchor="middle" font-size="19" font-weight="700" fill="#1e293b">Гонка данных: два потока, один счётчик</text>

  <!-- shared var -->
  <rect x="300" y="60" width="120" height="44" rx="8" fill="#fff" stroke="#475569" stroke-width="2.5"/>
  <text x="360" y="80" text-anchor="middle" font-size="12" font-weight="700" fill="#1e293b">counter</text>
  <text x="360" y="97" text-anchor="middle" font-size="11" fill="#b91c1c">= 5 (общая)</text>

  <!-- thread A -->
  <rect x="40" y="135" width="290" height="120" rx="8" fill="#fff" stroke="#475569" stroke-width="2"/>
  <text x="185" y="157" text-anchor="middle" font-size="12.5" font-weight="700" fill="#475569">Поток A: counter++</text>
  <text x="58" y="180" font-size="11" font-family="monospace" fill="#374151">1. читает counter → 5</text>
  <text x="58" y="200" font-size="11" font-family="monospace" fill="#374151">2. (прерван планировщиком ⏸)</text>
  <text x="58" y="226" font-size="11" font-family="monospace" fill="#374151">5. пишет 5+1 = 6</text>

  <!-- thread B -->
  <rect x="390" y="135" width="290" height="120" rx="8" fill="#fff" stroke="#475569" stroke-width="2"/>
  <text x="535" y="157" text-anchor="middle" font-size="12.5" font-weight="700" fill="#475569">Поток B: counter++</text>
  <text x="408" y="183" font-size="11" font-family="monospace" fill="#374151">3. читает counter → 5</text>
  <text x="408" y="203" font-size="11" font-family="monospace" fill="#374151">4. пишет 5+1 = 6</text>

  <path d="M 330 90 L 185 133" stroke="#475569" stroke-width="1.5" fill="none"/>
  <path d="M 420 90 L 535 133" stroke="#475569" stroke-width="1.5" fill="none"/>

  <rect x="40" y="265" width="640" height="0"/>
  <text x="360" y="282" text-anchor="middle" font-size="12.5" fill="#b91c1c" font-weight="700">Оба прибавили → ждём 7, получили 6! Потеряно обновление. Решение: мьютекс/atomic (критическая секция).</text>
</svg>

<svg viewBox="0 0 720 290" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="720" height="290" fill="#f1f5f9" rx="12"/>
  <text x="360" y="30" text-anchor="middle" font-size="19" font-weight="700" fill="#1e293b">Page fault: страница не в RAM — подгрузить</text>

  <rect x="30" y="60" width="150" height="50" rx="8" fill="#fff" stroke="#475569" stroke-width="2"/>
  <text x="105" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">программа</text>
  <text x="105" y="99" text-anchor="middle" font-size="10" fill="#64748b">обращается к адресу</text>

  <rect x="285" y="55" width="150" height="60" rx="8" fill="#fff" stroke="#475569" stroke-width="2"/>
  <text x="360" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">MMU / таблица</text>
  <text x="360" y="97" text-anchor="middle" font-size="10.5" fill="#374151">страница в RAM?</text>

  <!-- hit -->
  <rect x="540" y="45" width="150" height="40" rx="8" fill="#dcfce7" stroke="#15803d"/>
  <text x="615" y="69" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">✓ есть → доступ быстр</text>

  <!-- fault -->
  <rect x="285" y="150" width="150" height="44" rx="8" fill="#fef9c3" stroke="#b45309"/>
  <text x="360" y="170" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">✗ PAGE FAULT</text>
  <text x="360" y="187" text-anchor="middle" font-size="9.5" fill="#b45309">ядро перехватывает</text>

  <rect x="500" y="150" width="190" height="44" rx="8" fill="#fff" stroke="#475569" stroke-width="2"/>
  <text x="595" y="170" text-anchor="middle" font-size="10.5" fill="#374151">загрузить страницу с диска</text>
  <text x="595" y="187" text-anchor="middle" font-size="9.5" fill="#64748b">(swap/файл) → в RAM → повтор</text>

  <g stroke="#475569" stroke-width="2" fill="none">
    <path d="M 180 85 L 283 85"/><polygon points="285,85 276,81 276,89" fill="#475569"/>
    <path d="M 435 75 L 538 70"/><polygon points="540,70 531,67 531,75" fill="#15803d"/>
    <path d="M 360 115 L 360 148"/><polygon points="360,150 356,141 364,141" fill="#b45309"/>
    <path d="M 435 172 L 498 172"/><polygon points="500,172 491,168 491,176" fill="#475569"/>
  </g>

  <rect x="40" y="225" width="640" height="55" rx="8" fill="#fff" stroke="#cbd5e1"/>
  <text x="58" y="247" font-size="12" fill="#1e293b">Виртуальная память больше физической: редкие страницы лежат на диске (swap), подгружаются по обращению.</text>
  <text x="58" y="268" font-size="11" fill="#b91c1c">⚠️ THRASHING — если активных страниц больше, чем RAM: система постоянно свопит → всё тормозит.</text>
</svg>

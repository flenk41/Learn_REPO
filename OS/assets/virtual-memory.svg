<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 410" font-family="Segoe UI, Arial, sans-serif">
  <rect x="0" y="0" width="720" height="410" rx="16" fill="#f1f5f9"/>
  <text x="360" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Виртуальная память — каждому процессу своя ⭐⭐</text>

  <!-- process A -->
  <text x="130" y="70" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">Процесс A (вирт.)</text>
  <rect x="60" y="80" width="140" height="120" rx="8" fill="#fff" stroke="#475569" stroke-width="1.6"/>
  <rect x="68" y="88" width="124" height="26" rx="4" fill="#e2e8f0"/><text x="130" y="106" text-anchor="middle" font-size="11" fill="#334155">0x400000</text>
  <rect x="68" y="118" width="124" height="26" rx="4" fill="#e2e8f0"/><text x="130" y="136" text-anchor="middle" font-size="11" fill="#334155">0x401000</text>
  <rect x="68" y="148" width="124" height="26" rx="4" fill="#e2e8f0"/><text x="130" y="166" text-anchor="middle" font-size="11" fill="#334155">0x402000</text>

  <!-- process B -->
  <text x="130" y="240" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">Процесс B (вирт.)</text>
  <rect x="60" y="250" width="140" height="120" rx="8" fill="#fff" stroke="#475569" stroke-width="1.6"/>
  <rect x="68" y="258" width="124" height="26" rx="4" fill="#dbeafe"/><text x="130" y="276" text-anchor="middle" font-size="11" fill="#334155">0x400000</text>
  <rect x="68" y="288" width="124" height="26" rx="4" fill="#dbeafe"/><text x="130" y="306" text-anchor="middle" font-size="11" fill="#334155">0x401000</text>
  <rect x="68" y="318" width="124" height="26" rx="4" fill="#dbeafe"/><text x="130" y="336" text-anchor="middle" font-size="11" fill="#334155">0x402000</text>

  <!-- MMU -->
  <rect x="290" y="170" width="120" height="70" rx="10" fill="#475569"/>
  <text x="350" y="200" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">ОС + MMU</text>
  <text x="350" y="220" text-anchor="middle" font-size="10.5" fill="#cbd5e1">переводят адреса</text>

  <!-- physical RAM -->
  <text x="600" y="70" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">Физическая RAM</text>
  <rect x="510" y="80" width="180" height="290" rx="8" fill="#fff" stroke="#1e293b" stroke-width="1.6"/>
  <rect x="520" y="92" width="160" height="26" rx="4" fill="#e2e8f0"/><text x="600" y="110" text-anchor="middle" font-size="10.5" fill="#334155">фрейм 7 ← A:0x400000</text>
  <rect x="520" y="124" width="160" height="26" rx="4" fill="#dbeafe"/><text x="600" y="142" text-anchor="middle" font-size="10.5" fill="#334155">фрейм 3 ← B:0x400000</text>
  <rect x="520" y="156" width="160" height="26" rx="4" fill="#e2e8f0"/><text x="600" y="174" text-anchor="middle" font-size="10.5" fill="#334155">фрейм 9 ← A:0x401000</text>
  <rect x="520" y="188" width="160" height="26" rx="4" fill="#dbeafe"/><text x="600" y="206" text-anchor="middle" font-size="10.5" fill="#334155">фрейм 2 ← B:0x401000</text>
  <rect x="520" y="220" width="160" height="26" rx="4" fill="#f1f5f9"/><text x="600" y="238" text-anchor="middle" font-size="10.5" fill="#64748b">...</text>

  <!-- arrows -->
  <line x1="200" y1="130" x2="288" y2="190" stroke="#94a3b8" stroke-width="2" marker-end="url(#v)"/>
  <line x1="200" y1="300" x2="288" y2="220" stroke="#94a3b8" stroke-width="2" marker-end="url(#v)"/>
  <line x1="410" y1="200" x2="508" y2="200" stroke="#94a3b8" stroke-width="2" marker-end="url(#v)"/>

  <text x="360" y="395" text-anchor="middle" font-size="12.5" font-weight="700" fill="#b91c1c">адрес 0x400000 у A и B → РАЗНАЯ физическая память (никакого конфликта, полная изоляция)</text>

  <defs>
    <marker id="v" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>

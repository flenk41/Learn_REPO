<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 430" font-family="Segoe UI, Arial, sans-serif">
  <rect x="0" y="0" width="720" height="430" rx="16" fill="#fbf7f4"/>
  <text x="360" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#3a2a22">Контекстное окно = память (RAM) агента ⭐⭐</text>

  <!-- window bar -->
  <rect x="40" y="70" width="640" height="70" rx="10" fill="#fff" stroke="#d97757" stroke-width="2"/>
  <rect x="42" y="72" width="120" height="66" rx="8" fill="#e9d9cf"/>
  <text x="102" y="100" text-anchor="middle" font-size="11" fill="#5a4a42">системный</text>
  <text x="102" y="116" text-anchor="middle" font-size="11" fill="#5a4a42">промпт</text>
  <rect x="166" y="72" width="110" height="66" fill="#f0d9b5"/>
  <text x="221" y="108" text-anchor="middle" font-size="11.5" fill="#5a4a42">CLAUDE.md</text>
  <rect x="280" y="72" width="170" height="66" fill="#f3e3da"/>
  <text x="365" y="108" text-anchor="middle" font-size="11.5" fill="#5a4a42">история сессии</text>
  <rect x="454" y="72" width="150" height="66" fill="#e7eddf"/>
  <text x="529" y="100" text-anchor="middle" font-size="11" fill="#5a4a42">прочитанные</text>
  <text x="529" y="116" text-anchor="middle" font-size="11" fill="#5a4a42">файлы / вывод</text>
  <rect x="608" y="72" width="70" height="66" fill="#fff"/>
  <text x="643" y="108" text-anchor="middle" font-size="13" fill="#9a8678">…</text>

  <text x="40" y="162" font-size="12" fill="#8a7368">◄──────────────── конечный размер окна (200K … 1M токенов) ────────────────►</text>

  <!-- three axes of harm -->
  <text x="360" y="205" text-anchor="middle" font-size="14" font-weight="700" fill="#b85c3c">Забитое окно вредит сразу по трём осям:</text>
  <rect x="60" y="222" width="180" height="64" rx="10" fill="#fff" stroke="#c0563a" stroke-width="1.5"/>
  <text x="150" y="250" text-anchor="middle" font-size="13" font-weight="700" fill="#3a2a22">📉 Качество</text>
  <text x="150" y="272" text-anchor="middle" font-size="11.5" fill="#6b5b52">важное тонет в мусоре</text>
  <rect x="270" y="222" width="180" height="64" rx="10" fill="#fff" stroke="#c0563a" stroke-width="1.5"/>
  <text x="360" y="250" text-anchor="middle" font-size="13" font-weight="700" fill="#3a2a22">💸 Деньги</text>
  <text x="360" y="272" text-anchor="middle" font-size="11.5" fill="#6b5b52">платишь за токены</text>
  <rect x="480" y="222" width="180" height="64" rx="10" fill="#fff" stroke="#c0563a" stroke-width="1.5"/>
  <text x="570" y="250" text-anchor="middle" font-size="13" font-weight="700" fill="#3a2a22">🐌 Скорость</text>
  <text x="570" y="272" text-anchor="middle" font-size="11.5" fill="#6b5b52">больше токенов = дольше</text>

  <!-- three levers -->
  <text x="360" y="330" text-anchor="middle" font-size="14" font-weight="700" fill="#3a2a22">Три рычага управления памятью агента:</text>
  <rect x="60" y="346" width="180" height="60" rx="10" fill="#d97757"/>
  <text x="150" y="372" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">📥 Класть</text>
  <text x="150" y="392" text-anchor="middle" font-size="11" fill="#fde8df">только нужное</text>
  <rect x="270" y="346" width="180" height="60" rx="10" fill="#c79a3a"/>
  <text x="360" y="372" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">🧹 Выгружать</text>
  <text x="360" y="392" text-anchor="middle" font-size="11" fill="#fff5e6">/compact · /clear</text>
  <rect x="480" y="346" width="180" height="60" rx="10" fill="#6b8e5a"/>
  <text x="570" y="372" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">💾 Сохранять</text>
  <text x="570" y="392" text-anchor="middle" font-size="11" fill="#eaf3e2">CLAUDE.md · заметки</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" font-family="Segoe UI, Arial, sans-serif">
  <rect width="760" height="400" rx="16" fill="#fff7ed"/>
  <text x="380" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#7c2d12">Цикл агента: модель ↔ инструменты, пока задача не решена</text>

  <!-- nodes -->
  <rect x="60" y="150" width="140" height="80" rx="12" fill="#d97757"/>
  <text x="130" y="185" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">Запрос</text>
  <text x="130" y="206" text-anchor="middle" font-size="11" fill="#fde4d3">цель + контекст</text>

  <rect x="280" y="120" width="180" height="140" rx="14" fill="#fff" stroke="#d97757" stroke-width="3"/>
  <text x="370" y="155" text-anchor="middle" font-size="15" fill="#9a3412" font-weight="700">Модель (Claude)</text>
  <text x="370" y="180" text-anchor="middle" font-size="11.5" fill="#7c2d12">думает: что сделать?</text>
  <text x="370" y="205" text-anchor="middle" font-size="11.5" fill="#7c2d12">— решить и ответить</text>
  <text x="370" y="225" text-anchor="middle" font-size="11.5" fill="#7c2d12">— или вызвать инструмент</text>

  <rect x="560" y="120" width="150" height="65" rx="12" fill="#fed7aa" stroke="#d97757" stroke-width="2"/>
  <text x="635" y="148" text-anchor="middle" font-size="13" fill="#7c2d12" font-weight="700">Инструменты</text>
  <text x="635" y="168" text-anchor="middle" font-size="10.5" fill="#9a3412">Read, Edit, Bash…</text>

  <rect x="560" y="200" width="150" height="60" rx="12" fill="#fff" stroke="#d97757" stroke-width="2"/>
  <text x="635" y="226" text-anchor="middle" font-size="12.5" fill="#7c2d12" font-weight="700">Результат</text>
  <text x="635" y="244" text-anchor="middle" font-size="10.5" fill="#9a3412">вывод инструмента</text>

  <rect x="280" y="300" width="180" height="60" rx="12" fill="#16a34a"/>
  <text x="370" y="326" text-anchor="middle" font-size="13.5" fill="#fff" font-weight="700">Готовый ответ</text>
  <text x="370" y="345" text-anchor="middle" font-size="10.5" fill="#dcfce7">когда критерий выполнен</text>

  <!-- arrows -->
  <defs><marker id="ac" markerWidth="11" markerHeight="11" refX="8" refY="4.5" orient="auto"><path d="M0,0 L10,4.5 L0,9 z" fill="#d97757"/></marker></defs>
  <line x1="200" y1="190" x2="276" y2="190" stroke="#d97757" stroke-width="2.5" marker-end="url(#ac)"/>
  <line x1="460" y1="160" x2="556" y2="155" stroke="#d97757" stroke-width="2.5" marker-end="url(#ac)"/>
  <text x="508" y="140" text-anchor="middle" font-size="10.5" fill="#9a3412" font-weight="700">вызов</text>
  <path d="M635,185 L635,198" stroke="#d97757" stroke-width="2.5" marker-end="url(#ac)"/>
  <path d="M560,230 C480,250 470,210 462,200" fill="none" stroke="#16a34a" stroke-width="2.5" marker-end="url(#ac2)"/>
  <text x="505" y="255" text-anchor="middle" font-size="10.5" fill="#15803d" font-weight="700">результат назад в контекст</text>
  <defs><marker id="ac2" markerWidth="11" markerHeight="11" refX="8" refY="4.5" orient="auto"><path d="M0,0 L10,4.5 L0,9 z" fill="#16a34a"/></marker></defs>
  <line x1="370" y1="260" x2="370" y2="296" stroke="#16a34a" stroke-width="2.5" marker-end="url(#ac2)"/>

  <!-- loop label -->
  <text x="635" y="285" text-anchor="middle" font-size="11" fill="#b45309" font-weight="700" font-style="italic">↑ цикл повторяется</text>

  <rect x="60" y="372" width="640" height="22" rx="8" fill="#ffedd5"/>
  <text x="380" y="388" text-anchor="middle" font-size="11.5" fill="#7c2d12">Агент = модель + цикл + инструменты + контекст. Каждый результат возвращается в контекст — отсюда важность контекстного окна.</text>
</svg>

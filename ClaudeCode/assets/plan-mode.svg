<svg viewBox="0 0 720 260" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="720" height="260" fill="#fbf1ec" rx="12"/>
  <text x="360" y="30" text-anchor="middle" font-size="19" font-weight="700" fill="#7c2d12">Plan Mode: сначала план, потом действие</text>

  <!-- plan -->
  <rect x="40" y="65" width="280" height="140" rx="10" fill="#fff" stroke="#d97757" stroke-width="2.5"/>
  <text x="180" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="#b45309">① PLAN (только чтение)</text>
  <text x="58" y="116" font-size="11" fill="#374151">• читает код, исследует</text>
  <text x="58" y="136" font-size="11" fill="#374151">• составляет план изменений</text>
  <text x="58" y="156" font-size="11" fill="#374151">• НЕ меняет файлы</text>
  <rect x="58" y="168" width="244" height="28" rx="5" fill="#fef3c7"/>
  <text x="180" y="187" text-anchor="middle" font-size="10.5" fill="#92400e">ты проверяешь план → одобряешь</text>

  <!-- execute -->
  <rect x="400" y="65" width="280" height="140" rx="10" fill="#fff" stroke="#d97757" stroke-width="2.5"/>
  <text x="540" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="#15803d">② EXECUTE</text>
  <text x="418" y="116" font-size="11" fill="#374151">• выполняет согласованный план</text>
  <text x="418" y="136" font-size="11" fill="#374151">• правит файлы, запускает</text>
  <text x="418" y="156" font-size="11" fill="#374151">• ты уже знаешь, что будет</text>
  <rect x="418" y="168" width="244" height="28" rx="5" fill="#dcfce7"/>
  <text x="540" y="187" text-anchor="middle" font-size="10.5" fill="#166534">меньше сюрпризов и переделок</text>

  <path d="M 320 135 L 398 135" stroke="#d97757" stroke-width="2.5" fill="none"/><polygon points="400,135 391,131 391,139" fill="#d97757"/>
  <text x="360" y="127" text-anchor="middle" font-size="9.5" fill="#d97757">одобрил</text>

  <text x="360" y="238" text-anchor="middle" font-size="12" fill="#7c2d12">Shift+Tab → Plan Mode. Для сложных/рискованных задач: согласуй ПОДХОД до правок, а не после.</text>
</svg>

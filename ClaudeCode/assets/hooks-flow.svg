<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="Segoe UI, Arial, sans-serif">
  <rect x="0" y="0" width="720" height="380" rx="16" fill="#fbf7f4"/>
  <text x="360" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#3a2a22">Hooks — гарантированные действия на события</text>

  <!-- column headers -->
  <text x="210" y="74" text-anchor="middle" font-size="13" font-weight="700" fill="#b85c3c">событие в Claude Code</text>
  <text x="540" y="74" text-anchor="middle" font-size="13" font-weight="700" fill="#6b8e5a">твой hook (shell)</text>

  <!-- rows -->
  <g>
    <rect x="60" y="92" width="300" height="48" rx="9" fill="#fff" stroke="#d97757" stroke-width="1.6"/>
    <text x="210" y="121" text-anchor="middle" font-size="12.5" fill="#3a2a22">PreToolUse — перед действием</text>
    <rect x="400" y="92" width="260" height="48" rx="9" fill="#eef3e8" stroke="#6b8e5a" stroke-width="1.4"/>
    <text x="530" y="121" text-anchor="middle" font-size="12" fill="#3a2a22">проверить / заблокировать rm -rf</text>
    <line x1="360" y1="116" x2="398" y2="116" stroke="#9a8678" stroke-width="2" marker-end="url(#a)"/>
  </g>
  <g>
    <rect x="60" y="150" width="300" height="48" rx="9" fill="#fff" stroke="#d97757" stroke-width="1.6"/>
    <text x="210" y="179" text-anchor="middle" font-size="12.5" fill="#3a2a22">PostToolUse — после правки файла</text>
    <rect x="400" y="150" width="260" height="48" rx="9" fill="#eef3e8" stroke="#6b8e5a" stroke-width="1.4"/>
    <text x="530" y="179" text-anchor="middle" font-size="12" fill="#3a2a22">форматтер · линтер · авто-тесты</text>
    <line x1="360" y1="174" x2="398" y2="174" stroke="#9a8678" stroke-width="2" marker-end="url(#a)"/>
  </g>
  <g>
    <rect x="60" y="208" width="300" height="48" rx="9" fill="#fff" stroke="#d97757" stroke-width="1.6"/>
    <text x="210" y="237" text-anchor="middle" font-size="12.5" fill="#3a2a22">UserPromptSubmit — твой ввод</text>
    <rect x="400" y="208" width="260" height="48" rx="9" fill="#eef3e8" stroke="#6b8e5a" stroke-width="1.4"/>
    <text x="530" y="237" text-anchor="middle" font-size="12" fill="#3a2a22">подмешать контекст · логировать</text>
    <line x1="360" y1="232" x2="398" y2="232" stroke="#9a8678" stroke-width="2" marker-end="url(#a)"/>
  </g>
  <g>
    <rect x="60" y="266" width="300" height="48" rx="9" fill="#fff" stroke="#d97757" stroke-width="1.6"/>
    <text x="210" y="295" text-anchor="middle" font-size="12.5" fill="#3a2a22">Stop — завершение задачи</text>
    <rect x="400" y="266" width="260" height="48" rx="9" fill="#eef3e8" stroke="#6b8e5a" stroke-width="1.4"/>
    <text x="530" y="295" text-anchor="middle" font-size="12" fill="#3a2a22">прогнать тесты · уведомить</text>
    <line x1="360" y1="290" x2="398" y2="290" stroke="#9a8678" stroke-width="2" marker-end="url(#a)"/>
  </g>

  <text x="360" y="350" text-anchor="middle" font-size="12" font-style="italic" fill="#8a7368">hook срабатывает детерминированно — не «агент вспомнит», а система гарантирует</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#9a8678"/>
    </marker>
  </defs>
</svg>

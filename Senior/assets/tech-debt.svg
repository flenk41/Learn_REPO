<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" font-family="Segoe UI, Arial, sans-serif">
  <rect width="760" height="380" rx="16" fill="#f0fdfa"/>
  <text x="380" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#134e4a">Технический долг — как финансовый</text>

  <!-- timeline -->
  <line x1="70" y1="150" x2="690" y2="150" stroke="#0f766e" stroke-width="2.5"/>
  <defs><marker id="at" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#0f766e"/></marker></defs>
  <line x1="690" y1="150" x2="700" y2="150" stroke="#0f766e" stroke-width="2.5" marker-end="url(#at)"/>

  <!-- borrow -->
  <circle cx="160" cy="150" r="8" fill="#16a34a"/>
  <text x="160" y="120" text-anchor="middle" font-size="13" font-weight="700" fill="#16a34a">ВЗЯЛ ДОЛГ</text>
  <text x="160" y="186" text-anchor="middle" font-size="11.5" fill="#475569">срезал углы →</text>
  <text x="160" y="202" text-anchor="middle" font-size="11.5" fill="#475569">быстро выкатил</text>

  <!-- interest -->
  <g fill="#d97706">
    <text x="400" y="120" text-anchor="middle" font-size="13" font-weight="700">ПЛАТИШЬ ПРОЦЕНТЫ</text>
    <circle cx="300" cy="150" r="5"/><circle cx="360" cy="150" r="5"/><circle cx="420" cy="150" r="5"/><circle cx="480" cy="150" r="5"/>
  </g>
  <text x="400" y="186" text-anchor="middle" font-size="11.5" fill="#475569">каждая правка тут дороже и рискованнее</text>

  <!-- repay -->
  <circle cx="600" cy="150" r="8" fill="#0f766e"/>
  <text x="600" y="120" text-anchor="middle" font-size="13" font-weight="700" fill="#0f766e">ОТДАЛ ДОЛГ</text>
  <text x="600" y="186" text-anchor="middle" font-size="11.5" fill="#475569">отрефакторил +</text>
  <text x="600" y="202" text-anchor="middle" font-size="11.5" fill="#475569">тесты → снова дёшево</text>

  <!-- conscious vs hidden -->
  <rect x="60" y="240" width="310" height="115" rx="10" fill="#ccfbf1" stroke="#0f766e"/>
  <text x="215" y="264" text-anchor="middle" font-size="13" font-weight="700" fill="#0f766e">✅ Осознанный долг</text>
  <text x="215" y="290" text-anchor="middle" font-size="11.5" fill="#134e4a">«срежем ради дедлайна,</text>
  <text x="215" y="308" text-anchor="middle" font-size="11.5" fill="#134e4a">заведём тикет на возврат»</text>
  <text x="215" y="334" text-anchor="middle" font-size="11" font-style="italic" fill="#0f766e">видимый, с планом — это РЕШЕНИЕ</text>

  <rect x="390" y="240" width="310" height="115" rx="10" fill="#fee2e2" stroke="#dc2626"/>
  <text x="545" y="264" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">❌ Скрытый долг</text>
  <text x="545" y="290" text-anchor="middle" font-size="11.5" fill="#7f1d1d">срезал молча, без тикета</text>
  <text x="545" y="308" text-anchor="middle" font-size="11.5" fill="#7f1d1d">→ через год всё гниёт</text>
  <text x="545" y="334" text-anchor="middle" font-size="11" font-style="italic" fill="#dc2626">невидимый, без плана — это БОЛЬ</text>
</svg>

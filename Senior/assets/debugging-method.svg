<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" font-family="Segoe UI, Arial, sans-serif">
  <rect width="760" height="400" rx="16" fill="#f0fdfa"/>
  <text x="380" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#134e4a">Отладка как наука, а не тычки наугад</text>

  <!-- funnel of steps -->
  <g font-size="12.5">
    <rect x="150" y="60" width="460" height="40" rx="8" fill="#0f766e"/>
    <text x="380" y="85" text-anchor="middle" fill="#fff" font-weight="700">1. ВОСПРОИЗВЕДИ — точные шаги/данные (не повторил → не починишь)</text>

    <rect x="180" y="110" width="400" height="40" rx="8" fill="#0d9488"/>
    <text x="380" y="135" text-anchor="middle" fill="#fff" font-weight="700">2. ЛОКАЛИЗУЙ — бинарный поиск по коду/коммитам/данным</text>

    <rect x="210" y="160" width="340" height="40" rx="8" fill="#14b8a6"/>
    <text x="380" y="185" text-anchor="middle" fill="#fff" font-weight="700">3. ГИПОТЕЗА — «думаю, X из-за Y»</text>

    <rect x="240" y="210" width="280" height="40" rx="8" fill="#2dd4bf"/>
    <text x="380" y="235" text-anchor="middle" fill="#134e4a" font-weight="700">4. ПРОВЕРЬ ОДНО за раз</text>

    <rect x="270" y="260" width="220" height="40" rx="8" fill="#5eead4"/>
    <text x="380" y="285" text-anchor="middle" fill="#134e4a" font-weight="700">5. КОРЕНЬ (5×«почему»)</text>

    <rect x="300" y="310" width="160" height="40" rx="8" fill="#99f6e4"/>
    <text x="380" y="335" text-anchor="middle" fill="#134e4a" font-weight="700">6. ФИКС + ТЕСТ</text>
  </g>

  <!-- binary search hint -->
  <text x="650" y="135" font-size="11" fill="#0f766e" font-weight="700">↙ git bisect,</text>
  <text x="650" y="150" font-size="11" fill="#0f766e" font-weight="700">логи в середине</text>

  <text x="380" y="378" text-anchor="middle" font-size="12.5" font-style="italic" fill="#dc2626">❌ «поменяю это... а если так?» (меняешь много сразу, чинишь симптом) — суеверие, не метод</text>
</svg>

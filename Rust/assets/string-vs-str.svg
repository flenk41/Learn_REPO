<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 280" font-family="Segoe UI, Arial, sans-serif">
  <rect width="660" height="280" fill="#ffffff"/>
  <text x="330" y="32" text-anchor="middle" font-size="21" font-weight="700" fill="#1a1a2e">String (владелец) vs &amp;str (заимствование)</text>

  <defs>
    <marker id="ss" markerWidth="11" markerHeight="11" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ce422b"/>
    </marker>
    <marker id="ssg" markerWidth="11" markerHeight="11" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#43a047"/>
    </marker>
  </defs>

  <!-- String -->
  <text x="165" y="70" text-anchor="middle" font-size="14" font-weight="700" fill="#ce422b" font-family="Consolas, monospace">String</text>
  <rect x="60" y="85" width="100" height="46" rx="8" fill="#fbe9e7" stroke="#ce422b" stroke-width="2"/>
  <text x="110" y="113" text-anchor="middle" font-size="13" font-weight="700" font-family="Consolas, monospace">owned</text>
  <rect x="210" y="85" width="120" height="46" rx="8" fill="#fff8e1" stroke="#f4b400" stroke-width="2"/>
  <text x="270" y="113" text-anchor="middle" font-size="13" font-weight="700">"привет"</text>
  <path d="M160 108 L 206 108" stroke="#ce422b" stroke-width="2.5" marker-end="url(#ss)"/>
  <text x="195" y="155" text-anchor="middle" font-size="12" fill="#a8321f">владеет данными в куче,</text>
  <text x="195" y="172" text-anchor="middle" font-size="12" fill="#a8321f">изменяема, освободит сама</text>

  <!-- &str -->
  <text x="495" y="70" text-anchor="middle" font-size="14" font-weight="700" fill="#2e7d32" font-family="Consolas, monospace">&amp;str</text>
  <rect x="390" y="85" width="100" height="46" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="440" y="113" text-anchor="middle" font-size="13" font-weight="700" font-family="Consolas, monospace">slice</text>
  <rect x="540" y="85" width="100" height="46" rx="8" fill="#fff8e1" stroke="#f4b400" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="590" y="113" text-anchor="middle" font-size="12" fill="#888">те же данные</text>
  <path d="M490 108 L 536 108" stroke="#43a047" stroke-width="2.5" marker-end="url(#ssg)"/>
  <text x="515" y="155" text-anchor="middle" font-size="12" fill="#2e7d32">заимствует (только смотрит),</text>
  <text x="515" y="172" text-anchor="middle" font-size="12" fill="#2e7d32">неизменяема, не владеет</text>

  <line x1="345" y1="55" x2="345" y2="185" stroke="#e0e0e0" stroke-width="1.5" stroke-dasharray="4 4"/>

  <rect x="60" y="205" width="540" height="50" rx="8" fill="#fbe9e7" stroke="#ce422b" stroke-width="1.5"/>
  <text x="330" y="227" text-anchor="middle" font-size="13" font-weight="700" fill="#a8321f">Правило: принимай &amp;str в параметрах, возвращай String</text>
  <text x="330" y="245" text-anchor="middle" font-size="12" fill="#555">литерал "привет" — это &amp;str · слайс — ссылка на часть данных, без копий</text>
</svg>

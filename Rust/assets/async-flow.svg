<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" font-family="Segoe UI, Arial, sans-serif">
  <rect width="760" height="380" rx="16" fill="#fbe9e7"/>
  <text x="380" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#ce422b">Как работает async в Rust</text>

  <defs><marker id="ar" markerWidth="11" markerHeight="11" refX="8" refY="4.5" orient="auto"><path d="M0,0 L10,4.5 L0,9 z" fill="#ce422b"/></marker></defs>

  <g text-anchor="middle">
    <rect x="40" y="62" width="150" height="58" rx="8" fill="#ce422b"/>
    <text x="115" y="86" font-size="12.5" fill="#fff" font-weight="700">async fn</text>
    <text x="115" y="105" font-size="10" fill="#ffe0b2">твой линейный код</text>

    <rect x="240" y="62" width="170" height="58" rx="8" fill="#ff7043"/>
    <text x="325" y="84" font-size="12" fill="#fff" font-weight="700">Future</text>
    <text x="325" y="101" font-size="9.5" fill="#fff3e0">машина состояний</text>
    <text x="325" y="113" font-size="9.5" fill="#fff3e0">(компилятор строит)</text>

    <rect x="460" y="62" width="160" height="58" rx="8" fill="#f4b400"/>
    <text x="540" y="84" font-size="12" fill="#5d4037" font-weight="700">Executor (Tokio)</text>
    <text x="540" y="101" font-size="9.5" fill="#5d4037">опрашивает poll()</text>
    <text x="540" y="113" font-size="9.5" fill="#5d4037">распределяет по ядрам</text>
  </g>
  <g stroke="#ce422b" stroke-width="2.5" marker-end="url(#ar)">
    <line x1="192" y1="91" x2="236" y2="91"/>
    <line x1="412" y1="91" x2="456" y2="91"/>
  </g>
  <text x="215" y="55" text-anchor="middle" font-size="9.5" fill="#bf360c">компилятор</text>

  <!-- poll loop -->
  <rect x="120" y="150" width="520" height="96" rx="10" fill="#fff" stroke="#ce422b" stroke-width="1.5"/>
  <text x="380" y="172" text-anchor="middle" font-size="12.5" fill="#ce422b" font-weight="700">Цикл опроса (poll):</text>
  <text x="145" y="196" font-size="11" fill="#1a1a2e">executor зовёт <tspan font-family="Consolas,monospace">poll()</tspan> →</text>
  <text x="145" y="216" font-size="11" fill="#2e7d32">  <tspan font-family="Consolas,monospace">Poll::Ready(v)</tspan> — готово, результат.</text>
  <text x="145" y="236" font-size="11" fill="#c62828">  <tspan font-family="Consolas,monospace">Poll::Pending</tspan> — не готово (ждём I-O); регистрирует Waker.</text>
  <text x="470" y="206" font-size="10.5" fill="#bf360c" text-anchor="middle">I-O готов →</text>
  <text x="470" y="222" font-size="10.5" fill="#bf360c" text-anchor="middle">Waker будит →</text>
  <text x="470" y="238" font-size="10.5" fill="#bf360c" text-anchor="middle">poll снова</text>

  <!-- reactor -->
  <rect x="240" y="256" width="280" height="40" rx="8" fill="#f4b400"/>
  <text x="380" y="281" text-anchor="middle" font-size="11.5" fill="#5d4037" font-weight="700">Реактор I-O на epoll / io_uring</text>

  <rect x="40" y="310" width="680" height="56" rx="10" fill="#fff3e0"/>
  <text x="380" y="332" text-anchor="middle" font-size="12.5" fill="#bf360c" font-weight="700">async fn НЕ исполняется сама — нужен .await + executor. Опрос только готовых (как epoll).</text>
  <text x="380" y="354" text-anchor="middle" font-size="11.5" fill="#5d4037">Тот же event-loop, что в капстоуне — но машину состояний строит компилятор. Pin = «не двигать Future».</text>
</svg>
